blueprint:
  name: "🌞 Master-Ladesteuerung: PV, Batterie & Wärmepumpe [V2.9.25]"
  description: >-
    Iterativer 30-Minuten JSON-Vorabscan (jetzt in kWh), Queued-Ausführung, zeitbasierte
    Halbstunden-Ladelogik, Proportion, Fallback (Fall B = Zeit reicht nicht → Max),
    Top-Balancing inkl. Schatten-BMS Kalibrierung, WP-Boost und historischer Treppen-Filter.
  domain: automation

  input:
    sec_battery_sensors:
      name: "1. Batterie & BMS (Pflicht)"
      description: >-
        Die Kern-Sensoren der Batterie. Ohne diese Angaben kann der Blueprint nicht arbeiten.
      collapsed: true
      input:
        battery_soc_sensor:
          name: "Ladezustand SOC (%)"
          description: >-
            Sensor mit dem aktuellen Ladezustand der Gesamt-Batterie in Prozent. Steuert die gesamte Prioritäts-Kaskade. Tipp: Wenn du das mitgelieferte Schatten-BMS nutzt, trage hier dessen Sensor ein — er ist meist genauer als der SOC des Wechselrichters.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "battery"}}
        battery_power_sensor:
          name: "Batterie-Leistung (W)"
          description: >-
            Sensor mit der aktuellen Lade-/Entladeleistung. Wird unter anderem beim Peak-Shaving genutzt, um zu erkennen, wie viel die Batterie gerade puffert.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "power"}}
        vmax1_sensor:
          name: "BMS 1: höchste Zellspannung (V)"
          description: >-
            Sensor mit der höchsten Einzelzellspannung von Batterie-Pack 1. Löst das Top-Balancing aus, sobald der eingestellte Schwellwert erreicht wird (Abschnitt 8).
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "voltage"}}
        vmax2_sensor:
          name: "BMS 2: höchste Zellspannung (V)"
          description: >-
            Sensor mit der höchsten Einzelzellspannung von Pack 2 (wie bei BMS 1). Bei nur einem Pack leer lassen — der Blueprint rechnet dann nur mit Pack 1.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "voltage"}}
        vmax3_sensor:
          name: "BMS 3: höchste Zellspannung (V) — optional"
          description: >-
            Sensor mit der höchsten Einzelzellspannung von Pack 3. Nur ausfüllen, wenn du drei Packs hast; sonst leer lassen.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "voltage"}}
        battery_total_charge:
          name: "Zähler: insgesamt geladen (kWh)"
          description: >-
            Sensor mit dem aufsummierten Gesamt-Ladezähler des Wechselrichters in kWh (nur steigend, wird nie zurückgesetzt). Das Schatten-BMS berechnet daraus zusammen mit dem Entladezähler einen driftfreien Ladezustand.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "energy"}}
        battery_total_discharge:
          name: "Zähler: insgesamt entladen (kWh)"
          description: >-
            Sensor mit dem aufsummierten Gesamt-Entladezähler in kWh (nur steigend). Gegenstück zum Ladezähler — beide zusammen ergeben die Bilanz für das Schatten-BMS.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "energy"}}
        pack_capacity_ah:
          name: "Kapazität EINES Packs (Ah)"
          description: >-
            Nennkapazität eines einzelnen Batterie-Packs in Amperestunden (z. B. 314 Ah). Daraus berechnet der Blueprint zusammen mit der C-Rate den maximal erlaubten Ladestrom. Wichtig: nicht die Summe aller Packs eintragen!
          default: 314
          selector: {"number": {"min": 50, "max": 500, "step": 1, "unit_of_measurement": "Ah"}}
        nominale_spannung:
          name: "Nominale Batteriespannung (V)"
          description: >-
            Nennspannung des Batteriesystems (typisch 51,2 V bei 16 Zellen LiFePO4). Wird zur Umrechnung zwischen kWh und Ah verwendet.
          default: 51.2
          selector: {"number": {"min": 48.0, "max": 60.0, "step": 0.1, "unit_of_measurement": "V"}}
        max_ampere:
          name: "Maximaler Ladestrom (A)"
          description: >-
            Obergrenze für den Ladestrom — der Wert, den der Blueprint setzt, wenn er die Ladung voll freigibt (z. B. nachts). Sollte dem entsprechen, was Wechselrichter und BMS dauerhaft vertragen.
          default: 350
          selector: {"number": {"min": 50, "max": 350, "step": 1, "unit_of_measurement": "A"}}
    sec_battery_control:
      name: "2. Wechselrichter-Steuerung (Pflicht)"
      description: >-
        Die Stellglieder, über die der Blueprint tatsächlich eingreift. Das sind schreibbare Entitäten (number/switch), keine Sensoren.
      collapsed: true
      input:
        wr_max_charge_current:
          name: "Stellgröße: max. Ladestrom (A)"
          description: >-
            Die number-Entität des Wechselrichters für den maximalen Batterie-Ladestrom. Das ist der zentrale Hebel: Darüber drosselt oder öffnet der Blueprint die Ladung.
          default: ""
          selector: {"entity": {"domain": "number"}}
        wr_float_voltage_sensor:
          name: "Stellgröße: Float-Spannung (V) — optional"
          description: >-
            Die number-Entität für die Erhaltungsladespannung. Der Blueprint hebt sie während der Zellpflege kurzzeitig an (Abschnitt 8) und setzt sie danach zurück. Leer lassen, wenn dein Wechselrichter das nicht unterstützt — dann entfällt nur die Spannungsanhebung, das Balancing läuft trotzdem.
          default: ""
          selector: {"entity": {"domain": "number"}}
        wr_grid_charge_switch:
          name: "Stellgröße: Netzladung Ein/Aus"
          description: >-
            Die switch-Entität, mit der die Netzladung des Wechselrichters ein- und ausgeschaltet wird. Der Blueprint schaltet sie nur für die Winter-Zwangsladung ein und danach wieder aus.
          default: ""
          selector: {"entity": {"domain": "switch"}}
        wr_grid_charge_current:
          name: "Stellgröße: Netzlade-Strom (A)"
          description: >-
            Die number-Entität für den Ladestrom bei Netzladung. Wird zusammen mit dem Schalter darüber für die Winter-Zwangsladung genutzt.
          default: ""
          selector: {"entity": {"domain": "number"}}
        wr_tou_1:
          name: "ToU-Programm 1: Min-SOC (%)"
          description: >-
            Die number-Entität für den Mindest-Ladezustand von Zeitprogramm 1 (Time of Use). Der Blueprint hebt diesen Wert an, wenn die Batterie längere Zeit nicht voll wurde — so wird sie nachts aus dem Netz nachgeladen und kann wieder balancieren.
          default: ""
          selector: {"entity": {"domain": "number"}}
        wr_tou_2:
          name: "ToU-Programm 2: Min-SOC (%)"
          description: >-
            Die number-Entität für Zeitprogramm 2. Siehe Programm 1 — der Blueprint setzt immer alle sechs Programme gemeinsam auf denselben Wert.
          default: ""
          selector: {"entity": {"domain": "number"}}
        wr_tou_3:
          name: "ToU-Programm 3: Min-SOC (%)"
          description: >-
            Die number-Entität für Zeitprogramm 3. Siehe Programm 1 — der Blueprint setzt immer alle sechs Programme gemeinsam auf denselben Wert.
          default: ""
          selector: {"entity": {"domain": "number"}}
        wr_tou_4:
          name: "ToU-Programm 4: Min-SOC (%)"
          description: >-
            Die number-Entität für Zeitprogramm 4. Siehe Programm 1 — der Blueprint setzt immer alle sechs Programme gemeinsam auf denselben Wert.
          default: ""
          selector: {"entity": {"domain": "number"}}
        wr_tou_5:
          name: "ToU-Programm 5: Min-SOC (%)"
          description: >-
            Die number-Entität für Zeitprogramm 5. Siehe Programm 1 — der Blueprint setzt immer alle sechs Programme gemeinsam auf denselben Wert.
          default: ""
          selector: {"entity": {"domain": "number"}}
        wr_tou_6:
          name: "ToU-Programm 6: Min-SOC (%)"
          description: >-
            Die number-Entität für Zeitprogramm 6. Siehe Programm 1 — der Blueprint setzt immer alle sechs Programme gemeinsam auf denselben Wert.
          default: ""
          selector: {"entity": {"domain": "number"}}
        min_ampere:
          name: "Minimaler Ladestrom (A)"
          description: >-
            Der kleinste Strom, den der Blueprint setzt, wenn er die Ladung stark bremst (z. B. während des Top-Balancings). Nicht 0 wählen: Ein kleiner Reststrom hält die Zellspannung oben, damit der Balancer arbeiten kann.
          default: 7
          selector: {"number": {"min": 2, "max": 20, "step": 1, "unit_of_measurement": "A"}}
        grid_ampere_zwangsladung:
          name: "Netzlade-Strom bei Zwangsladung (A)"
          description: >-
            Ladestrom in Ampere für die Winter-Zwangsladung aus dem Netz. Eher niedrig wählen — es geht nur darum, die Zellen wieder auf ein balancierfähiges Niveau zu bringen, nicht um schnelles Volladen. Netzstrom ist teuer.
          default: 50
          selector: {"number": {"min": 10, "max": 140, "step": 1, "unit_of_measurement": "A"}}
    sec_net_pv:
      name: "3. Netz & PV-Leistung (Pflicht)"
      description: >-
        Messwerte für Netzbezug/-einspeisung und die aktuelle PV-Erzeugung.
      collapsed: true
      input:
        grid_export_sensor:
          name: "Netz-Leistung (W)"
          description: >-
            Sensor mit der aktuellen Netzleistung in Watt. Negative Werte bedeuten Einspeisung (Überschuss). Der Blueprint erkennt daran, ob Peak-Shaving oder ein WP-Boost sinnvoll ist.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "power"}}
        grid_export_kwh_heute:
          name: "Netz-Einspeisung heute (kWh)"
          description: >-
            Sensor mit der heute eingespeisten Energie in kWh (Tageszähler). Wird nur für die Statistik „verschenkte Speicherkapazität“ ausgewertet: Wie viel Energie ging ins Netz, obwohl die Batterie noch Platz hatte? Beeinflusst die Steuerung nicht.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "energy"}}
        pv_power_sensor:
          name: "PV-Leistung geglättet (W)"
          description: >-
            Sensor mit der aktuellen PV-Erzeugung. Am besten einen geglätteten Wert nehmen (z. B. gleitender Mittelwert über 5 Minuten) — sonst reagiert die Steuerung zu nervös auf einzelne Wolken.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "power"}}
        hausverbrauch_utility_sensor:
          name: "Hausverbrauch halbstündlich (kWh)"
          description: >-
            Ein Utility-Meter-Sensor, der den Hausverbrauch je Halbstunde zählt. Daraus lernt der Blueprint dein typisches Verbrauchsprofil und kann abschätzen, wie viel Energie du bis Tagesende noch brauchst.
          default: ""
          selector: {"entity": {"domain": "sensor"}}
    sec_solcast:
      name: "4. Solcast-Prognose (Pflicht)"
      description: >-
        Die PV-Vorhersage. Sie ist die Grundlage für die vorausschauende Ladeplanung — ohne sie kann der Blueprint nicht entscheiden, ob er mit dem Laden warten kann.
      collapsed: true
      input:
        solcast_heute_sensor:
          name: "Solcast: Prognose heute (mit Array)"
          description: >-
            Der Solcast-Sensor für die Tagesprognose. Wichtig: Er muss das Attribut „detailedForecast“ (Halbstunden-Array) mitliefern — daraus baut der Blueprint seinen Vorabscan. Der reine kWh-Zahlenwert reicht nicht.
          default: ""
          selector: {"entity": {"domain": "sensor"}}
        solcast_rest_sensor:
          name: "Solcast: verbleibende Leistung heute (kWh)"
          description: >-
            Sensor mit der noch erwarteten PV-Energie für den Rest des Tages in kWh. Dient als Rückfallebene: Wenn das Halbstunden-Array des Hauptsensors einmal fehlt, rechnet der Blueprint mit diesem Wert weiter.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "energy"}}
        solcast_current_sensor:
          name: "Solcast: aktuelle Leistung (W)"
          description: >-
            Sensor mit der aktuell prognostizierten PV-Leistung in Watt. Der Blueprint vergleicht ihn mit der tatsächlichen Erzeugung, um zu erkennen, ob die Prognose gerade zuverlässig ist — bei großer Abweichung wird vorsichtiger geplant.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "power"}}
        solcast_next_hour_sensor:
          name: "Solcast: Prognose nächste Stunde (kWh)"
          description: >-
            Sensor mit der erwarteten PV-Energie der kommenden Stunde in kWh. Fließt in kurzfristige Entscheidungen ein, etwa ob sich das Warten auf mehr Sonne noch lohnt.
          default: ""
          selector: {"entity": {"domain": "sensor"}}
    sec_helpers:
      name: "5. Helfer-Entitäten (Pflicht — einmalig anlegen)"
      description: >-
        Diese Helfer speichern den Zustand zwischen zwei Läufen. Sie müssen einmalig angelegt werden (siehe mitgeliefertes Package). Der Blueprint schreibt hier hinein — es sind keine Sensoren.
      collapsed: true
      input:
        helper_lade_modus:
          name: "Helfer: aktueller Lade-Modus"
          description: >-
            input_select, in dem der Blueprint seinen aktuellen Modus ablegt (normal, blockade, peak_shaving, top_balancing …). Dient der Nachvollziehbarkeit und verhindert, dass Meldungen mehrfach gefeuert werden.
          default: ""
          selector: {"entity": {"domain": "input_select"}}
        helper_logbook_dummy:
          name: "Helfer: Logbuch-Anker"
          description: >-
            input_text, an den die Logbuch-Einträge gehängt werden. Der Inhalt spielt keine Rolle — Home Assistant braucht nur eine Entität, unter der die Meldungen erscheinen. Danach kannst du im Logbuch nach dieser Entität filtern.
          default: ""
          selector: {"entity": {"domain": "input_text"}}
        helper_batterie_heute_voll:
          name: "Helfer: Batterie war heute voll"
          description: >-
            input_boolean, der auf „ein“ geht, sobald das Top-Balancing gestartet ist. Wird um Mitternacht zurückgesetzt und steuert das 100-%-Tage-Tracking.
          default: ""
          selector: {"entity": {"domain": "input_boolean"}}
        json_tracking_sensor:
          name: "Helfer: 100-%-Tage-Liste"
          description: >-
            input_text, in dem die Tage gespeichert werden, an denen die Batterie voll wurde (als JSON-Liste, maximal 14 Tage). Daraus erkennt der Blueprint, ob längere Zeit kein Balancing stattgefunden hat, und hebt dann den ToU-Min-SOC an. Wichtig: ein input_text, kein Sensor — Home Assistant würde den Listenwert in einem Sensor-State sonst in ein ungültiges Format umwandeln.
          default: ""
          selector: {"entity": {"domain": "input_text"}}
        helper_blockade_beendet:
          name: "Helfer: Morgen-Blockade heute beendet"
          description: >-
            input_boolean, der die Morgen-Blockade für den Rest des Tages abschaltet, sobald sie einmal aufgelöst wurde. Verhindert, dass sie am Nachmittag erneut zuschlägt. Reset um Mitternacht.
          default: ""
          selector: {"entity": {"domain": "input_boolean"}}
        helper_max_soc_heute:
          name: "Helfer: höchster SOC heute (%)"
          description: >-
            input_number, in dem der Tages-Höchststand des Ladezustands festgehalten wird. Grundlage für die Diagnose, ob die Batterie ihr Ziel erreicht hat.
          default: ""
          selector: {"entity": {"domain": "input_number"}}
        speicherverlust_gesamt:
          name: "Helfer: verschenkte Speicherkapazität (kWh)"
          description: >-
            input_number als Gesamtzähler: Wie viel Energie ging ins Netz, obwohl die Batterie noch Platz hatte? Reine Statistik — beeinflusst die Steuerung nicht.
          default: ""
          selector: {"entity": {"domain": "input_number"}}
        helper_zwangsladung_aktiv:
          name: "Helfer: Winter-Zwangsladung aktiv"
          description: >-
            input_boolean, der die Netzladung im Winter scharf schaltet. Solange er aus ist, lädt der Blueprint niemals aus dem Netz.
          default: ""
          selector: {"entity": {"domain": "input_boolean"}}
        helper_timer_peak:
          name: "Timer: Peak-Shaving Hold"
          description: >-
            timer-Entität. Läuft, solange Peak-Shaving aktiv gehalten wird. Verhindert, dass die Batterie bei schwankender Einspeisung ständig an- und abschaltet.
          default: ""
          selector: {"entity": {"domain": "timer"}}
        helper_timer_cooldown:
          name: "Timer: Zwangsladung Cooldown"
          description: >-
            timer-Entität. Sperrt nach einer Zwangsladung eine Weile die nächste, damit sich das System nicht hochschaukelt.
          default: ""
          selector: {"entity": {"domain": "timer"}}
        helper_timer_wp_anlauf:
          name: "Timer: WP-Anlaufphase"
          description: >-
            timer-Entität. Läuft während der Anlaufphase der Wärmepumpe. In dieser Zeit geht die Batterie auf 0 A, damit der PV-Überschuss der Wärmepumpe zugutekommt.
          default: ""
          selector: {"entity": {"domain": "timer"}}
        helper_timer_wp_boost:
          name: "Timer: WP-Laufzeit"
          description: >-
            timer-Entität für die Gesamtlaufzeit des WP-Boosts. Solange er läuft, wird die reguläre Ladekaskade zurückgestellt.
          default: ""
          selector: {"entity": {"domain": "timer"}}
        schatten_bms_sensor:
          name: "Schatten-BMS: SOC-Sensor"
          description: >-
            Der Template-Sensor des mitgelieferten Schatten-BMS. Er muss das Attribut „raw_drift_soc“ haben (ungeclampter Rohwert). Der Blueprint korrigiert damit die Drift, sobald der Rohwert über 100 % läuft.
          default: ""
          selector: {"entity": {"domain": "sensor"}}
        helper_tare_charge:
          name: "Schatten-BMS: Tare Ladezähler (kWh)"
          description: >-
            input_number. Merkt sich den Stand des Ladezählers zum Zeitpunkt der letzten 100-%-Kalibrierung. Der Blueprint führt ihn automatisch nach — nichts von Hand eintragen.
          default: ""
          selector: {"entity": {"domain": "input_number"}}
        helper_tare_discharge:
          name: "Schatten-BMS: Tare Entladezähler (kWh)"
          description: >-
            input_number, das den Stand des Entladezählers zum Zeitpunkt der letzten 100-%-Kalibrierung speichert. Gegenstück zum Tare-Ladezähler. Der Blueprint pflegt den Wert automatisch — nichts von Hand eintragen.
          default: ""
          selector: {"entity": {"domain": "input_number"}}
        hausverbrauch_json_text:
          name: "Helfer: Verbrauchsprofil (JSON)"
          description: >-
            input_text, in dem der Blueprint dein halbstündliches Verbrauchsprofil als JSON ablegt. Es lernt sich über die Zeit selbst an — anfangs ist es leer, das ist normal.
          default: ""
          selector: {"entity": {"domain": "input_text"}}
        eingriff_dauer_sensor:
          name: "Diagnose: Eingriffsdauer heute"
          description: >-
            History-Stats-Sensor, der misst, wie lange die Ladesteuerung heute aktiv eingegriffen hat. Nur für die Diagnose-Meldung am Tagesende — beeinflusst die Steuerung nicht.
          default: ""
          selector: {"entity": {"domain": "sensor"}}
    sec_peak_shaving:
      name: "6. Peak-Shaving (Netz-Überschuss puffern)"
      description: >-
        Wenn viel ins Netz eingespeist wird, kann die Batterie den Überschuss zwischenpuffern, statt ihn zu verschenken. Praktisch bei Einspeise-Begrenzung oder geringer Einspeisevergütung.
      collapsed: true
      input:
        schwelle_peak_shaving:
          name: "Start-Schwelle (W)"
          description: >-
            Netz-Einspeisung in Watt, ab der Peak-Shaving anspringt. Sinnvoll ist ein Wert knapp unter deiner Einspeisegrenze — so fängt die Batterie genau die Spitzen ab, die sonst abgeregelt würden.
          default: 6500
          selector: {"number": {"min": 1000, "max": 30000, "step": 100, "unit_of_measurement": "W"}}
        peak_ampere:
          name: "Ladestrom beim Peak-Shaving (A)"
          description: >-
            Ladestrom in Ampere, mit dem die Batterie beim Peak-Shaving lädt. Faustregel: ungefähr so hoch, dass die typische Überschussleistung gerade aufgenommen wird (Watt ÷ Batteriespannung ≈ Ampere).
          default: 48
          selector: {"number": {"min": 20, "max": 100, "step": 1, "unit_of_measurement": "A"}}
        duration_peak_hold:
          name: "Nachlaufzeit (Hold-Timer)"
          description: >-
            Zeitdauer (hh:mm:ss), die Peak-Shaving nach dem letzten Überschuss noch aktiv bleibt. Ohne diese Nachlaufzeit würde die Batterie bei jeder Wolke sofort abschalten. Solange weiter Überschuss anliegt, wird der Timer immer wieder auf diesen Wert zurückgesetzt — Peak-Shaving läuft also durch, solange eingespeist wird.
          default: "00:30:00"
          selector: {"time": {}}
    sec_waermepumpe:
      name: "7. Wärmepumpe / PV-Boost (Optional)"
      description: >-
        Optional: Bei PV-Überschuss kann die Wärmepumpe den Warmwasserspeicher vorrangig aufheizen. Die Batterie tritt dafür zurück. Wer keine Wärmepumpe hat, lässt den Schalter unten einfach aus.
      collapsed: true
      input:
        wp_boost_aktiv:
          name: "WP-Boost aktivieren"
          description: >-
            Ein/Aus-Schalter für das gesamte Wärmepumpen-Feature. Auf „aus“ stellen, wenn du keine Wärmepumpe hast oder sie nicht vom Blueprint gesteuert werden soll — dann werden alle folgenden WP-Felder ignoriert und können leer bleiben.
          default: true
          selector: {"boolean": {}}
        schwelle_wp_boost:
          name: "Start-Schwelle PV-Boost (W)"
          description: >-
            Netz-Einspeisung in Watt, ab der der WP-Boost ausgelöst wird. Sinnvollerweise etwas NIEDRIGER als die Peak-Shaving-Schwelle — dann bekommt die Wärmepumpe den Überschuss zuerst, weil Warmwasser der wertvollere Speicher ist.
          default: 6400
          selector: {"number": {"min": 1000, "max": 30000, "step": 100, "unit_of_measurement": "W"}}
        wp_water_heater:
          name: "Warmwasserspeicher (Entität)"
          description: >-
            Die water_heater-Entität deiner Wärmepumpe (der Warmwasserspeicher). Über sie setzt der Blueprint die Zieltemperatur beim PV-Boost und stellt sie danach wieder zurück.
          default: ""
          selector: {"entity": {"domain": "water_heater"}}
        wp_temp_sensor:
          name: "Warmwasser-Temperatur (Sensor)"
          description: >-
            Sensor mit der aktuellen Speichertemperatur. Der Blueprint startet den Boost nur, wenn noch Luft nach oben ist.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "temperature"}}
        wp_hysterese_number:
          name: "Stellgröße: Hysterese (K)"
          description: >-
            Die number-Entität für die Einschalt-Hysterese der Wärmepumpe. Der Blueprint setzt sie beim Boost anders als im Normalbetrieb (siehe die beiden Wertepaare weiter unten).
          default: ""
          selector: {"entity": {"domain": "number"}}
        wp_ziel_temp_number:
          name: "Stellgröße: Zieltemperatur — optional"
          description: >-
            Zusätzliche number-Entität für die Solltemperatur. Nur nötig, wenn deine Integration die Temperatur nicht allein über die water_heater-Entität übernimmt (etwa bei ViCare/Viessmann). Im Zweifel leer lassen und testen.
          default: ""
          selector: {"entity": {"domain": "number"}}
        wp_boost_button:
          name: "Stellgröße: Einmal-Ladung (Button)"
          description: >-
            Die button-Entität, mit der sich eine einmalige Warmwasser-Ladung auslösen lässt. Der Blueprint drückt diesen Knopf beim PV-Boost, damit die Wärmepumpe sofort anläuft, statt auf ihr nächstes reguläres Zeitfenster zu warten.
          default: ""
          selector: {"entity": {"domain": "button"}}
        wp_kompressor_sensor:
          name: "Diagnose: Kompressor läuft — optional"
          description: >-
            Sensor (binary_sensor), der anzeigt, ob der Verdichter gerade läuft. Damit erkennt der Blueprint, ob die Wärmepumpe tatsächlich Strom zieht. Optional — ohne ihn wird die Anlaufphase nur per Timer geschätzt.
          default: ""
          selector: {"entity": {"domain": "binary_sensor"}}
        wp_ziel_temp_pv:
          name: "Zieltemperatur bei PV-Überschuss (°C)"
          description: >-
            Warmwasser-Zieltemperatur in °C für den PV-Boost. Höher wählen als im Normalbetrieb — der Speicher wird bewusst „überladen“, solange die Sonne es hergibt. So wird PV-Überschuss als Wärme gespeichert statt ins Netz zu gehen.
          default: 59
          selector: {"number": {"min": 40, "max": 70, "step": 1}}
        wp_hysterese_pv:
          name: "Hysterese bei PV-Überschuss (K)"
          description: >-
            Einschalt-Hysterese in Kelvin für den Boost-Betrieb. Klein wählen (z. B. 5 K), damit die Wärmepumpe früh anspringt und den Überschuss auch wirklich nutzt.
          default: 5
          selector: {"number": {"min": 1, "max": 20, "step": 1}}
        wp_ziel_temp_normal:
          name: "Zieltemperatur normal (°C)"
          description: >-
            Warmwasser-Zieltemperatur in °C für den Normalbetrieb (ohne PV-Überschuss). Auf diesen Wert stellt der Blueprint zurück, sobald der Boost endet.
          default: 50
          selector: {"number": {"min": 40, "max": 70, "step": 1}}
        wp_hysterese_normal:
          name: "Hysterese normal (K)"
          description: >-
            Einschalt-Hysterese in Kelvin für den Normalbetrieb. Größer wählen als beim Boost (z. B. 10 K) — so taktet die Wärmepumpe seltener und läuft dafür länger am Stück, was sie schont.
          default: 10
          selector: {"number": {"min": 1, "max": 20, "step": 1}}
        duration_wp_anlauf:
          name: "Dauer der Anlaufphase"
          description: >-
            Zeitdauer (hh:mm:ss), die als Anlaufphase der Wärmepumpe gilt. In dieser Zeit geht die Batterie auf 0 A, damit der gesamte PV-Überschuss zur Wärmepumpe fließt und nicht in den Speicher. Sollte etwa der Zeit entsprechen, die deine Wärmepumpe braucht, um auf Leistung zu kommen.
          default: "00:30:00"
          selector: {"time": {}}
        duration_wp_laufzeit:
          name: "Dauer der WP-Laufzeit"
          description: >-
            Zeitdauer (hh:mm:ss), für die die reguläre Ladekaskade nach einem WP-Boost zurückgestellt bleibt. Erst danach übernimmt wieder die normale Ladelogik. Länger = die Wärmepumpe bekommt mehr Zeit, den Speicher durchzuheizen.
          default: "01:00:00"
          selector: {"time": {}}
    sec_float_voltage:
      name: "8. Zellpflege & Top-Balancing (Feintuning)"
      description: >-
        Damit die Zellen im Gleichgewicht bleiben, muss die Batterie regelmäßig voll werden. Diese Werte steuern, wann und wie lange der Blueprint dafür sorgt.
      collapsed: true
      input:
        top_balancing_voltage:
          name: "Start: Zellspannung (V)"
          description: >-
            Zellspannung in Volt, ab der das Top-Balancing startet. Sobald die höchste Einzelzelle (Sensoren aus Abschnitt 1) diesen Wert erreicht, drosselt der Blueprint den Ladestrom und lässt den Balancer arbeiten. Bei LiFePO4 sind 3,45–3,50 V sinnvoll — dort wird die Kennlinie steil, und Zellunterschiede werden sichtbar.
          default: 3.4
          selector: {"number": {"min": 3.3, "max": 3.6, "step": 0.01, "unit_of_measurement": "V"}}
        top_balancing_soc:
          name: "Start: Mindest-SOC (%)"
          description: >-
            Mindest-Ladezustand in Prozent, der zusätzlich erreicht sein muss, damit das Balancing startet. Wirkt als Plausibilitätsprüfung: Verhindert Fehlauslösungen, wenn eine einzelne schwache Zelle schon bei halbvoller Batterie hochläuft.
          default: 97
          selector: {"number": {"min": 70, "max": 100, "step": 1, "unit_of_measurement": "%"}}
        duration_top_balancing:
          name: "Dauer der Zellpflege"
          description: >-
            Zeitdauer (hh:mm:ss), die das Top-Balancing nach dem Start läuft. Währenddessen wird der Ladestrom auf den Minimalwert (Abschnitt 2) gedrosselt, damit die Zellspannung oben bleibt und der Balancer arbeiten kann. Länger = gründlicheres Balancing, aber die Batterie nimmt in dieser Zeit kaum PV-Überschuss auf.
          default: "01:00:00"
          selector: {"time": {}}
        float_voltage_balancing:
          name: "Float-Spannung während Zellpflege (V)"
          description: >-
            Auf diesen Wert hebt der Blueprint die Erhaltungsladespannung während des Balancings an. Nur wirksam, wenn du in Abschnitt 2 eine Float-Entität hinterlegt hast.
          default: 55.2
          selector: {"number": {"min": 50.0, "max": 60.0, "step": 0.1, "unit_of_measurement": "V"}}
        float_voltage_normal:
          name: "Float-Spannung normal (V)"
          description: >-
            Erhaltungsladespannung in Volt für den Normalbetrieb. Auf diesen Wert stellt der Blueprint zurück, sobald die Zellpflege beendet ist. Sollte dem Standardwert deines Wechselrichters entsprechen (bei 16S-LiFePO4 typisch 54,4 V).
          default: 53.6
          selector: {"number": {"min": 50.0, "max": 60.0, "step": 0.1, "unit_of_measurement": "V"}}
        default_tou_soc:
          name: "ToU Min-SOC normal (%)"
          description: >-
            Mindest-Ladezustand in Prozent für die ToU-Programme im Normalfall. Auf diesen Wert setzt der Blueprint alle sechs Programme zurück, sobald die Batterie an zwei Tagen in Folge voll geworden ist — dann ist das Zell-Gleichgewicht in Ordnung und es muss nachts nicht aus dem Netz nachgeladen werden.
          default: 20
          selector: {"number": {"min": 10, "max": 50, "step": 1, "unit_of_measurement": "%"}}
        escalation_tou_soc:
          name: "ToU Min-SOC bei Eskalation (%)"
          description: >-
            Erhöhter Mindest-Ladezustand in Prozent, auf den alle sechs ToU-Programme gesetzt werden, wenn die Batterie 9 Tage lang nicht mehr voll wurde. Die Folge: Sie wird nachts aus dem Netz auf ein höheres Niveau gehalten und erreicht am nächsten Sonnentag leichter die Balancing-Schwelle.
          default: 30
          selector: {"number": {"min": 10, "max": 60, "step": 1, "unit_of_measurement": "%"}}
    sec_temperature:
      name: "9. Temperatur-Limits & C-Raten (Feintuning)"
      description: >-
        Lithium-Zellen dürfen bei Kälte nur langsam (oder gar nicht) geladen werden. Der Blueprint begrenzt den Ladestrom deshalb temperaturabhängig. Die Voreinstellungen sind konservativ und passen für die meisten LiFePO4-Systeme.
      collapsed: true
      input:
        bms1_temp_min_sensor:
          name: "BMS 1: niedrigste Zelltemperatur"
          description: >-
            Sensor mit der kältesten Zelle von Pack 1. Der Blueprint rechnet immer mit dem kältesten Wert aller Packs — die schwächste Zelle bestimmt das Limit.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "temperature"}}
        bms2_temp_min_sensor:
          name: "BMS 2: niedrigste Zelltemperatur"
          description: >-
            Sensor mit der kältesten Zelle von Pack 2. Bei nur einem Pack leer lassen — der Blueprint rechnet dann nur mit Pack 1.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "temperature"}}
        bms3_temp_min_sensor:
          name: "BMS 3: niedrigste Zelltemperatur — optional"
          description: >-
            Sensor mit der kältesten Zelle von Pack 3. Nur ausfüllen, wenn du drei Packs hast.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "temperature"}}
        bms1_temp_max_sensor:
          name: "BMS 1: höchste Zelltemperatur"
          description: >-
            Sensor mit der wärmsten Zelle von Pack 1. Begrenzt die Ladung bei Hitze.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "temperature"}}
        bms2_temp_max_sensor:
          name: "BMS 2: höchste Zelltemperatur"
          description: >-
            Sensor mit der wärmsten Zelle von Pack 2. Bei nur einem Pack leer lassen.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "temperature"}}
        bms3_temp_max_sensor:
          name: "BMS 3: höchste Zelltemperatur — optional"
          description: >-
            Sensor mit der wärmsten Zelle von Pack 3. Nur ausfüllen, wenn du drei Packs hast.
          default: ""
          selector: {"entity": {"domain": "sensor", "device_class": "temperature"}}
        crate_2_deg:
          name: "C-Rate bei 2 °C und darunter"
          description: >-
            Ladefaktor bei Frost. Standard 0,00 = gar nicht laden. Laden unter dem Gefrierpunkt schädigt LiFePO4-Zellen dauerhaft (Lithium-Plating) — diesen Wert nur ändern, wenn deine Zellen ausdrücklich dafür freigegeben sind.
          default: 0.0
          selector: {"number": {"min": 0.0, "max": 0.1, "step": 0.01, "mode": "slider"}}
        crate_5_deg:
          name: "C-Rate bei 5 °C"
          description: >-
            Ladefaktor bei knapp über null. Rechenweg: C-Rate × Pack-Kapazität × Anzahl Packs = erlaubter Strom. Beispiel: 0,05 × 314 Ah × 2 = 31 A.
          default: 0.05
          selector: {"number": {"min": 0.0, "max": 0.2, "step": 0.01, "mode": "slider"}}
        crate_10_deg:
          name: "C-Rate bei 10 °C"
          description: >-
            Ladefaktor bei 10 °C. Rechenweg: C-Rate × Pack-Kapazität × Anzahl Packs = erlaubter Ladestrom. Bei kühlen Temperaturen sollte er deutlich unter dem Wert für 20 °C liegen.
          default: 0.2
          selector: {"number": {"min": 0.0, "max": 0.5, "step": 0.01, "mode": "slider"}}
        crate_12_deg:
          name: "C-Rate bei 12 °C"
          description: >-
            Ladefaktor bei 12 °C. Zwischenwert für die Kennlinie zwischen 10 °C und 15 °C — der Blueprint interpoliert zwischen den Stützstellen. Rechenweg: C-Rate × Pack-Kapazität × Anzahl Packs = erlaubter Ladestrom.
          default: 0.3
          selector: {"number": {"min": 0.0, "max": 0.8, "step": 0.01, "mode": "slider"}}
        crate_15_deg:
          name: "C-Rate bei 15 °C"
          description: >-
            Ladefaktor bei 15 °C. Zwischenwert für die Kennlinie zwischen 12 °C und 20 °C. Rechenweg: C-Rate × Pack-Kapazität × Anzahl Packs = erlaubter Ladestrom.
          default: 0.5
          selector: {"number": {"min": 0.0, "max": 1.0, "step": 0.01, "mode": "slider"}}
        crate_20_deg:
          name: "C-Rate bei 20 °C"
          description: >-
            Ladefaktor bei 20 °C — dem Wohlfühlbereich der Zellen. Hier ist die volle Rate möglich (Standard 0,70 = 70 % der Kapazität als Ladestrom). Rechenbeispiel: 0,70 × 314 Ah × 2 Packs = 440 A, wird aber durch „Maximaler Ladestrom“ (Abschnitt 1) gedeckelt.
          default: 0.7
          selector: {"number": {"min": 0.0, "max": 1.0, "step": 0.01, "mode": "slider"}}
        crate_40_deg:
          name: "C-Rate bei 40 °C"
          description: >-
            Ladefaktor bei 40 °C. Wärme ist für LiFePO4 weniger kritisch als Kälte — meist kann hier noch die volle Rate gefahren werden.
          default: 0.7
          selector: {"number": {"min": 0.0, "max": 1.0, "step": 0.01, "mode": "slider"}}
        crate_45_deg:
          name: "C-Rate bei 45 °C und darüber"
          description: >-
            Ladefaktor bei 45 °C und darüber. Standard 0,00 = Ladung komplett stoppen. Die meisten BMS riegeln bei dieser Temperatur ohnehin selbst ab; dieser Wert sorgt dafür, dass der Blueprint gar nicht erst dagegen anregelt.
          default: 0.0
          selector: {"number": {"min": 0.0, "max": 0.5, "step": 0.01, "mode": "slider"}}
    sec_tuning:
      name: "10. Lade-Strategie & Zeitsteuerung (Feintuning)"
      description: >-
        Hier stellst du ein, wie vorausschauend der Blueprint plant. Die Voreinstellungen sind ein guter Startpunkt — meist muss hier nichts angepasst werden.
      collapsed: true
      input:
        zeit_blockade_ende:
          name: "Spätester Ladebeginn (Morgen-Blockade)"
          description: >-
            Uhrzeit, zu der die Morgen-Blockade spätestens endet und die Ladung freigegeben wird. Hintergrund: Morgens hält der Blueprint die Batterie bewusst zurück, damit sie die Mittagsspitze noch aufnehmen kann — sonst wäre sie um 9 Uhr voll und der Überschuss ginge ins Netz. Bei guter Prognose löst er die Blockade auch früher auf; diese Uhrzeit ist nur die harte Obergrenze. Früher = sicherer (Batterie wird zuverlässiger voll), später = mehr Platz für die Mittagsspitze.
          default: "13:30:00"
          selector: {"time": {}}
        faktor_ziel_puffer:
          name: "Ladefaktor normal"
          description: >-
            Multiplikator für den berechneten Ladestrom (typisch 1,5). Der Blueprint ermittelt, wie viel Strom rechnerisch nötig wäre, um die Batterie bis Sonnenuntergang zu füllen — und multipliziert ihn mit diesem Faktor. Höher = die Batterie wird zügiger voll (sicherer bei Prognosefehlern, aber weniger Überschuss bleibt für Peak-Shaving). Niedriger = knapper kalkuliert, mehr Überschuss verfügbar.
          default: 1.3
          selector: {"number": {"min": 1.0, "max": 2.0, "step": 0.1}}
        faktor_fallback:
          name: "Ladefaktor Eskalation"
          description: >-
            Multiplikator für die Eskalations-Prüfung (typisch 1,3, also strenger als der Normalfaktor). Damit entscheidet der Blueprint, ob die verbleibende Sonnenzeit überhaupt noch reicht. Reicht sie auch mit diesem Faktor nicht, gibt er die Feinsteuerung auf und schaltet auf vollen Ladestrom („Fall B“).
          default: 1.2
          selector: {"number": {"min": 1.0, "max": 2.0, "step": 0.1}}
        puffer_kwh:
          name: "Sicherheits-Puffer (kWh)"
          description: >-
            Fester Energie-Zuschlag in kWh auf den berechneten Bedarf. Fängt Prognosefehler ab: Der Blueprint plant so, als bräuchte die Batterie etwas mehr, als sie eigentlich braucht. Bei sehr wechselhaftem Wetter erhöhen.
          default: 1.0
          selector: {"number": {"min": 0.0, "max": 5.0, "step": 0.1}}
        fallback_max_soc:
          name: "Eskalation: SOC-Obergrenze (%)"
          description: >-
            Ladezustand in Prozent, oberhalb dessen nicht mehr eskaliert wird. Ist die Batterie schon so voll, bringt Vollgas-Laden nichts mehr — der Blueprint bleibt dann bei der feinen Regelung.
          default: 95
          selector: {"number": {"min": 50, "max": 100, "step": 1, "unit_of_measurement": "%"}}
        fallback_min_kwh:
          name: "Eskalation: Bagatellgrenze (kWh)"
          description: >-
            Energiemenge in kWh, unterhalb derer nicht mehr auf vollen Ladestrom eskaliert wird. Fehlen der Batterie also weniger als dieser Wert bis „voll“, bleibt es bei der feinen Regelung. Verhindert, dass wegen 200 Wh Restbedarf noch auf Maximalstrom umgeschaltet wird.
          default: 1.0
          selector: {"number": {"min": 0.1, "max": 5.0, "step": 0.1, "unit_of_measurement": "kWh"}}
        min_reststunden:
          name: "Eskalation: Mindest-Restladezeit (h)"
          description: >-
            Mindest-Restladezeit in Stunden. Ist weniger Sonnenzeit übrig als hier eingestellt, verzichtet der Blueprint auf die Eskalation — der volle Ladestrom würde in der kurzen Zeit ohnehin nichts mehr bringen.
          default: 1.0
          selector: {"number": {"min": 0.0, "max": 4.0, "step": 0.25, "unit_of_measurement": "h"}}
        duration_cooldown:
          name: "Sperrzeit nach Zwangsladung"
          description: >-
            Zeitdauer (hh:mm:ss), die nach einer Winter-Zwangsladung vergehen muss, bevor die nächste starten darf. Verhindert, dass sich das System bei dauerhaft schlechtem Wetter hochschaukelt und ständig aus dem Netz nachlädt.
          default: "04:00:00"
          selector: {"time": {}}
trigger_variables:
  tv_battery_soc: !input battery_soc_sensor
  t_cooldown: !input helper_timer_cooldown
  tv_vmax1: !input vmax1_sensor
  tv_vmax2: !input vmax2_sensor
  tv_vmax3: !input vmax3_sensor
  tv_top_balancing_voltage: !input top_balancing_voltage

trigger:
  - alias: "Trigger: JSON Profil pflegen (Alle 30 Min)"
    platform: time_pattern
    minutes: "/30"
    id: update_json
  - alias: "Trigger: Laufende Überwachung (alle 5 Minuten)"
    platform: time_pattern
    minutes: "/5"
  - alias: "Trigger: Zellspannungs-Schwelle erreicht (Top-Balancing sofort fangen)"
    platform: template
    value_template: >
      {% set v1 = states(tv_vmax1) | float(0) %}
      {% set v2 = states(tv_vmax2) | float(0) %}
      {% set v3 = states(tv_vmax3) | float(0) if tv_vmax3 != '' else 0 %}
      {% set schwelle = tv_top_balancing_voltage | float(3.4) %}
      {{ v1 >= schwelle or v2 >= schwelle or v3 >= schwelle }}
    id: vmax_schwelle
  - alias: "Trigger: Tägliche Maintenance (Reset & BMS Check)"
    platform: time
    at: "23:58:00"
    id: maintenance
  - alias: "Trigger: Sonnenuntergang Check (Verlust-Tracking)"
    platform: sun
    event: sunset
    offset: "00:30:00"
    id: sunset_check
  - alias: "Trigger WP Boost ENDE (Rückfall auf Normalwerte)"
    platform: state
    entity_id: !input helper_timer_wp_boost
    to: "idle"
    from: "active"
    id: wp_boost_ende
  - alias: "Trigger Zwangsladung START: 10 Tage nicht voll"
    platform: template
    value_template: >
      {{ (states(tv_battery_soc) | float(100)) < 100 }}
    for: {days: 10}
    id: zwangsladung_start
  - alias: "Trigger Zwangsladung COOLDOWN: 100% erreicht"
    platform: template
    value_template: >
      {{ (states(tv_battery_soc) | float(0)) > 99.9 }}
    id: zwangsladung_100
  - alias: "Trigger Zwangsladung ENDE: Cooldown Timer abgelaufen"
    platform: state
    entity_id: !input helper_timer_cooldown
    to: "idle"
    from: "active"
    id: zwangsladung_ende
  - alias: "Trigger Float-Boost START: Zellpflege Timer läuft los"
    platform: state
    entity_id: !input helper_timer_cooldown
    to: "active"
    from: "idle"
    id: float_boost_start
  - alias: "Trigger Float-Boost ENDE: Zellpflege Timer abgelaufen"
    platform: state
    entity_id: !input helper_timer_cooldown
    to: "idle"
    from: "active"
    id: float_boost_ende
  - alias: "Trigger Peak-Shaving ENDE: Hold-Timer abgelaufen"
    platform: state
    entity_id: !input helper_timer_peak
    to: "idle"
    from: "active"
    id: peak_shaving_ende
  - alias: "Trigger WP-Anlauf START: sofortige WP-Sperre"
    # Ohne diesen Trigger würde die WP-Sperre erst beim nächsten 5-Min-Lauf
    # greifen: wp_sperre_aktiv wird am Lauf-Anfang aus dem Timer-Zustand
    # berechnet, der beim Boost-Start-Lauf noch idle ist (Timer wird erst
    # später im selben Lauf gestartet). Dieser Trigger stößt direkt nach dem
    # Timer-Start (idle->active) einen neuen Lauf an; dort ist der Timer active,
    # wp_sperre_aktiv wird True, Prio 4 verriegelt sofort.
    platform: state
    entity_id: !input helper_timer_wp_anlauf
    to: "active"
    from: "idle"
    id: wp_anlauf_start

# ====================================================================
# QUEUED MODE (Schützt Timer-Events vor parallelen Triggern)
# ====================================================================
mode: queued
max: 10
trace:
  stored_traces: 400

action:
  # ====================================================================
  # GLOBALE VARIABLEN FÜR DEN GESAMTEN ACTION-BLOCK
  # ====================================================================
  - variables:
      bp_version: "[V2.9.25]"
      var_battery_total_charge: !input battery_total_charge
      var_battery_total_discharge: !input battery_total_discharge
      var_helper_tare_charge: !input helper_tare_charge
      var_helper_blockade_beendet: !input helper_blockade_beendet
      var_helper_tare_discharge: !input helper_tare_discharge
      var_schatten_bms: !input schatten_bms_sensor
      var_lade_modus: !input helper_lade_modus

  # ====================================================================
  # DEYE-RETRY (V2.9.18, ueberarbeitet in V2.9.20)
  #
  # HINTERGRUND (07.07.2026, Standort 2 / Dachterrasse): Ein Deye-Sensor
  # ging fuer ~6s auf 'nicht verfuegbar' (11:49:59 -> 11:50:05). Dadurch
  # fiel aktueller_soc auf den Fallback 0 und packs_online auf 0,
  # freie_kwh sprang faelschlich auf fast die volle Kapazitaet, und das
  # loeste einen fehlerhaften dynamischen Blockade-Austritt aus. Der
  # TAGESMARKER (helper_blockade_beendet) verriegelt diesen fehlerhaften
  # Austritt fuer den GESAMTEN Resttag - ein einzelner kurzer Aussetzer
  # hatte also einen ganztaegigen Effekt.
  #
  # WARUM DIE PRUEFUNG HIER GANZ AM ANFANG STEHT (wichtig!):
  # Geprueft wird var_battery_total_charge - aber NICHT, weil nur dieser
  # eine Wert gebraucht wuerde, sondern weil er die ERSTE Variable aus der
  # Deye-Integration ist und damit als INDIKATOR fuer einen generellen
  # Kommunikations-Aussetzer der GESAMTEN Deye-Anbindung dient.
  # Der anschliessende Delay wirkt naemlich auf ALLE Deye-Werte des Laufs:
  # SOC (aktueller_soc), Batterieleistung, Netz-Export (Peak-Shaving),
  # PV-Leistung, Schatten-BMS-Zaehler usw. werden nach dem Delay alle neu
  # gerendert (Jinja-Templates werten states() erst zur Laufzeit aus).
  # -> Der Retry darf deshalb NICHT an einen einzelnen Codepfad oder an
  #    bestimmte Trigger gebunden werden. Jeder Lauf nutzt Deye-Werte,
  #    also braucht jeder Lauf diesen Schutz.
  #
  # LOGGING-PHILOSOPHIE (V2.9.20):
  # Kurze Aussetzer sind bei der Deye-Modbus-Anbindung NORMAL und treten
  # regelmaessig auf. Der Retry ist der eingeplante Normalfall und laeuft
  # deshalb STILL - kein Logbuch-Eintrag (das erzeugte bisher nur
  # Rauschen, u.a. weil die Automation auch durch schnelle Zustands-
  # Trigger wie die Zellspannungs-Schwelle ausgeloest wird).
  # Geloggt wird NUR der PROBLEMFALL: wenn der Wert auch nach den 10s
  # immer noch fehlt. Dann greifen zwar die bestehenden Fallbacks (die
  # Automation blockiert nicht), aber der Lauf rechnet moeglicherweise
  # mit unvollstaendigen Deye-Daten - und genau das will man sehen.
  # ====================================================================
  - if:
      - condition: template
        value_template: >
          {{ states(var_battery_total_charge) in ['unavailable','unknown'] }}
    then:
      # Stiller Retry: keine Meldung, nur warten und danach neu lesen.
      - delay: "00:00:10"
      # Zweite Pruefung NACH dem Delay: ist der Wert immer noch weg?
      # Nur dann handelt es sich um ein echtes Problem (nicht mehr um den
      # normalen, kurzen Modbus-Aussetzer) -> jetzt warnen.
      - if:
          - condition: template
            value_template: >
              {{ states(var_battery_total_charge) in ['unavailable','unknown'] }}
        then:
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: "{{ bp_version }} WARNUNG: Deye-Sensor (Battery Total Charge) auch nach 10s Retry noch 'nicht verfügbar'. Dieser Lauf rechnet mit Fallback-Werten - Deye-Anbindung prüfen!"
              entity_id: !input helper_logbook_dummy

  # ====================================================================
  # DATENPFLEGE: 30-MINUTEN JSON PROFIL UPDATEN & RESETTEN (JETZT kWh)
  # ====================================================================
  - if:
      - condition: trigger
        id: update_json
    then:
      - variables:
          var_hausverbrauch_json: !input hausverbrauch_json_text
          var_hausverbrauch_kwh: !input hausverbrauch_utility_sensor
          # Finde die Halbstunde heraus, die exakt JETZT geendet hat.
          # Beispiel: Trigger um 14:00 -> Es geht um 13:30 bis 14:00 Uhr. (now() - 15 Min = 13:45 Uhr).
          # Daraus errechnet sich der korrekte Index (0 bis 47).
          # WICHTIG: alles in EINEM Template. HA konvertiert datetime-Variablen zwischen
          # Blöcken zu Strings; ein separates calc_time würde beim Zugriff auf .hour crashen.
          h_index: >
            {% set t = now() - timedelta(minutes=15) %}
            {{ t.hour * 2 + (1 if t.minute >= 30 else 0) }}
          json_str_pre: "{{ states(var_hausverbrauch_json) }}"
      # UNKNOWN-SCHUTZ: Direkt nach einem HA-Neustart kann der Helfer kurz
      # 'unknown' sein, bevor der Zustand restauriert wird. Ohne Schutz würde
      # der Kaltstart das gute Profil mit einem Einheitswert überschreiben.
      # -> 1 Minute warten (mode: queued fängt parallele Trigger ab), dann neu lesen.
      - if:
          - condition: template
            value_template: "{{ json_str_pre in ['unknown', 'unavailable'] }}"
        then:
          - delay: "00:01:00"
      - variables:
          # Frisch lesen (nach evtl. Wartezeit). HA liefert den gespeicherten
          # JSON-Wert MANCHMAL bereits als native Liste statt als String
          # (dasselbe Phänomen wie beim from_json). Beide Fälle sind gültig.
          json_str: "{{ states(var_hausverbrauch_json) }}"
          json_ist_liste: "{{ json_str is iterable and json_str is not string }}"
          json_gueltig: >
            {{ json_ist_liste or (json_str is string and json_str | length > 20 and json_str[0] == '[') }}
          # Kaltstart-Default darf NUR beim Mitternachts-Lauf gesetzt werden.
          # Zu allen anderen Zeiten wird der Slot bei ungültigem Helfer übersprungen
          # (nächster 30-Min-Lauf versucht es erneut).
          ist_mitternachtslauf: "{{ now().hour == 0 and now().minute < 15 }}"
      - if:
          - condition: template
            value_template: "{{ not json_gueltig and not ist_mitternachtslauf }}"
        then:
          - action: logbook.log
            data:
              name: "PV Optimizer"
              # json_str | string erzwingt String vor truncate (json_str kann Liste sein).
              message: "{{ bp_version }} JSON-Profil: Helfer ungültig ('{{ json_str | string | truncate(30) }}') und kein Mitternachtslauf. Slot {{ h_index }} übersprungen, kein Kaltstart ausgelöst."
              entity_id: !input helper_logbook_dummy
          - stop: "JSON-Slot übersprungen: Helfer ungültig, warte auf Wiederherstellung oder Mitternacht."
      - variables:
          # Lese verbrauchte Energie der letzten 30 Min DIREKT in kWh (keine Watt-Umrechnung mehr)
          last_half_hour_kwh: "{{ states(var_hausverbrauch_kwh) | float(0) }}"
          # KALTSTART-WERT: geclampter Messwert (0.05-0.6 kWh), schützt vor Ausreißer-Vergiftung.
          # Greift nur noch beim Mitternachts-Lauf mit ungültigem Helfer (siehe Gate oben).
          kaltstart_kwh: "{{ [[last_half_hour_kwh, 0.05] | max, 0.6] | min }}"
          default_arr: "{{ [kaltstart_kwh] * 48 }}"
          current_array: >
            {{ json_str if json_ist_liste else (json_str | from_json if json_gueltig else default_arr) }}
          # Der 7-Tage Exponential Moving Average (EMA) auf kWh-Basis
          new_val: "{{ (current_array[h_index] * (6/7)) + (last_half_hour_kwh * (1/7)) }}"
          new_array: >
            {% set ns = namespace(arr=[]) %}
            {% for i in range(48) %}
              {% if i == h_index %}
                {# round(2) statt round(3): input_text hat ein 255-Zeichen-Limit.
                   48 Werte x 5 Zeichen (round 3) = 289 Zeichen -> set_value würde scheitern.
                   Mit round(2) max. 241 Zeichen. #}
                {% set ns.arr = ns.arr + [new_val | round(2)] %}
              {% else %}
                {% set ns.arr = ns.arr + [current_array[i]] %}
              {% endif %}
            {% endfor %}
            {{ ns.arr | to_json }}
      - action: input_text.set_value
        target:
          entity_id: !input hausverbrauch_json_text
        data:
          value: "{{ new_array }}"
      - action: utility_meter.calibrate
        target:
          entity_id: !input hausverbrauch_utility_sensor
        data:
          value: "0"
      - stop: "JSON-Hausverbrauchsprofil (kWh) aktualisiert und Zähler genullt."

  # ====================================================================
  # KASKADIERTE VARIABLEN FÜR DIE HAUPTSTEUERUNG
  # ====================================================================
  - variables:
      var_grid_export: !input grid_export_sensor
      var_grid_export_kwh: !input grid_export_kwh_heute
      var_speicherverlust: !input speicherverlust_gesamt
      var_max_soc_heute: !input helper_max_soc_heute
      var_battery_soc: !input battery_soc_sensor
      var_wp_temp: !input wp_temp_sensor
      var_wp_water_heater: !input wp_water_heater
      var_wp_kompressor: !input wp_kompressor_sensor
      var_solcast_heute: !input solcast_heute_sensor
      var_solcast_rest_sensor: !input solcast_rest_sensor
      var_hausverbrauch_json: !input hausverbrauch_json_text
      var_wr_max_charge: !input wr_max_charge_current
      var_wr_grid_charge_switch: !input wr_grid_charge_switch
      var_battery_power: !input battery_power_sensor
      var_pv_power: !input pv_power_sensor
      var_pv_forecast: !input solcast_current_sensor
      var_solcast_next_hour: !input solcast_next_hour_sensor

      var_vmax1: !input vmax1_sensor
      var_vmax2: !input vmax2_sensor
      var_vmax3: !input vmax3_sensor

      var_bms1_temp_min: !input bms1_temp_min_sensor
      var_bms2_temp_min: !input bms2_temp_min_sensor
      var_bms3_temp_min: !input bms3_temp_min_sensor
      var_bms1_temp_max: !input bms1_temp_max_sensor
      var_bms2_temp_max: !input bms2_temp_max_sensor
      var_bms3_temp_max: !input bms3_temp_max_sensor

      var_zwangsladung_aktiv: !input helper_zwangsladung_aktiv
      var_batterie_heute_voll: !input helper_batterie_heute_voll
      var_json_tracking: !input json_tracking_sensor
      var_wr_tou_1: !input wr_tou_1
      var_wr_tou_2: !input wr_tou_2
      var_wr_tou_3: !input wr_tou_3
      var_wr_tou_4: !input wr_tou_4
      var_wr_tou_5: !input wr_tou_5
      var_wr_tou_6: !input wr_tou_6
      var_eingriff_dauer: !input eingriff_dauer_sensor
      var_timer_wp_anlauf: !input helper_timer_wp_anlauf
      var_timer_wp_boost: !input helper_timer_wp_boost
      var_timer_peak: !input helper_timer_peak
      var_timer_cooldown: !input helper_timer_cooldown
      var_wp_boost_aktiv: !input wp_boost_aktiv
      var_wr_float_voltage: !input wr_float_voltage_sensor
      var_schwelle_peak_shaving: !input schwelle_peak_shaving
      var_schwelle_wp_boost: !input schwelle_wp_boost

      pack_capacity_ah: !input pack_capacity_ah
      crate_2_deg: !input crate_2_deg
      crate_5_deg: !input crate_5_deg
      crate_10_deg: !input crate_10_deg
      crate_12_deg: !input crate_12_deg
      crate_15_deg: !input crate_15_deg
      crate_20_deg: !input crate_20_deg
      crate_40_deg: !input crate_40_deg
      crate_45_deg: !input crate_45_deg

      faktor_ziel_puffer: !input faktor_ziel_puffer
      faktor_fallback: !input faktor_fallback
      fallback_max_soc: !input fallback_max_soc
      fallback_min_kwh: !input fallback_min_kwh
      min_reststunden: !input min_reststunden
      max_ampere: !input max_ampere
      null_ampere: 0
      min_ampere: !input min_ampere
      peak_ampere: !input peak_ampere
      nominale_spannung: !input nominale_spannung
      default_tou_soc: !input default_tou_soc
      escalation_tou_soc: !input escalation_tou_soc
      grid_ampere_zwangsladung: !input grid_ampere_zwangsladung
      top_balancing_soc: !input top_balancing_soc
      top_balancing_voltage: !input top_balancing_voltage
      var_float_normal: !input float_voltage_normal
      var_float_balancing: !input float_voltage_balancing
      var_wp_ziel_temp_pv: !input wp_ziel_temp_pv
      var_wp_ziel_number: !input wp_ziel_temp_number
      var_wp_hysterese_pv: !input wp_hysterese_pv
      var_wp_ziel_temp_normal: !input wp_ziel_temp_normal
      var_wp_hysterese_normal: !input wp_hysterese_normal
      puffer_kwh: !input puffer_kwh
      var_zeit_blockade: !input zeit_blockade_ende

  - variables:
      grid_export: "{{ (states(var_grid_export) | float(0)) * -1 }}"
      aktueller_soc: "{{ states(var_battery_soc) | float(0) }}"
      ww_temp: "{{ states(var_wp_temp) | float(50) }}"
      aktueller_ladestrom: "{{ states(var_wr_max_charge) | float(140) }}"
      batterie_leistung: "{{ states(var_battery_power) | float(0) }}"
      pv_power: "{{ states(var_pv_power) | float(0) }}"
      pv_forecast: "{{ states(var_pv_forecast) | float(0) }}"
      vmax1: "{{ states(var_vmax1) | float(0) }}"
      vmax2: "{{ states(var_vmax2) | float(0) }}"
      vmax3: "{{ states(var_vmax3) | float(0) }}"
      eingriff_dauer: "{{ states(var_eingriff_dauer) | float(0) }}"
      is_day: "{{ is_state('sun.sun', 'above_horizon') }}"
      schwelle_peak_shaving: "{{ var_schwelle_peak_shaving | float(6500) }}"
      schwelle_wp_boost: "{{ var_schwelle_wp_boost | float(6400) }}"

      pack_capacity_ah: "{{ pack_capacity_ah | float(314) }}"
      crate_2_deg: "{{ crate_2_deg | float(0.00) }}"
      crate_5_deg: "{{ crate_5_deg | float(0.05) }}"
      crate_10_deg: "{{ crate_10_deg | float(0.20) }}"
      crate_12_deg: "{{ crate_12_deg | float(0.30) }}"
      crate_15_deg: "{{ crate_15_deg | float(0.50) }}"
      crate_20_deg: "{{ crate_20_deg | float(0.70) }}"
      crate_40_deg: "{{ crate_40_deg | float(0.70) }}"
      crate_45_deg: "{{ crate_45_deg | float(0.00) }}"

      puffer_kwh: "{{ puffer_kwh | float(1.0) }}"
      faktor_ziel_puffer: "{{ faktor_ziel_puffer | float(1.3) }}"
      faktor_fallback: "{{ faktor_fallback | float(1.2) }}"
      max_ampere: "{{ max_ampere | float(140) }}"
      min_ampere: "{{ min_ampere | float(7) }}"
      peak_ampere: "{{ peak_ampere | float(48) }}"
      nominale_spannung: "{{ nominale_spannung | float(51.2) }}"
      top_balancing_soc: "{{ top_balancing_soc | float(97) }}"
      top_balancing_voltage: "{{ top_balancing_voltage | float(3.4) }}"

      vor_blockade_ende: >
        {% set t = today_at(var_zeit_blockade | string) %}
        {{ now() < t }}
      pack1_online: "{{ var_bms1_temp_min != '' and states(var_bms1_temp_min) | float(-999) != -999 }}"
      pack2_online: "{{ var_bms2_temp_min != '' and states(var_bms2_temp_min) | float(-999) != -999 }}"
      pack3_online: "{{ var_bms3_temp_min != '' and states(var_bms3_temp_min) | float(-999) != -999 }}"
      packs_online: "{{ (1 if pack1_online else 0) + (1 if pack2_online else 0) + (1 if pack3_online else 0) }}"

      # NEU (V2.9.19): Entprellung des BMS-Offline-Notlaufs.
      # Problem: Beim Flashen/Reboot des ESP gehen die BMS-Sensoren kurz auf
      # 'unavailable'. Bisher loeste das SOFORT den 10A-Notlauf + die Warnung
      # aus (packs_online == 0). Ein normaler Reboot (< einige Minuten) soll
      # das NICHT mehr tun.
      # Logik: packs_offline_bestaetigt ist nur dann true, wenn packs_online
      # == 0 UND alle vorhandenen (nicht-leeren) BMS-Temp-Sensoren bereits
      # laenger als offline_debounce_s (300s) 'unavailable'/'unknown' sind.
      # Messung ueber last_changed: Beim Wechsel verfuegbar -> unavailable
      # setzt HA last_changed auf den Umschaltzeitpunkt; solange der Sensor
      # unavailable BLEIBT, waechst (now() - last_changed) monoton. Ein Reboot
      # (Sensor kommt vor 300s zurueck) unterschreitet die Schwelle -> kein
      # Notlauf. Ein echter Dauerausfall (> 300s) -> Notlauf greift wie bisher.
      # Bewusster Trade-off (vom Nutzer bestaetigt): waehrend der Entprellzeit
      # wird ggf. ohne Temperaturschutz geladen - unkritisch, da die
      # Ladeleistung hier nie hoch genug wird, dass Temperatur limitierend ist.
      offline_debounce_s: 300
      # Hilfsausdruck: ist ein einzelner Sensor laenger als die Schwelle weg?
      # (leerer Input -> zaehlt NICHT als offline, wird uebersprungen)
      pack1_lange_offline: >
        {{ var_bms1_temp_min == '' or
           (states(var_bms1_temp_min) in ['unavailable','unknown']
            and (as_timestamp(now()) - as_timestamp(states[var_bms1_temp_min].last_changed | default(now()))) > offline_debounce_s) }}
      pack2_lange_offline: >
        {{ var_bms2_temp_min == '' or
           (states(var_bms2_temp_min) in ['unavailable','unknown']
            and (as_timestamp(now()) - as_timestamp(states[var_bms2_temp_min].last_changed | default(now()))) > offline_debounce_s) }}
      pack3_lange_offline: >
        {{ var_bms3_temp_min == '' or
           (states(var_bms3_temp_min) in ['unavailable','unknown']
            and (as_timestamp(now()) - as_timestamp(states[var_bms3_temp_min].last_changed | default(now()))) > offline_debounce_s) }}
      # Bestaetigt offline nur, wenn KEIN Pack online ist UND alle vorhandenen
      # Packs die Zeitschwelle ueberschritten haben.
      packs_offline_bestaetigt: >
        {{ packs_online == 0 and pack1_lange_offline and pack2_lange_offline and pack3_lange_offline }}

      batterie_kapazitaet: >
        {% set p_count = packs_online if packs_online > 0 else 1 %}
        {{ (pack_capacity_ah * nominale_spannung * p_count) / 1000 }}

      next_hour_50: "{{ states(var_solcast_next_hour) | float(0) }}"
      next_hour_10: "{{ state_attr(var_solcast_next_hour, 'estimate10') | float(0) }}"
      next_hour_anomalie: "{{ next_hour_50 > 0 and ((next_hour_50 - next_hour_10) / next_hour_50) > 0.20 }}"
      solcast_log_addon: "{{ ' [Info: Prognose unsicher (>20% Varianz)]' if next_hour_anomalie else '' }}"

      # Haus-Profil ist in kWh/Halbstunde. Fallback (nur bis der erste update_json-Lauf
      # den Helfer gefüllt hat): neutrale 0.2 kWh/Halbstunde (~400 W).
      json_profil: >
        {% set j_str = states(var_hausverbrauch_json) %}
        {% set default_arr = [0.2] * 48 %}
        {{ j_str | from_json if j_str is string and j_str | length > 20 else default_arr }}

      solcast_rest_blended: >
        {% set ns = namespace(val=0) %}
        {% if var_solcast_heute != '' and state_attr(var_solcast_heute, 'detailedForecast') is not none %}
          {% for stunde in state_attr(var_solcast_heute, 'detailedForecast') %}
            {% set s_start = as_datetime(stunde.period_start) | as_local %}
            {% set current_period = now().replace(minute=0 if now().minute < 30 else 30, second=0, microsecond=0) %}

            {% if s_start >= current_period and s_start.date() == now().date() %}
              {# detailedForecast liefert kW (mittlere Leistung), nicht kWh -> * 0.5 h #}
              {% set blend = ((stunde.pv_estimate + stunde.pv_estimate10) / 2) * 0.5 %}
              {% set h_index = s_start.hour * 2 + (1 if s_start.minute >= 30 else 0) %}
              {% set haus_kwh = json_profil[h_index] | float(0.2) %}
              {% set netto = blend - haus_kwh %}
              {% set ns.val = ns.val + netto %}
            {% endif %}
          {% endfor %}
        {% else %}
          {% set ns.val = states(var_solcast_rest_sensor) | float(0) %}
        {% endif %}
        {{ ns.val }}

      solcast_nach_blockade: >
        {% set ns = namespace(val=0) %}
        {% if var_solcast_heute != '' and state_attr(var_solcast_heute, 'detailedForecast') is not none %}
          {% for stunde in state_attr(var_solcast_heute, 'detailedForecast') %}
            {% set s_start = as_datetime(stunde.period_start) | as_local %}

            {% set blockade_time = today_at(var_zeit_blockade | string) %}
            {% if s_start >= blockade_time and s_start.date() == now().date() %}
              {# detailedForecast liefert kW (mittlere Leistung), nicht kWh -> * 0.5 h #}
              {% set blend = ((stunde.pv_estimate + stunde.pv_estimate10) / 2) * 0.5 %}
              {% set h_index = s_start.hour * 2 + (1 if s_start.minute >= 30 else 0) %}
              {% set haus_kwh = json_profil[h_index] | float(0.2) %}
              {% set netto = blend - haus_kwh %}
              {% set ns.val = ns.val + netto %}
            {% endif %}
          {% endfor %}
        {% else %}
          {% set ns.val = states(var_solcast_rest_sensor) | float(0) %}
        {% endif %}
        {{ ns.val }}

      temp_min_live: >
        {% set vals = [] %}
        {% if pack1_online %}{% set vals = vals + [states(var_bms1_temp_min) | float(-99)] %}{% endif %}
        {% if pack2_online %}{% set vals = vals + [states(var_bms2_temp_min) | float(-99)] %}{% endif %}
        {% if pack3_online %}{% set vals = vals + [states(var_bms3_temp_min) | float(-99)] %}{% endif %}
        {{ vals | min if vals | length > 0 else -99 }}


      temp_max_live: >
        {% set vals = [] %}
        {% if pack1_online %}{% set vals = vals + [states(var_bms1_temp_max) | float(99)] %}{% endif %}
        {% if pack2_online %}{% set vals = vals + [states(var_bms2_temp_max) | float(99)] %}{% endif %}
        {% if pack3_online %}{% set vals = vals + [states(var_bms3_temp_max) | float(99)] %}{% endif %}
        {{ vals | max if vals | length > 0 else 99 }}

  - variables:
      limit_cold: >
        {% set t = temp_min_live %}
        {% if t <= 2 %} {{ crate_2_deg }}
        {% elif t < 5 %} {{ crate_2_deg + ((t - 2) * (crate_5_deg - crate_2_deg) / (5 - 2)) }}
        {% elif t < 10 %} {{ crate_5_deg + ((t - 5) * (crate_10_deg - crate_5_deg) / (10 - 5)) }}
        {% elif t < 12 %} {{ crate_10_deg + ((t - 10) * (crate_12_deg - crate_10_deg) / (12 - 10)) }}
        {% elif t < 15 %} {{ crate_12_deg + ((t - 12) * (crate_15_deg - crate_12_deg) / (15 - 12)) }}
        {% elif t < 20 %} {{ crate_15_deg + ((t - 15) * (crate_20_deg - crate_15_deg) / (20 - 15)) }}
        {% else %} {{ crate_20_deg }}
        {% endif %}

      limit_hot: >
        {% set t = temp_max_live %}
        {% if t >= 45 %} {{ crate_45_deg }}
        {% elif t > 40 %} {{ crate_40_deg + ((t - 40) * (crate_45_deg - crate_40_deg) / (45 - 40)) }}
        {% else %} {{ crate_40_deg }}
        {% endif %}

      temp_limit_crate: "{{ [limit_cold | float, limit_hot | float] | min }}"

      temp_limit_ampere_raw: >
        {% if packs_offline_bestaetigt %}
          10
        {% elif packs_online == 0 %}
          {# Kurzer Reboot (noch nicht als offline bestaetigt): NICHT auf 0A #}
          {# rechnen (packs_online==0 wuerde die Multiplikation zu 0 machen). #}
          {# Es wird mit dem sanften Notlauf-Strom 10A weitergeladen - Laden #}
          {# laeuft also durch, aber gebremst, nicht mit voller Leistung. #}
          {# Damit identisch zum bisherigen Verhalten bei packs_online==0; #}
          {# nur die WARNUNG ist ueber packs_offline_bestaetigt entprellt. #}
          10
        {% else %}
          {{ (temp_limit_crate * pack_capacity_ah * packs_online) | round(0) }}
        {% endif %}

      temperatur_limit_ampere: "{{ [temp_limit_ampere_raw, max_ampere] | min }}"
      freie_kwh: "{{ batterie_kapazitaet * (1 - (aktueller_soc / 100)) }}"
      # potential_export bleibt als Diagnosegröße (PV - Load, da sich die
      # Batterie herauskürzt) für Logs erhalten. Für die Schwellen-Entscheidungen
      # (WP-Boost, Peak-Shaving) ist aber der REALE Netz-Export maßgeblich:
      # Der Wechselrichter ist auf 60% kWp gedeckelt; entscheidend ist, was
      # tatsächlich ins Netz geht, nicht was die Batterie gerade puffert.
      potential_export: "{{ grid_export - batterie_leistung }}"
      real_export: "{{ grid_export }}"

      netto_tagesueberschuss: "{{ solcast_rest_blended - puffer_kwh }}"
      netto_nach_blockade: "{{ solcast_nach_blockade - puffer_kwh }}"

  # ====================================================================
  # NEU: ZEITANTEILIGE HALBSTUNDEN-SCHLEIFE (Ladezeit + Defizit)
  # ====================================================================
  - variables:
      slot_daten: >
        {% set ns = namespace(stunden=0.0, defizit=0.0) %}
        {% set jetzt = now() %}
        {% set slot_start = jetzt.replace(minute=(0 if jetzt.minute < 30 else 30), second=0, microsecond=0) %}
        {% if var_solcast_heute != '' and state_attr(var_solcast_heute, 'detailedForecast') is not none %}
          {% for slot in state_attr(var_solcast_heute, 'detailedForecast') %}
            {% set s_start = as_datetime(slot.period_start) | as_local %}
            {% if s_start.date() == jetzt.date() and s_start >= slot_start %}
              {% if s_start == slot_start %}
                {% set anteil = (slot_start + timedelta(minutes=30) - jetzt).total_seconds() / 1800 %}
              {% else %}
                {% set anteil = 1.0 %}
              {% endif %}
              {# detailedForecast liefert kW (mittlere Leistung), nicht kWh -> * 0.5 h #}
              {% set blend = ((slot.pv_estimate + slot.pv_estimate10) / 2) * 0.5 %}
              {% set h_index = s_start.hour * 2 + (1 if s_start.minute >= 30 else 0) %}
              {% set haus_kwh = json_profil[h_index] | float(0.2) %}
              {% set netto = (blend - haus_kwh) * anteil %}
              {% if netto > 0 %}
                {% set ns.stunden = ns.stunden + (0.5 * anteil) %}
              {% else %}
                {% set ns.defizit = ns.defizit + (netto | abs) %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ {'stunden': ns.stunden | round(3), 'defizit': ns.defizit | round(3)} | to_json }}

  - variables:
      # HA konvertiert das to_json-Ergebnis von slot_daten u.U. selbst zurück in ein Dict
      # (native type rendering). Deshalb beide Fälle abdecken: Dict direkt nutzen,
      # String erst per from_json parsen.
      slot_daten_dict: "{{ slot_daten if slot_daten is mapping else (slot_daten | from_json) }}"
      verf_stunden: "{{ slot_daten_dict.stunden | float(0) }}"
      defizit_kwh: "{{ slot_daten_dict.defizit | float(0) }}"
      benoetigt_kwh: "{{ freie_kwh + defizit_kwh }}"
      # Roh-Leistung OHNE Faktor (W). Faktor kommt je Prio dazu.
      # verf_stunden <= 0 -> 999999 erzwingt später "auf Max".
      noetige_leistung_roh: >
        {% if verf_stunden > 0 %}
          {{ (benoetigt_kwh / verf_stunden) * 1000 }}
        {% else %}
          999999
        {% endif %}

  - variables:
      lade_quote: >
        {% if netto_tagesueberschuss > 0 %}
          {% set q = (freie_kwh * faktor_ziel_puffer) / netto_tagesueberschuss %}
          {{ [ [q, 0] | max, 1.0 ] | min }}
        {% else %}
          1.0
        {% endif %}

  - variables:
      h_index_now: "{{ now().hour * 2 + (1 if now().minute >= 30 else 0) }}"
      # Haus-Profil ist kWh/Halbstunde -> für Momentan-Watt * 2000
      haus_aktuell_w: "{{ (json_profil[h_index_now] | float(0.2)) * 2000 }}"
      prognose_surplus: "{{ [pv_forecast - haus_aktuell_w, 0] | max }}"

      # === Zeit-basierte Ziel-Ströme ===
      amp_roh_13: "{{ (noetige_leistung_roh * faktor_ziel_puffer) / nominale_spannung }}"
      amp_roh_12: "{{ (noetige_leistung_roh * faktor_fallback) / nominale_spannung }}"
      # Prio 5 Normalfall (×1,3), gedeckelt durch min/max
      ziel_p5_raw: "{{ [[amp_roh_13 | round(0), min_ampere] | max, max_ampere] | min }}"
      # Fall (b): erreicht die strengere ×1,2-Rechnung selbst schon Max?
      # NUR wenn noch genug nutzbare Restladezeit da ist (min_reststunden) UND
      # der Bedarf über der Bagatellgrenze liegt (fallback_min_kwh). Verhindert
      # sinnlose Max-Verriegelung am Tagesende (Restzeit -> 0, Strom explodiert).
      fall_b_aktiv: >
        {{ (amp_roh_12 | round(0)) >= (max_ampere | round(0)) and
           verf_stunden >= (min_reststunden | float(1.0)) and
           benoetigt_kwh > (fallback_min_kwh | float(1.0)) }}

      temp_log_addon: " (Deckel durch Batterietemperatur: {{ temperatur_limit_ampere | round(0) }}A bei Min: {{ temp_min_live | round(1) }}°C / Max: {{ temp_max_live | round(1) }}°C / {{ temp_limit_crate | round(2) }}C)"
      target_p0: "{{ [max_ampere, temperatur_limit_ampere] | min }}"
      target_p1: "{{ [min_ampere, temperatur_limit_ampere] | min }}"
      target_p15: "{{ [max_ampere, temperatur_limit_ampere] | min }}"
      # Peak-Shaving nutzt den FESTEN Parameter peak_ampere (gedeckelt nur
      # durch Temperatur). Die frühere Kopplung an den dynamischen P5-Wert
      # (raw_peak = max(...)) war eine nicht abgestimmte Änderung und ist entfernt.
      target_p3: "{{ [peak_ampere, temperatur_limit_ampere] | min }}"
      # Prio 5 Zielstrom, zusätzlich durch Temperatur gedeckelt
      target_p5: "{{ [ziel_p5_raw, temperatur_limit_ampere] | min }}"

  - variables:
      zwangsladung_aktiv: "{{ is_state(var_zwangsladung_aktiv, 'on') }}"
      heute_schon_voll: "{{ is_state(var_batterie_heute_voll, 'on') }}"
      aktueller_modus: "{{ states(var_lade_modus) if var_lade_modus != '' else 'normal' }}"
      top_balancing_noetig: >
        {{ aktueller_soc >= top_balancing_soc and
        ((not heute_schon_voll and (vmax1 >= top_balancing_voltage or vmax2 >= top_balancing_voltage or (pack3_online and vmax3 >= top_balancing_voltage)))
        or (states(var_timer_cooldown) == 'active' and not zwangsladung_aktiv)) }}

      schnee_falle_aktiv: >
        {% set is_winter = now().month in [11, 12, 1, 2] %}
        {% set power_low = pv_power < (pv_forecast / 2) %}
        {% set diff_high = (pv_forecast - pv_power) > 1000 %}
        {{ is_winter and power_low and diff_high }}

      wp_sperre_aktiv: >
        {{ var_wp_boost_aktiv and states(var_timer_wp_anlauf) == 'active' }}

      # ==================================================================
      # NEU (V2.9.24): wp_boost_startet_gleich
      #
      # PROBLEM (Vorfall 13.07.2026, Standort 2, 13:55:02):
      # Im Logbuch standen zwei Eintraege zur SELBEN Sekunde:
      #   - "WP PV-Boost ausgeloest (Netz-Export 6599W > 6400W)"
      #   - "Prio 3 (Peak-Shaving) beendet: Hold-Timer abgelaufen"
      # Die zweite Meldung war FALSCH: Der Peak-Timer war 2 Sekunden zuvor
      # erst gestartet worden und lief 30 Minuten - er konnte unmoeglich
      # "abgelaufen" sein.
      #
      # ABLAUF, der dazu fuehrte:
      #  1. Lauf um 13:55:00, Export 6599W (> Peak 6500 UND > WP-Boost 6400).
      #  2. wp_sperre_aktiv wird am LAUF-ANFANG berechnet: der WP-Anlauf-Timer
      #     ist zu diesem Zeitpunkt noch 'idle' -> wp_sperre_aktiv = FALSE.
      #  3. Der Peak-Timer-Block prueft "export > 6500 and not wp_sperre_aktiv"
      #     -> erfuellt -> timer.start (Peak-Hold-Timer laeuft jetzt).
      #  4. WEITER UNTEN im selben Lauf wird der WP-Boost ausgeloest
      #     -> timer.vitocal_anlaufphase geht auf 'active'.
      #  5. Der Trigger "WP-Anlauf START" feuert -> die Automation laeuft ERNEUT
      #     (mode: queued). Jetzt ist wp_sperre_aktiv = TRUE.
      #  6. Der Zweig "Loescht den Peak-Shaving Timer" greift -> timer.cancel.
      #  7. Der Peak-Timer wechselt active -> idle. Genau darauf lauscht der
      #     Trigger 'peak_shaving_ende' (from: active, to: idle) -> er feuert
      #     -> Meldung "Hold-Timer abgelaufen" (obwohl er ABGEBROCHEN wurde).
      #
      # LOESUNG: Der Peak-Timer wird gar nicht erst gestartet, wenn im selben
      # Lauf ohnehin gleich ein WP-Boost ausgeloest wird. Dafuer wird hier
      # exakt DIESELBE Bedingung nachgebildet wie im WP-Boost-Zweig weiter
      # unten. Der unnoetige start->cancel-Zyklus (und damit der Fehl-Trigger)
      # entfaellt.
      #
      # GEWOLLTES VERHALTEN (vom Nutzer bestaetigt):
      #  * Der Peak-Timer soll weiterhin bei JEDEM Lauf neu gestartet werden,
      #    solange der Export > 6500W liegt (Verlaengerung ist erwuenscht).
      #  * Aber NUR, solange die WP nicht laeuft. Waehrend der WP-Anlaufphase
      #    ist Peak-Shaving komplett aus (die Batterie geht auf 0A, die WP
      #    bekommt den Ueberschuss). Sobald der Export danach wieder > 6500W
      #    steigt, startet Peak-Shaving normal neu.
      # ==================================================================
      wp_boost_startet_gleich: >
        {{ var_wp_boost_aktiv
           and real_export > schwelle_wp_boost
           and ww_temp < (var_wp_ziel_temp_pv - var_wp_hysterese_pv)
           and states(var_timer_wp_anlauf) != 'active'
           and states(var_timer_wp_boost) != 'active' }}

      # NEU (V2.9.17): Zeitlich begrenzte Battery-0A-Sperre fuer PRIO 4.
      # wp_sperre_aktiv bleibt UNVERAENDERT und steuert weiterhin (unabhaengig
      # von der Uhrzeit) die Peak-Shaving-Timer-Logik (Zeilen ~1455/1465) -
      # dort soll die Anlaufphase IMMER Peak-Shaving verhindern, auch nachmittags.
      # NUR die harte Batterie-0A-Verriegelung in PRIO 4 (Zeile ~1819) soll
      # kuenftig auf das (dynamische) Blockade-Ende begrenzt sein: startet die
      # WP NACH Blockade-Ende (z.B. nachmittags bei viel Sonne), verriegelt
      # PRIO 4 die Batterie nicht mehr auf 0A - Prio 5 darf normal weiterladen.
      # Bewusst NICHT "and not blockade_heute_beendet" direkt verwendet: diese
      # Variable wird erst WEITER UNTEN im selben variables-Block definiert
      # (Zeile ~935) und waere hier als Vorwaertsreferenz noch nicht verfuegbar.
      # Stattdessen wird dieselbe Pruefung inline wiederholt (var_helper_
      # blockade_beendet ist bereits ab Zeile 429 gesetzt, also sicher nutzbar).
      wp_sperre_batterie_0a_aktiv: >
        {{ wp_sperre_aktiv and vor_blockade_ende
           and not (var_helper_blockade_beendet != '' and states(var_helper_blockade_beendet) == 'on') }}

      wp_laufzeit_aktiv: >
        {{ states(var_timer_wp_boost) == 'active' }}

      wp_kompressor_aktiv: >
        {% if var_wp_kompressor != '' and states[var_wp_kompressor] is defined and states[var_wp_kompressor] is not none %}
          {% set state = states[var_wp_kompressor].state %}
          {% set last_changed = states[var_wp_kompressor].last_changed %}
          {% if state == 'on' %}true
          {% elif state == 'off' and last_changed is not none %}{{ (now() - last_changed).total_seconds() < (11 * 60) }}
          {% else %}false{% endif %}
        {% else %}false{% endif %}

      # ================================================================
      # DYNAMISCHES BLOCKADE-ENDE T:
      # Spätester Ladebeginn T (Halbstunden-Raster, nur VOLLSTÄNDIG in der
      # Zukunft liegende Slots = konservativ, der angebrochene Slot zählt
      # nicht mehr), sodass Netto-Prognose ab T noch >= faktor_ziel_puffer
      # (1,3) x freie_kwh. Liefert {'t': ISO oder '', 'gesamt': Netto ab
      # naechster Slotgrenze}. 'gesamt' dient dem finalen 1,2-Halt.
      # ================================================================
      blockade_dyn_json: >
        {% set ns = namespace(gesamt=0.0, kand=[]) %}
        {% if var_solcast_heute != '' and state_attr(var_solcast_heute, 'detailedForecast') is not none %}
          {% set blockade_time = today_at(var_zeit_blockade | string) %}
          {% for slot in state_attr(var_solcast_heute, 'detailedForecast') %}
            {% set s_start = as_datetime(slot.period_start) | as_local %}
            {% if s_start > now() and s_start.date() == now().date() %}
              {% set blend = ((slot.pv_estimate + slot.pv_estimate10) / 2) * 0.5 %}
              {% set h_index = s_start.hour * 2 + (1 if s_start.minute >= 30 else 0) %}
              {% set haus_kwh = json_profil[h_index] | float(0.2) %}
              {% set netto = blend - haus_kwh %}
              {% set ns.gesamt = ns.gesamt + netto %}
              {% if s_start <= blockade_time %}
                {# s_start | string erzwingt einen String; slot.period_start kann
                   je nach Solcast-Integration ein datetime-Objekt sein, das
                   spaeter to_json crashen liesse (Type not JSON serializable). #}
                {% set ns.kand = ns.kand + [[s_start | string, netto]] %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {% set ziel = faktor_ziel_puffer * freie_kwh %}
        {% set ns2 = namespace(best='', praefix=0.0, netto_ab_t=0.0) %}
        {% for paar in ns.kand %}
          {% if (ns.gesamt - ns2.praefix) >= ziel %}
            {% set ns2.best = paar[0] %}
            {# Netto ab genau diesem Kandidaten (= spätester Ladebeginn) bis
               Tagesende. ns.gesamt ist Tagesnetto, ns2.praefix die Summe der
               Slots davor -> Differenz = das, was ab T noch für die Batterie
               bleibt. Direkt vergleichbar mit freie_kwh (Bedarf). #}
            {% set ns2.netto_ab_t = ns.gesamt - ns2.praefix %}
          {% endif %}
          {% set ns2.praefix = ns2.praefix + paar[1] %}
        {% endfor %}
        {{ {'t': ns2.best, 'gesamt': ns.gesamt | round(2), 'netto_ab_t': ns2.netto_ab_t | round(2)} | to_json }}
      # Auswertung (HA kann das to_json-Ergebnis bereits als Dict liefern -> mapping-Check)
      blockade_dyn: "{{ blockade_dyn_json if blockade_dyn_json is mapping else (blockade_dyn_json | from_json) }}"
      blockade_dyn_t: "{{ blockade_dyn.t | default('') }}"
      blockade_dyn_gesamt: "{{ blockade_dyn.gesamt | default(0) | float(0) }}"
      blockade_dyn_netto_ab_t: "{{ blockade_dyn.netto_ab_t | default(0) | float(0) }}"
      # BLOCKADE-LOGIK (dynamisches Ende):
      # Existiert ein T (spaetester Ladebeginn, ab dem Netto >= 1,3 x frei):
      # blockieren. T wandert bei sinkender Prognose von selbst nach vorn.
      # Kein T mehr -> direkte Freigabe an die Kaskade (Prio 5). Der Faktor
      # faktor_fallback (1,2) wird NUR noch von Fall B (Max-Verriegelung) genutzt.
      # TAGESMARKER: Nach dem ersten Austritt (helper_blockade_beendet == on)
      # kein Wiedereintritt mehr bis zum Mitternachts-Reset.
      blockade_heute_beendet: "{{ var_helper_blockade_beendet != '' and states(var_helper_blockade_beendet) == 'on' }}"
      blockade_aktiv: >
        {{ is_day and aktueller_soc < 99 and vor_blockade_ende and not schnee_falle_aktiv
           and blockade_dyn_t != '' and not blockade_heute_beendet }}

# ====================================================================
# ROOT-ACTIONS STATE-MACHINE
# ====================================================================

  # BLOCKADE-AUSTRITT ERKENNEN: Modus steht noch auf 'blockade', aber die
  # Bedingung ist gefallen (T weg / SOC / Zeit) -> Tagesmarker setzen.
  #
  # FIX V2.9.21 (Log-Flut): Bisher fehlte hier der Guard gegen Wiederholung.
  # Beobachtet am 10.-12.07.2026: Die Meldung feuerte 6-8x im 5-Min-Takt
  # (z.B. 12.07.: 14:30, 14:35, 14:40, ... bis 15:00).
  # URSACHE: Die Bedingung prueft 'aktueller_modus == blockade' - das ist der
  # GESPEICHERTE Modus aus dem helper_lade_modus (also der Stand des LETZTEN
  # Laufs). Dieser wird erst weiter unten in der Prio-Kaskade neu gesetzt.
  # Solange kein Prio-Zweig den Modus umsetzt (z.B. weil der Ladestrom sich
  # nicht genug aendert), bleibt er auf 'blockade' stehen -> die Bedingung
  # war bei JEDEM Lauf erneut wahr -> Meldung + input_boolean.turn_on erneut.
  # Der alte Kommentar ("Feuert genau einmal, da der folgende Prio-Zweig den
  # Modus umsetzt") war also eine falsche Annahme.
  # LOESUNG: Zusaetzlich pruefen, dass der Tagesmarker noch NICHT gesetzt ist.
  # Damit feuert der Block genau einmal pro Tag - beim ersten Lauf nach dem
  # Austritt. Danach ist blockade_heute_beendet == true und der Block ruht,
  # unabhaengig davon, was der gespeicherte Modus gerade sagt.
  # (blockade_heute_beendet ist oben in Zeile ~1053 definiert, steht also
  #  hier sicher zur Verfuegung - keine Vorwaertsreferenz.)
  - if:
      - condition: template
        value_template: >
          {{ var_helper_blockade_beendet != '' and
             aktueller_modus == 'blockade' and not blockade_aktiv
             and not blockade_heute_beendet }}
    then:
      - action: input_boolean.turn_on
        target:
          entity_id: "{{ var_helper_blockade_beendet }}"
      - action: logbook.log
        data:
          name: "PV Optimizer"
          message: "{{ bp_version }} Blockade-Austritt: Tagesmarker gesetzt. Die Morgen-Blockade tritt heute nicht erneut ein (Reset um Mitternacht)."
          entity_id: !input helper_logbook_dummy

  - if:
      - condition: template
        value_template: "{{ var_max_soc_heute is string and var_max_soc_heute | length > 0 and aktueller_soc > (states(var_max_soc_heute) | float(0)) }}"
    then:
      - action: input_number.set_value
        target:
          entity_id: !input helper_max_soc_heute
        data:
          value: "{{ aktueller_soc }}"

  - if:
      - condition: template
        value_template: "{{ packs_offline_bestaetigt }}"
    then:
      - action: persistent_notification.create
        data:
          notification_id: "bms_offline_warning"
          title: "⚠️ PV Optimizer Warnung"
          message: "{{ bp_version }} BMS-Sensoren offline (seit > 5 Min)! Ladefreigabe auf 10A Notlauf gesetzt."
    else:
      - action: persistent_notification.dismiss
        data:
          notification_id: "bms_offline_warning"

  # ====================================================================
  # SCHATTEN-BMS ANTI-WINDUP (alle 5 Min):
  # Liest das Attribut 'raw_drift_soc' des Schatten-BMS-Sensors (Package).
  # Liegt der ungeclampte SOC > 100% (Nachladung nach dem Tare-Zeitpunkt),
  # werden beide Tare-Helfer auf die aktuellen Zählerstände nachgeführt
  # -> raw_drift_soc springt zurück auf exakt 100%.
  # Die SOC-Formel (cap/eff) lebt NUR im Package-Sensor, nicht hier.
  # ====================================================================
  - variables:
      schatten_raw_soc: >
        {% if var_schatten_bms == '' or var_helper_tare_charge == '' or var_battery_total_charge == '' %}
          -1
        {% else %}
          {{ state_attr(var_schatten_bms, 'raw_drift_soc') | float(-1) }}
        {% endif %}

  - if:
      - condition: template
        value_template: >
          {{ (schatten_raw_soc | float(-1)) > 100 and
             (states(var_battery_total_charge) | float(0)) > (states(var_helper_tare_charge) | float(0)) and
             states(var_timer_cooldown) != 'active' }}
    then:
      - action: logbook.log
        data:
          name: "PV Optimizer"
          message: >
            {{ bp_version }} Schatten-BMS Anti-Windup: Roh-SOC bei {{ schatten_raw_soc | float(0) | round(2) }}% (> 100%).
            Tare nachgeführt auf aktuelle Zählerstände (Charge: {{ states(var_helper_tare_charge) | float(0) | round(2) }} -> {{ states(var_battery_total_charge) | float(0) | round(2) }} kWh |
            Discharge: {{ states(var_helper_tare_discharge) | float(0) | round(2) }} -> {{ states(var_battery_total_discharge) | float(0) | round(2) }} kWh). Schatten-SOC neu verankert auf 100%.
          entity_id: !input helper_logbook_dummy
      - action: input_number.set_value
        target:
          entity_id: "{{ var_helper_tare_charge }}"
        data:
          value: "{{ states(var_battery_total_charge) | float(0) }}"
      - action: input_number.set_value
        target:
          entity_id: "{{ var_helper_tare_discharge }}"
        data:
          value: "{{ states(var_battery_total_discharge) | float(0) }}"

  - choose:
      - alias: "Tägliches Aufräumen & Sanity Checks"
        conditions:
          - condition: trigger
            id: maintenance
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input helper_batterie_heute_voll
          # Blockade-Tagesmarker zurücksetzen (falls konfiguriert)
          - if:
              - condition: template
                value_template: "{{ var_helper_blockade_beendet != '' }}"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ var_helper_blockade_beendet }}"
          - if:
              - condition: template
                value_template: "{{ var_lade_modus != '' }}"
            then:
              - action: input_select.select_option
                target:
                  entity_id: "{{ var_lade_modus }}"
                data:
                  option: "normal"
          # WP-MITTERNACHTS-CHECK: PV-Boost-Werte dürfen nicht über Nacht stehen
          # bleiben (z.B. wenn Timer durch Neustart verloren ging und auch der
          # 5-Min-Watchdog nicht griff). Harte Rücksetzung auf Normalwerte.
          - if:
              - condition: template
                value_template: >
                  {{ var_wp_boost_aktiv and var_wp_ziel_temp_pv != var_wp_ziel_temp_normal and
                     (state_attr(var_wp_water_heater, 'temperature') | float(-1) | round(0)) == (var_wp_ziel_temp_pv | float(0) | round(0)) }}
            then:
              - action: number.set_value
                target:
                  entity_id: !input wp_hysterese_number
                data:
                  value: "{{ var_wp_hysterese_normal }}"
              # RETRY-BAUSTEIN (siehe Boost-Ende): beide Entities, 10s prüfen, max 3.
              - repeat:
                  sequence:
                    - action: water_heater.set_temperature
                      target:
                        entity_id: !input wp_water_heater
                      data:
                        temperature: "{{ var_wp_ziel_temp_normal }}"
                    - if:
                        - condition: template
                          value_template: "{{ var_wp_ziel_number != '' }}"
                      then:
                        - action: number.set_value
                          target:
                            entity_id: "{{ var_wp_ziel_number }}"
                          data:
                            value: "{{ var_wp_ziel_temp_normal }}"
                    - delay: "00:00:10"
                  until:
                    - condition: template
                      value_template: >
                        {{ repeat.index >= 3 or (
                           (state_attr(var_wp_water_heater, 'temperature') | float(-1) | round(0)) == (var_wp_ziel_temp_normal | float(0) | round(0))
                           and (var_wp_ziel_number == '' or (states(var_wp_ziel_number) | float(-1) | round(0)) == (var_wp_ziel_temp_normal | float(0) | round(0)))
                        ) }}
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Mitternachts-Check: WP-Ziel stand noch auf PV-Boost-Wert ({{ var_wp_ziel_temp_pv }}°C). Zurückgesetzt nach {{ repeat.index }} Versuch(en) auf Ziel {{ var_wp_ziel_temp_normal }}°C / Hysterese {{ var_wp_hysterese_normal }}°C."
                  entity_id: !input helper_logbook_dummy
          # FLOAT-MITTERNACHTS-CHECK: Wenn der Cooldown-Timer (Balancing) verloren
          # ging, feuert float_boost_ende nie und die Float-Spannung bleibt auf
          # dem Balancing-Wert hängen. Timer idle + Float noch angehoben -> Reset.
          - if:
              - condition: template
                value_template: >
                  {{ var_wr_float_voltage != '' and
                     states(var_timer_cooldown) == 'idle' and
                     (var_float_balancing | float(0) | round(1)) != (var_float_normal | float(0) | round(1)) and
                     (states(var_wr_float_voltage) | float(0) | round(1)) == (var_float_balancing | float(0) | round(1)) }}
            then:
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_float_voltage }}"
                data:
                  value: "{{ var_float_normal }}"
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Mitternachts-Check: Float-Spannung stand noch auf Balancing-Wert ({{ var_float_balancing | round(3) }}V), obwohl der Cooldown-Timer idle ist (vermutlich Timer verloren). Zurückgesetzt auf {{ var_float_normal | round(3) }}V."
                  entity_id: !input helper_logbook_dummy
          - if:
              - condition: template
                value_template: "{{ var_max_soc_heute is string and var_max_soc_heute | length > 0 }}"
            then:
              - action: input_number.set_value
                target:
                  entity_id: !input helper_max_soc_heute
                data:
                  value: 0
          - if:
              - condition: state
                entity_id: !input helper_zwangsladung_aktiv
                state: "on"
              - condition: template
                value_template: "{{ states(var_wr_tou_1) | float(0) < 100 }}"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: !input helper_zwangsladung_aktiv
              - action: switch.turn_off
                target:
                  entity_id: "{{ var_wr_grid_charge_switch }}"
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Safety-Reset: Zwangsladung war aktiv, aber ToU-SOC nicht auf 100% (ToU-SOC 1: {{ states(var_wr_tou_1) }}% < 100%). Helfer wurde sicherheitshalber zurückgesetzt."
                  entity_id: !input helper_logbook_dummy

  - choose:
      - alias: "Aktionen bei Sonnenuntergang ausführen"
        conditions:
          - condition: trigger
            id: sunset_check
        sequence:
          - if:
              - condition: template
                value_template: "{{ var_grid_export_kwh is string and var_grid_export_kwh | length > 0 and var_speicherverlust is string and var_speicherverlust | length > 0 and var_max_soc_heute is string and var_max_soc_heute | length > 0 }}"
            then:
              - variables:
                  max_soc_tag: "{{ states(var_max_soc_heute) | float(0) }}"
                  missing_capacity_at_max_kwh: "{{ batterie_kapazitaet * (1 - (max_soc_tag / 100)) }}"
                  exported_kwh: "{{ states(var_grid_export_kwh) | float(0) }}"
                  lost_kwh: "{{ [missing_capacity_at_max_kwh, exported_kwh] | min }}"
                  current_tracker_val: "{{ states(var_speicherverlust) | float(0) }}"
              - if:
                  - condition: template
                    value_template: "{{ lost_kwh > 0.1 }}"
                then:
                  - action: input_number.set_value
                    target:
                      entity_id: !input speicherverlust_gesamt
                    data:
                      value: "{{ current_tracker_val + lost_kwh }}"
                  - action: logbook.log
                    data:
                      name: "PV Optimizer"
                      message: >
                        {{ bp_version }} SPEICHERVERLUST-TRACKER: Höchster Tages-SOC war {{ max_soc_tag }}%. Freier Platz zu diesem Zeitpunkt: {{ missing_capacity_at_max_kwh | round(2) }} kWh.
                        Tages-Einspeisung lag bei {{ exported_kwh | round(2) }} kWh.
                        Es wurden {{ lost_kwh | round(2) }} kWh als "Verschenkte Speicherkapazität" auf den Zähler addiert (Zähler Neu: {{ (current_tracker_val + lost_kwh) | round(2) }} kWh = Alt: {{ current_tracker_val | round(2) }} kWh + Min(Freiplatz: {{ missing_capacity_at_max_kwh | round(2) }} kWh, Einspeisung: {{ exported_kwh | round(2) }} kWh)).
                      entity_id: !input helper_logbook_dummy

          - if:
              - condition: state
                entity_id: !input helper_batterie_heute_voll
                state: "off"
              - condition: template
                value_template: "{{ eingriff_dauer > 0.5 }}"
            then:
              - action: persistent_notification.create
                data:
                  title: "⚠️ PV Optimizer Warnung"
                  message: "{{ bp_version }} Der Akku wurde heute nicht voll ({{ top_balancing_soc }}%), obwohl die Steuerung für {{ eingriff_dauer | round(1) }} Stunden eingegriffen hat. Bitte Logik prüfen!"
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} DIAGNOSE: Akku hat heute die Schwelle nicht erreicht, obwohl die Steuerung aktiv war (Höchster Tages-SOC: {{ states(var_max_soc_heute) }}% < Ziel-Schwelle: {{ top_balancing_soc }}% | Eingriff-Dauer: {{ eingriff_dauer | round(1) }}h > 0.5h)."
                  entity_id: !input helper_logbook_dummy

          - if:
              - condition: template
                value_template: "{{ ((aktueller_ladestrom | round(0)) - (target_p0 | round(0))) | abs >= 2 }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Feierabend: Die Sonne ist untergegangen. Ladestrom für die Nacht auf Maximalwert geöffnet (Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ target_p0 }}A | Limitierung durch Temp: {{ temperatur_limit_ampere | round(0) }}A).{{ temp_log_addon }}"
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ target_p0 }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "nacht"

  - choose:
      - alias: "BMS Balancing Logic"
        conditions:
          - condition: trigger
            id: maintenance
        sequence:
          # ============================================================
          # SCHRITT 1: 100%-TAGE-TRACKING AKTUALISIEREN (NEU V2.9.23)
          #
          # Laeuft als ERSTE Aktion im Maintenance-Lauf - also VOR dem
          # Auslesen der Liste weiter unten. Damit ist die Reihenfolge
          # (erst schreiben, dann auswerten) innerhalb EINES Laufs
          # garantiert; ein separater 23:57-Trigger ist nicht noetig.
          #
          # HINTERGRUND (Vorfall 12.07.2026, Standort 1):
          # Bisher erledigte das ein Trigger-Template-Sensor im Package,
          # der seinen EIGENEN State zurueck las (Selbstreferenz). Home
          # Assistant konvertiert Template-Ergebnisse aber automatisch in
          # native Typen: Ein String, der wie eine Liste aussieht, wird
          # intern zur echten Liste. Beim Zurueck-Lesen via states() erhielt
          # man dann deren Python-Repr mit EINFACHEN Anfuehrungszeichen:
          #     ['2026-07-05', '2026-07-06', ...]    <- KEIN gueltiges JSON
          # from_json scheiterte -> Render-Fehler -> Sensor 'unavailable'
          # -> die Liste war leer -> letztes_100_datum fiel auf den Fallback
          # '2000-01-01' -> der Blueprint hat die ToU-Programme von 20% auf
          # 30% hochgesetzt (Fehlsteuerung).
          #
          # LOESUNG: Die Liste liegt jetzt in einem input_text (Input
          # 'json_tracking_sensor' zeigt ab V2.9.23 auf einen input_text).
          # Der speichert IMMER als String - HA fuehrt dort keine
          # Typkonvertierung durch. Das Problem ist strukturell beseitigt.
          # Zusaetzlich ueberlebt ein input_text HA-Neustarts.
          # ============================================================
          - if:
              - condition: template
                value_template: "{{ var_json_tracking != '' }}"
            then:
              - variables:
                  # Robustes Einlesen: auch ein leerer oder kaputter Wert
                  # fuehrt hier nicht zum Absturz - dann wird mit [] begonnen.
                  tracking_roh: "{{ states(var_json_tracking) }}"
                  tracking_liste: >
                    {% if tracking_roh is string and tracking_roh.startswith('[') %}
                      {{ tracking_roh | from_json }}
                    {% else %}
                      {{ [] }}
                    {% endif %}
                  tracking_heute: "{{ now().strftime('%Y-%m-%d') }}"
                  tracking_war_voll: "{{ is_state(var_batterie_heute_voll, 'on') }}"
                  # Heutigen Tag anhaengen, wenn die Batterie voll war und er
                  # noch nicht drin steht. Immer auf die letzten 14 Tage
                  # begrenzen (input_text-Limit: 255 Zeichen, 14 Eintraege
                  # im JSON-Format = ~196 Zeichen).
                  tracking_neu: >
                    {% if tracking_war_voll and tracking_heute not in tracking_liste %}
                      {{ ((tracking_liste + [tracking_heute]) | sort)[-14:] }}
                    {% else %}
                      {{ tracking_liste[-14:] }}
                    {% endif %}
              - action: input_text.set_value
                target:
                  entity_id: "{{ var_json_tracking }}"
                data:
                  # to_json erzeugt korrektes JSON mit DOPPELTEN Quotes.
                  # Da input_text immer als String speichert, bleibt es dabei.
                  value: "{{ tracking_neu | to_json }}"

          # ============================================================
          # SCHRITT 2: BMS-BALANCING-LOGIK (liest die eben geschriebene Liste)
          # ============================================================
          - variables:
              tage_liste: >
                {% set s = states(var_json_tracking) %}
                {{ s | from_json if s is string and s.startswith('[') else [] }}
              heute: "{{ now().strftime('%Y-%m-%d') }}"
              gestern: "{{ (now() - timedelta(days=1)).strftime('%Y-%m-%d') }}"
              vor_9_tagen: "{{ (now() - timedelta(days=9)).strftime('%Y-%m-%d') }}"
              letztes_100_datum: "{{ tage_liste | max if tage_liste | length > 0 else '2000-01-01' }}"
              # AB V2.9.23: Es werden ALLE SECHS ToU-Register geprueft, nicht
              # mehr nur Programm 1.
              # VORHER: aktueller_min_soc = states(var_wr_tou_1) - der Blueprint
              # sah also nur Programm 1. Wurde z.B. nur Programm 3 (manuell in
              # der Deye-App oder durch einen fehlgeschlagenen Schreibvorgang)
              # auf einen anderen Wert gesetzt, blieb das unbemerkt: Programm 1
              # stimmte ja mit dem Soll ueberein -> die innere if-Bedingung
              # ('aktueller_min_soc != ziel') war false -> kein Nachsetzen.
              # Die sechs Register konnten so dauerhaft auseinanderlaufen.
              # JETZT: min und max ueber alle sechs. Weicht IRGENDEINES vom Soll
              # ab, unterscheidet sich mindestens einer der beiden Werte vom
              # Zielwert -> es wird nachgesetzt (alle sechs werden ohnehin
              # gemeinsam geschrieben).
              tou_werte: >
                {{ [
                     states(var_wr_tou_1) | float(20),
                     states(var_wr_tou_2) | float(20),
                     states(var_wr_tou_3) | float(20),
                     states(var_wr_tou_4) | float(20),
                     states(var_wr_tou_5) | float(20),
                     states(var_wr_tou_6) | float(20)
                   ] }}
              tou_min: "{{ tou_werte | min }}"
              tou_max: "{{ tou_werte | max }}"
              # Rueckwaertskompatibel beibehalten (wird noch in den Log-Meldungen
              # und im Safety-Reset-Zweig verwendet): der Wert von Programm 1.
              aktueller_min_soc: "{{ states(var_wr_tou_1) | float(20) }}"
              # NEU: 'alle sechs stimmen mit dem Sollwert ueberein' laesst sich
              # so pruefen: min == max == soll. Weicht auch nur eines ab, ist
              # entweder min oder max != soll.
              tou_alle_auf_default: "{{ tou_min == default_tou_soc | float(20) and tou_max == default_tou_soc | float(20) }}"
              tou_alle_auf_escalation: "{{ tou_min == escalation_tou_soc | float(30) and tou_max == escalation_tou_soc | float(30) }}"
          - choose:
              - alias: "Zwei Tage in Folge voll"
                conditions:
                  - condition: template
                    value_template: "{{ heute in tage_liste and gestern in tage_liste }}"
                sequence:
                  - if:
                      - condition: template
                        # AB V2.9.23: Prueft ALLE SECHS Register (via min/max).
                        # Weicht auch nur eines vom Sollwert ab, wird nachgesetzt.
                        value_template: "{{ not tou_alle_auf_default }}"
                    then:
                      - action: number.set_value
                        target:
                          entity_id:
                            - !input wr_tou_1
                            - !input wr_tou_2
                            - !input wr_tou_3
                            - !input wr_tou_4
                            - !input wr_tou_5
                            - !input wr_tou_6
                        data:
                          value: "{{ default_tou_soc }}"
                      - action: logbook.log
                        data:
                          name: "PV Optimizer"
                          message: "{{ bp_version }} BMS-Balancing: 2 Tage in Folge Voll-Schwelle erreicht. ToU-Programme 1-6 abgesenkt (ToU-SOC vorher min/max: {{ tou_min }}%/{{ tou_max }}% -> Ziel: {{ default_tou_soc }}%)."
                          entity_id: !input helper_logbook_dummy
              - alias: "Seit 9 Tagen nicht voll"
                conditions:
                  # FIX V2.9.22: Zusaetzliche Bedingung 'tage_liste | length > 0'.
                  #
                  # VORFALL 13.07.2026, Standort 1: Der Tracking-Sensor
                  # (json_tracking_sensor) fiel aus (Render-Fehler im Package,
                  # Sensor ging auf 'unavailable'). Dadurch war tage_liste LEER,
                  # und letztes_100_datum fiel auf den Fallback '2000-01-01'.
                  # Die Bedingung '2000-01-01 < vor_9_tagen' war damit trivial
                  # wahr -> der Blueprint hat die ToU-Programme 1-6 von 20% auf
                  # 30% HOCHGESETZT, obwohl die Batterie an praktisch jedem der
                  # Vortage voll war (Top-Balancing im Log belegt).
                  # Das ist eine echte FEHLSTEUERUNG (mehr Netzladung nachts),
                  # ausgeloest durch einen Sensorausfall.
                  #
                  # URSACHE DES DENKFEHLERS: '2000-01-01' ist ein FALLBACK fuer
                  # "keine Daten" - der Code behandelte ihn aber wie einen echten
                  # Messwert ("seit 26 Jahren nicht voll"). "Keine Daten" ist
                  # aber NICHT dasselbe wie "nicht voll gewesen".
                  #
                  # LOESUNG: Ohne Tracking-Daten wird KEINE Entscheidung
                  # getroffen. Faellt der Sensor aus, bleibt der ToU-SOC einfach
                  # unveraendert, bis wieder gueltige Daten vorliegen.
                  # (Gleiches Prinzip wie beim Deye-Retry: Fallback-Werte duerfen
                  #  keine Steuerungsaktionen ausloesen.)
                  - condition: template
                    value_template: "{{ tage_liste | length > 0 }}"
                  - condition: template
                    value_template: "{{ letztes_100_datum < vor_9_tagen }}"
                sequence:
                  - if:
                      - condition: template
                        # AB V2.9.23: Prueft ALLE SECHS Register (via min/max).
                        value_template: "{{ not tou_alle_auf_escalation }}"
                    then:
                      - action: number.set_value
                        target:
                          entity_id:
                            - !input wr_tou_1
                            - !input wr_tou_2
                            - !input wr_tou_3
                            - !input wr_tou_4
                            - !input wr_tou_5
                            - !input wr_tou_6
                        data:
                          value: "{{ escalation_tou_soc }}"
                      - action: logbook.log
                        data:
                          name: "PV Optimizer"
                          message: "{{ bp_version }} BMS-Balancing: Seit 9 Tagen Ziel-Schwelle nicht erreicht. ToU-Programme 1-6 erhöht (Letztes 100% SOC Datum: {{ letztes_100_datum }} < Grenze: {{ vor_9_tagen }} | ToU-SOC vorher min/max: {{ tou_min }}%/{{ tou_max }}% -> Ziel: {{ escalation_tou_soc }}%)."
                          entity_id: !input helper_logbook_dummy

  - choose:
      - alias: "ZWANGSLADUNG STARTEN"
        conditions:
          - condition: trigger
            id: zwangsladung_start
          - condition: template
            value_template: "{{ now().month in [11, 12, 1, 2] }}"
          - condition: state
            entity_id: !input helper_zwangsladung_aktiv
            state: "off"
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: !input helper_zwangsladung_aktiv
          - action: switch.turn_on
            target:
              entity_id: "{{ var_wr_grid_charge_switch }}"
          - action: number.set_value
            target:
              entity_id: !input wr_grid_charge_current
            data:
              value: "{{ grid_ampere_zwangsladung }}"
          - action: number.set_value
            target:
              entity_id:
                - !input wr_tou_1
                - !input wr_tou_2
                - !input wr_tou_3
                - !input wr_tou_4
                - !input wr_tou_5
                - !input wr_tou_6
            data:
              value: 100
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: "{{ bp_version }} Zwangsladung GESTARTET (Seit 10 Tagen nicht voll). Schalter aktiv (Gesamt-SOC: {{ aktueller_soc | round(1) }}% < 100% über 10 Tage | Aktueller Monat: {{ now().month }} in [11,12,1,2])."
              entity_id: !input helper_logbook_dummy

      - alias: "ZWANGSLADUNG: 100% ERREICHT"
        conditions:
          - condition: trigger
            id: zwangsladung_100
          - condition: state
            entity_id: !input helper_zwangsladung_aktiv
            state: "on"
          - condition: state
            entity_id: !input helper_timer_cooldown
            state: "idle"
        sequence:
          - action: timer.start
            target:
              entity_id: !input helper_timer_cooldown
            data:
              duration: !input duration_cooldown
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: "{{ bp_version }} Zwangsladung hat 100% erreicht. Cooldown Timer (Balancing) gestartet (Gesamt-SOC: {{ aktueller_soc | round(1) }}%)."
              entity_id: !input helper_logbook_dummy

      - alias: "ZWANGSLADUNG BEENDEN"
        conditions:
          - condition: trigger
            id: zwangsladung_ende
          - condition: state
            entity_id: !input helper_zwangsladung_aktiv
            state: "on"
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input helper_zwangsladung_aktiv
          - action: switch.turn_off
            target:
              entity_id: "{{ var_wr_grid_charge_switch }}"
          - action: number.set_value
            target:
              entity_id:
                - !input wr_tou_1
                - !input wr_tou_2
                - !input wr_tou_3
                - !input wr_tou_4
                - !input wr_tou_5
                - !input wr_tou_6
            data:
              value: "{{ default_tou_soc }}"
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: "{{ bp_version }} Zwangsladung BEENDET. Cooldown abgelaufen. System zurück auf Normalbetrieb (ToU-Programme 1-6 -> {{ default_tou_soc }}%)."
              entity_id: !input helper_logbook_dummy

  - choose:
      - alias: "FLOAT-BOOST STARTEN (Timer läuft an)"
        conditions:
          - condition: trigger
            id: float_boost_start
        sequence:
          - if:
              - condition: template
                value_template: "{{ var_wr_float_voltage != '' }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Zellpflege active (Balancing Timer gestartet). Wechselrichter Float-Spannung angehoben (Spannungs-Wechsel: {{ var_float_normal | round(3) }}V -> {{ var_float_balancing | round(3) }}V)."
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_float_voltage }}"
                data:
                  value: "{{ var_float_balancing }}"

      - alias: "FLOAT-BOOST BEENDEN (Timer ist abgelaufen)"
        conditions:
          - condition: trigger
            id: float_boost_ende
        sequence:
          # SCHATTEN-BMS-TARE: jetzt HIER (am Zellpflege-Ende) statt am Balancing-
          # Start. Damit ist die gesamte Nachladung der Balancing-Phase im
          # Zähler enthalten und der Schatten-SOC steht exakt jetzt auf 100%.
          # Greift auch nach dem Zwangsladungs-Cooldown (Batterie ebenfalls voll).
          - if:
              - condition: template
                value_template: "{{ var_helper_tare_charge != '' and var_battery_total_charge != '' }}"
            then:
              - action: input_number.set_value
                target:
                  entity_id: "{{ var_helper_tare_charge }}"
                data:
                  value: "{{ states(var_battery_total_charge) | float(0) }}"
              - action: input_number.set_value
                target:
                  entity_id: "{{ var_helper_tare_discharge }}"
                data:
                  value: "{{ states(var_battery_total_discharge) | float(0) }}"
          - if:
              - condition: template
                value_template: "{{ var_wr_float_voltage != '' }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Zellpflege beendet. Float-Spannung zurückgesetzt ({{ var_float_balancing | round(3) }}V -> {{ var_float_normal | round(3) }}V), Schatten-BMS (Tare) auf 100% kalibriert."
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_float_voltage }}"
                data:
                  value: "{{ var_float_normal }}"

      - alias: "PEAK-SHAVING ENDE (Hold-Timer abgelaufen ODER durch WP-Sperre abgebrochen)"
        conditions:
          - condition: trigger
            id: peak_shaving_ende
        sequence:
          # FIX B (V2.9.24): Der Trigger 'peak_shaving_ende' lauscht auf den
          # Zustandswechsel des Hold-Timers (from: active -> to: idle). Dieser
          # Wechsel tritt aber bei ZWEI voellig verschiedenen Ereignissen auf:
          #   1. Der Timer ist wirklich ABGELAUFEN (kein Export mehr).
          #   2. Der Timer wurde per timer.cancel ABGEBROCHEN - naemlich vom
          #      Zweig "Loescht den Peak-Shaving Timer", sobald die WP-Sperre
          #      greift (WP-Anlaufphase laeuft).
          # Bisher wurde IMMER "Hold-Timer abgelaufen" geloggt - auch im Fall 2.
          # Das war irrefuehrend (Vorfall 13.07.2026: Meldung "abgelaufen",
          # obwohl der Timer 2 Sekunden alt war und der Export bei 6599W lag).
          #
          # UNTERSCHEIDUNG ueber wp_sperre_aktiv (NICHT ueber den Export - der
          # kann in beiden Faellen hoch oder niedrig sein):
          #   wp_sperre_aktiv == true  -> die WP-Anlaufphase laeuft -> es war
          #                               ein ABBRUCH durch die WP-Sperre.
          #   wp_sperre_aktiv == false -> keine WP-Sperre aktiv -> der Timer
          #                               ist reguleaer ABGELAUFEN.
          - choose:
              - alias: "Abbruch durch WP-Sperre"
                conditions:
                  - condition: template
                    value_template: "{{ wp_sperre_aktiv }}"
                sequence:
                  - action: logbook.log
                    data:
                      name: "PV Optimizer"
                      message: "{{ bp_version }} Prio 3 (Peak-Shaving) abgebrochen: Die Wärmepumpe läuft an (WP-Sperre aktiv). Der Hold-Timer wurde gelöscht, die Batterie geht auf 0A - der Überschuss geht an die WP. Peak-Shaving startet neu, sobald der Netz-Export nach der WP-Phase wieder über {{ schwelle_peak_shaving | round(0) }}W steigt."
                      entity_id: !input helper_logbook_dummy
            default:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Prio 3 (Peak-Shaving) beendet: Hold-Timer abgelaufen (kein Netz-Export über {{ schwelle_peak_shaving | round(0) }}W mehr). Die Ladesteuerung fällt zurück auf die reguläre Kaskade (Prio 5)."
                  entity_id: !input helper_logbook_dummy

  - choose:
      - alias: "Zieht den Peak-Shaving Timer auf"
        conditions:
          - condition: template
            # FIX A (V2.9.24): Zusaetzlich 'not wp_boost_startet_gleich'.
            # Ohne diese Pruefung wurde der Timer gestartet und - weil der
            # WP-Boost weiter unten im SELBEN Lauf die WP-Anlaufphase startet
            # und der Folge-Trigger die Automation erneut ausfuehrt - sofort
            # wieder gecancelt. Das erzeugte die falsche Meldung
            # "Hold-Timer abgelaufen" (siehe Kommentar bei wp_boost_startet_gleich).
            #
            # WICHTIG: Das Neustarten des Timers bei jedem Lauf bleibt gewollt!
            # Solange der Export > Schwelle liegt (und keine WP laeuft), wird
            # der Hold-Timer immer wieder auf volle Dauer gesetzt - Peak-Shaving
            # laeuft also durch, solange exportiert wird.
            value_template: >
              {{ real_export > schwelle_peak_shaving
                 and not wp_sperre_aktiv
                 and not wp_boost_startet_gleich }}
        sequence:
          - action: timer.start
            target:
              entity_id: !input helper_timer_peak
            data:
              duration: !input duration_peak_hold
      - alias: "Löscht den Peak-Shaving Timer"
        conditions:
          - condition: template
            value_template: "{{ wp_sperre_aktiv }}"
        sequence:
          - action: timer.cancel
            target:
              entity_id: !input helper_timer_peak

  - choose:
      - alias: "WP PRIO 1: TÄGLICHES WARMWASSER (BOOST)"
        conditions:
          - condition: template
            value_template: "{{ var_wp_boost_aktiv }}"
          - condition: template
            value_template: "{{ real_export > schwelle_wp_boost }}"
          - condition: template
            value_template: "{{ ww_temp < (var_wp_ziel_temp_pv - var_wp_hysterese_pv) }}"
          - condition: template
            value_template: "{{ states(var_timer_wp_anlauf) != 'active' }}"
          - condition: template
            value_template: "{{ states(var_timer_wp_boost) != 'active' }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: !input wp_hysterese_number
            data:
              value: "{{ var_wp_hysterese_pv }}"
          - action: water_heater.set_temperature
            target:
              entity_id: !input wp_water_heater
            data:
              temperature: "{{ var_wp_ziel_temp_pv }}"
          # ViCare-Doppelsetzung: Zieltemperatur zusätzlich über number-Entity
          - if:
              - condition: template
                value_template: "{{ var_wp_ziel_number != '' }}"
            then:
              - action: number.set_value
                target:
                  entity_id: "{{ var_wp_ziel_number }}"
                data:
                  value: "{{ var_wp_ziel_temp_pv }}"
          - action: button.press
            target:
              entity_id: !input wp_boost_button
          - action: timer.start
            target:
              entity_id: !input helper_timer_wp_anlauf
            data:
              duration: !input duration_wp_anlauf
          - action: timer.start
            target:
              entity_id: !input helper_timer_wp_boost
            data:
              duration: !input duration_wp_laufzeit
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: >
                {{ bp_version }} WP PV-Boost ausgelöst (Wasser {{ ww_temp | round(1) }}°C < PV-Startwert {{ (var_wp_ziel_temp_pv - var_wp_hysterese_pv) | round(1) }}°C, Netz-Export {{ real_export | round(0) }}W > {{ schwelle_wp_boost | round(0) }}W).
                Ziel auf {{ var_wp_ziel_temp_pv }}°C, Hysterese auf {{ var_wp_hysterese_pv }}°C gesetzt. Timer gestartet (Anlauf + Laufzeit).{{ solcast_log_addon }}
              entity_id: !input helper_logbook_dummy

      - alias: "WP PRIO 1.1: BOOST BEENDET"
        conditions:
          - condition: trigger
            id: wp_boost_ende
        sequence:
          - action: number.set_value
            target:
              entity_id: !input wp_hysterese_number
            data:
              value: "{{ var_wp_hysterese_normal }}"
          # RETRY-BAUSTEIN (identisch an Boost-Ende, Watchdog, Mitternachts-Check):
          # Setzt water_heater UND (falls konfiguriert) die number-Entity auf den
          # Zielwert, wartet 10s, prüft ob BEIDE sauber stehen. Bis zu 3 Versuche,
          # weil ViCare Befehle unzuverlässig übernimmt (Wert springt zurück).
          - repeat:
              sequence:
                - action: water_heater.set_temperature
                  target:
                    entity_id: !input wp_water_heater
                  data:
                    temperature: "{{ var_wp_ziel_temp_normal }}"
                - if:
                    - condition: template
                      value_template: "{{ var_wp_ziel_number != '' }}"
                  then:
                    - action: number.set_value
                      target:
                        entity_id: "{{ var_wp_ziel_number }}"
                      data:
                        value: "{{ var_wp_ziel_temp_normal }}"
                - delay: "00:00:10"
              until:
                - condition: template
                  value_template: >
                    {{ repeat.index >= 3 or (
                       (state_attr(var_wp_water_heater, 'temperature') | float(-1) | round(0)) == (var_wp_ziel_temp_normal | float(0) | round(0))
                       and (var_wp_ziel_number == '' or (states(var_wp_ziel_number) | float(-1) | round(0)) == (var_wp_ziel_temp_normal | float(0) | round(0)))
                    ) }}
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: >
                {{ bp_version }} WP PV-Boost Timer abgelaufen. System kehrt zu Normalwerten zurück:
                Ziel auf {{ var_wp_ziel_temp_normal }}°C, Hysterese auf {{ var_wp_hysterese_normal }}°C gesetzt (Versuche: {{ repeat.index }}, Timer-Status: idle).
              entity_id: !input helper_logbook_dummy

      - alias: "WP PRIO 1.2: WATCHDOG (Zieltemp haengt auf PV-Wert)"
        # Sicherheitsnetz gegen zwei Fälle: (1) ViCare/Wärmepumpe hat den
        # regulären wp_boost_ende-Reset nicht übernommen (Gerät wirft den Wert
        # zurück auf 59°C - real beobachtet), (2) ein Timer ging verloren (z.B.
        # HA-Neustart ohne restore), sodass wp_boost_ende nie feuerte.
        # Erkennung bei jedem Lauf: beide WP-Timer idle, aber Ziel-Temp steht
        # noch auf dem PV-Wert. Setzt dann hart auf Normalwerte zurück.
        conditions:
          - condition: template
            value_template: "{{ var_wp_boost_aktiv }}"
          - condition: template
            value_template: "{{ states(var_timer_wp_boost) == 'idle' and states(var_timer_wp_anlauf) == 'idle' }}"
          - condition: template
            value_template: >
              {{ var_wp_ziel_temp_pv != var_wp_ziel_temp_normal and
                 (state_attr(var_wp_water_heater, 'temperature') | float(-1) | round(0)) == (var_wp_ziel_temp_pv | float(0) | round(0)) }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input wp_hysterese_number
            data:
              value: "{{ var_wp_hysterese_normal }}"
          # RETRY-BAUSTEIN (siehe Boost-Ende): beide Entities setzen, 10s prüfen,
          # bis zu 3 Versuche gegen ViCare-Nichtübernahme.
          - repeat:
              sequence:
                - action: water_heater.set_temperature
                  target:
                    entity_id: !input wp_water_heater
                  data:
                    temperature: "{{ var_wp_ziel_temp_normal }}"
                - if:
                    - condition: template
                      value_template: "{{ var_wp_ziel_number != '' }}"
                  then:
                    - action: number.set_value
                      target:
                        entity_id: "{{ var_wp_ziel_number }}"
                      data:
                        value: "{{ var_wp_ziel_temp_normal }}"
                - delay: "00:00:10"
              until:
                - condition: template
                  value_template: >
                    {{ repeat.index >= 3 or (
                       (state_attr(var_wp_water_heater, 'temperature') | float(-1) | round(0)) == (var_wp_ziel_temp_normal | float(0) | round(0))
                       and (var_wp_ziel_number == '' or (states(var_wp_ziel_number) | float(-1) | round(0)) == (var_wp_ziel_temp_normal | float(0) | round(0)))
                    ) }}
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: >
                {{ bp_version }} WP WATCHDOG: Beide WP-Timer sind idle, aber die WW-Zieltemperatur stand noch auf dem PV-Boost-Wert ({{ var_wp_ziel_temp_pv }}°C) statt auf {{ var_wp_ziel_temp_normal }}°C. Mögliche Ursachen: die Wärmepumpe/ViCare hat den regulären Reset nicht übernommen, oder ein Timer ging verloren (z.B. HA-Neustart ohne restore). Korrigiert nach {{ repeat.index }} Versuch(en): Ziel {{ var_wp_ziel_temp_normal }}°C, Hysterese {{ var_wp_hysterese_normal }}°C.
              entity_id: !input helper_logbook_dummy

  # ====================================================================
  # DIE MASTER KASKADE FÜR DEN BATTERIESTROM
  # ====================================================================
  - choose:
      - alias: "PRIO 1: TOP-BALANCING"
        conditions:
          - condition: template
            value_template: "{{ top_balancing_noetig }}"
        sequence:
          - variables:
              balancing_start_jetzt: >
                {{ states(var_timer_cooldown) == 'idle' and not zwangsladung_aktiv and
                (vmax1 >= top_balancing_voltage or vmax2 >= top_balancing_voltage or (pack3_online and vmax3 >= top_balancing_voltage)) }}
          - if:
              - condition: template
                value_template: "{{ balancing_start_jetzt }}"
            then:
              # 1. Timer starten
              - action: timer.start
                target:
                  entity_id: !input helper_timer_cooldown
                data:
                  duration: !input duration_top_balancing
              # 2. Im exakt selben Moment den Helfer feuern
              - action: input_boolean.turn_on
                target:
                  entity_id: !input helper_batterie_heute_voll
              # HINWEIS: Das Schatten-BMS-Tare wird NICHT mehr hier (Start) gesetzt,
              # sondern am Ende der Zellpflege (float_boost_ende) - dann ist die
              # Nachladung der Balancing-Phase vollständig im Zähler enthalten.
              # 3. Ladestrom direkt setzen + EIN kombinierter Logbuch-Eintrag
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ target_p1 }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "top_balancing"
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Prio 1 (Top-Balancing START): Zellspannung >= {{ top_balancing_voltage | round(3) }}V bei SOC {{ aktueller_soc | round(0) }}%. Timer gestartet, Batterie als voll markiert. Ladestrom auf {{ target_p1 }}A gedrosselt (Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ target_p1 }}A). Schatten-BMS-Kalibrierung folgt am Zellpflege-Ende."
                  entity_id: !input helper_logbook_dummy

          # Spätere Register-Korrektur (nur wenn NICHT gerade gestartet, sonst doppelt)
          - if:
              - condition: template
                value_template: "{{ not balancing_start_jetzt and ((aktueller_ladestrom | round(0)) - (target_p1 | round(0))) | abs >= 2 }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Prio 1 (Top-Balancing): Batterie über {{ top_balancing_soc }}% und max. Zellspannung über {{ top_balancing_voltage | round(3) }}V. Ladestrom auf {{ target_p1 }}A gesetzt (Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ target_p1 }}A)."
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ target_p1 }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "top_balancing"

      - alias: "PRIO 1.5: WINTER-ZWANGSLADUNG LÄUFT"
        conditions:
          - condition: template
            value_template: "{{ zwangsladung_aktiv }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ ((aktueller_ladestrom | round(0)) - (target_p15 | round(0))) | abs >= 2 }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Prio 1.5 (Zwangsladung läuft): Batterieeingang auf {{ target_p15 }}A gestellt, damit Netzstrom einfließen kann (Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ target_p15 }}A)."
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ target_p15 }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "zwangsladung"

      - alias: "PRIO 2: FALL (B) - ZEIT REICHT NICHT (MAX)"
        conditions:
          - condition: template
            value_template: "{{ is_day and aktueller_soc < 97 and fall_b_aktiv }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ aktueller_modus != 'fall_b_max' }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: >
                    {{ bp_version }} Prio 2 (Fall B): Selbst mit Faktor {{ faktor_fallback }} reicht die verbleibende Ladezeit nicht ({{ verf_stunden | round(1) }}h für {{ benoetigt_kwh | round(1) }} kWh [frei: {{ freie_kwh | round(1) }} + Defizit: {{ defizit_kwh | round(1) }}] -> {{ amp_roh_12 | round(0) }}A >= Max {{ max_ampere | round(0) }}A). Ladestrom auf Max ({{ max_ampere | round(0) }}A) verriegelt, Modus 'fall_b_max' gesetzt (Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ max_ampere | round(0) }}A).{{ solcast_log_addon }}
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ max_ampere }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "fall_b_max"

      - alias: "PRIO 3: PEAK SHAVING"
        conditions:
          - condition: template
            value_template: "{{ states(var_timer_wp_anlauf) != 'active' }}"
          - condition: template
            value_template: "{{ states(var_timer_peak) == 'active' }}"
          # Peak-Shaving nur, wenn die Batterie noch aufnehmen kann. Bei voller
          # Batterie (>= 99% oder heute-voll-Marker) ist Shaven physikalisch
          # wirkungslos und würde nur die Balancing-Bremse aushebeln.
          - condition: template
            value_template: "{{ aktueller_soc < 99 and not heute_schon_voll }}"
        sequence:
          # Peak-Shaving löst den WP-Laufzeit-Timer auf: Nach Peak-Ende soll
          # Prio 5 wieder freigegeben sein. Der Ziel/Hysterese-Reset kommt über
          # den wp_boost_ende-Trigger (Cancel erzeugt active->idle), abgesichert
          # durch Watchdog (5 Min) und Mitternachts-Check.
          - if:
              - condition: template
                value_template: "{{ states(var_timer_wp_boost) == 'active' }}"
            then:
              - action: timer.cancel
                target:
                  entity_id: "{{ var_timer_wp_boost }}"
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Peak-Shaving aktiv: WP-Laufzeit Timer wurde vorzeitig beendet (Timer '{{ var_timer_wp_boost }}' -> idle). Prio 5 ist nach dem Peak wieder freigegeben."
                  entity_id: !input helper_logbook_dummy
          # Ziel ist wieder der KONSTANTE Parameter peak_ampere -> einfacher
          # Vergleich reicht, kein Zappeln möglich (Treppenfilter entfernt).
          - if:
              - condition: template
                value_template: "{{ ((aktueller_ladestrom | round(0)) - (target_p3 | round(0))) | abs >= 2 }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Prio 3 (Peak-Shaving): Hold-Timer aktiv (letzter Netz-Export über {{ schwelle_peak_shaving | round(0) }}W). Ladestrom auf {{ target_p3 }}A gesetzt (Aktueller Netz-Export: {{ real_export | round(0) }}W [Batterie puffert gerade {{ (batterie_leistung * -1) | round(0) }}W] | Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ target_p3 }}A).{{ solcast_log_addon }}"
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ target_p3 }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "peak_shaving"

      - alias: "PRIO 4: WP-ANLAUFSPERRE (0A)"
        conditions:
          - condition: template
            value_template: "{{ wp_sperre_batterie_0a_aktiv }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ (aktueller_ladestrom | round(0)) != (null_ampere | round(0)) }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Prio 4 (WP-Sperre, vor Blockade-Ende): Wärmepumpe läuft an. Batterie auf 0A verriegelt (Timer '{{ var_timer_wp_anlauf }}' = active | Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ null_ampere }}A)."
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ null_ampere }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "wp_sperre"

      - alias: "PRIO 4.5: MORGEN-BLOCKADE (0A)"
        conditions:
          - condition: template
            value_template: "{{ blockade_aktiv }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ (aktueller_ladestrom | round(0)) != (null_ampere | round(0)) }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: >
                    {{ bp_version }} Prio 4.5 (Morgen-Blockade dynamisch): Ladestrom auf {{ null_ampere }}A blockiert.
                    Spätester Ladebeginn: {{ (as_datetime(blockade_dyn_t) | as_local).strftime('%H:%M') }} Uhr (konfiguriert: {{ var_zeit_blockade }}). Netto ab Ende Blockade bis Tagesende: {{ blockade_dyn_netto_ab_t | round(1) }} kWh >= Bedarf {{ (freie_kwh * faktor_ziel_puffer) | round(1) }} kWh (frei {{ freie_kwh | round(1) }} x {{ faktor_ziel_puffer }}).
                    (Netto gesamt Resttag ab nächster Halbstunde: {{ blockade_dyn_gesamt | round(1) }} kWh | Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ null_ampere }}A).
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ null_ampere }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "blockade"

      - alias: "PRIO 4.8: WP-KOMPRESSOR SPERRE (0A)"
        conditions:
          - condition: template
            value_template: "{{ wp_kompressor_aktiv }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ (aktueller_ladestrom | round(0)) != (null_ampere | round(0)) }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Prio 4.8 (Kompressor-Sperre): Wärmepumpe arbeitet. Batterie auf 0A verriegelt (Kompressor-Status = {{ states(var_wp_kompressor) if var_wp_kompressor != '' else 'active' }} | Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ null_ampere }}A)."
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ null_ampere }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "wp_sperre"

      - alias: "PRIO 5: DYNAMISCHES FERTIGLADEN (ZEIT-BASIERT)"
        conditions:
          - condition: template
            value_template: "{{ is_day and aktueller_soc < 97 }}"
          - condition: template
            value_template: "{{ not wp_laufzeit_aktiv }}"
          # Abend-Sperre: unter der Mindest-Restladezeit nicht mehr nachregeln.
          # Der letzte Tageswert bleibt stehen, bis der Sonnenuntergang-Trigger
          # das Register ohnehin für die Nacht auf Max öffnet.
          - condition: template
            value_template: "{{ verf_stunden >= (min_reststunden | float(1.0)) }}"
        sequence:
          # Innere Prüfung: Fall-(b)-Modus gesetzt? Dann NICHTS tun (im Trace sichtbar).
          - choose:
              - alias: "Fall-B-Modus aktiv -> kein Rückregeln"
                conditions:
                  - condition: template
                    value_template: "{{ aktueller_modus == 'fall_b_max' }}"
                sequence:
                  - action: logbook.log
                    data:
                      name: "PV Optimizer"
                      message: "{{ bp_version }} Prio 5 übersprungen: Modus 'fall_b_max' aktiv. Kein Rückregeln bis Reset (Mitternacht/Sonnenuntergang)."
                      entity_id: !input helper_logbook_dummy
            default:
              - variables:
                  diff: "{{ target_p5 - aktueller_ladestrom }}"
                  min_since: >
                    {% set lu = states[var_wr_max_charge].last_changed %}
                    {{ ((now() - lu).total_seconds() / 60) | int if lu is not none else 60 }}
                  # Modus-basierter Bypass: Wenn ein ANDERER Block zuletzt gesetzt hat
                  # (Modus != 'normal'), darf Prio 5 einmalig sofort durchregeln.
                  fremder_modus: "{{ aktueller_modus not in ['normal'] }}"
                  update_freigegeben: >
                    {{ fremder_modus or
                       (diff >= 10) or
                       (diff >= 5 and min_since >= 60) or
                       (diff <= -20) or
                       (diff <= -15 and min_since >= 60) }}
              - if:
                  - condition: template
                    value_template: "{{ update_freigegeben }}"
                then:
                  - action: logbook.log
                    data:
                      name: "PV Optimizer"
                      message: >
                        {{ bp_version }} Prio 5 (Dynamisch, Zeit-basiert): Filter passiert (Diff: {{ diff | round(1) }}A | Letzte Änderung: {{ min_since }} Min | Vorheriger Modus: {{ aktueller_modus }}).
                        Bedarf: {{ benoetigt_kwh | round(1) }} kWh (frei {{ freie_kwh | round(1) }} + Defizit {{ defizit_kwh | round(1) }}) / {{ verf_stunden | round(1) }}h Ladezeit * {{ faktor_ziel_puffer }} = {{ amp_roh_13 | round(1) }}A.
                        Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ target_p5 }}A.{{ temp_log_addon }}
                      entity_id: !input helper_logbook_dummy
                  - action: number.set_value
                    target:
                      entity_id: "{{ var_wr_max_charge }}"
                    data:
                      value: "{{ target_p5 }}"
                  - if:
                      - condition: template
                        value_template: "{{ var_lade_modus != '' and aktueller_modus != 'normal' }}"
                    then:
                      - action: input_select.select_option
                        target:
                          entity_id: "{{ var_lade_modus }}"
                        data:
                          option: "normal"