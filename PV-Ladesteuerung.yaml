blueprint:
  name: "🌞 Master-Ladesteuerung: PV, Batterie & Wärmepumpe [V2.9.9]"
  description: >-
    Iterativer 30-Minuten JSON-Vorabscan (jetzt in kWh), Queued-Ausführung, zeitbasierte
    Halbstunden-Ladelogik, Proportion, Fallback (Fall B = Zeit reicht nicht → Max),
    Top-Balancing inkl. Schatten-BMS Kalibrierung, WP-Boost und historischer Treppen-Filter.
  domain: automation

  input:
    sec_net_pv:
      name: "Netz & Hausverbrauch (Entitäten)"
      icon: mdi:home-lightning-bolt
      collapsed: true
      input:
        grid_export_sensor:
          name: "Netz-Zähler (Grid Export - WATT)"
          default: ""
          selector: {entity: {domain: sensor, device_class: power}}
        grid_export_kwh_heute:
          name: "Netz-Einspeisung Heute (Grid Export - kWh)"
          default: ""
          selector: {entity: {domain: sensor, device_class: energy}}
        pv_power_sensor:
          name: "PV Leistung (Geglättet)"
          default: ""
          selector: {entity: {domain: sensor, device_class: power}}

    sec_solcast:
      name: "Solcast Prognose (Entitäten)"
      icon: mdi:weather-partly-cloudy
      collapsed: true
      input:
        solcast_heute_sensor:
          name: "Solcast Prognose HEUTE (Entität mit Array)"
          description: "Muss die Entität mit dem 'detailedForecast' Attribut sein."
          default: ""
          selector: {entity: {domain: sensor}}
        solcast_rest_sensor:
          name: "Verbleibende Leistung Heute (Fallback)"
          default: ""
          selector: {entity: {domain: sensor, device_class: energy}}
        solcast_current_sensor:
          name: "Aktuelle Leistung"
          default: ""
          selector: {entity: {domain: sensor, device_class: power}}
        solcast_next_hour_sensor:
          name: "Prognose nächste Stunde"
          default: ""
          selector: {entity: {domain: sensor}}

    sec_battery_sensors:
      name: "Batterie BMS"
      icon: mdi:battery-bluetooth
      collapsed: true
      input:
        battery_soc_sensor:
          name: "Ladezustand (SOC Gesamt)"
          default: ""
          selector: {entity: {domain: sensor, device_class: battery}}
        battery_power_sensor:
          name: "Aktuelle Leistung"
          default: ""
          selector: {entity: {domain: sensor, device_class: power}}
        vmax1_sensor:
          name: "BMS 1 Max Zellspannung"
          default: ""
          selector: {entity: {domain: sensor, device_class: voltage}}
        vmax2_sensor:
          name: "BMS 2 Max Zellspannung"
          default: ""
          selector: {entity: {domain: sensor, device_class: voltage}}
        vmax3_sensor:
          name: "BMS 3 Max Zellspannung (Optional)"
          default: ""
          selector: {entity: {domain: sensor, device_class: voltage}}
        battery_total_charge:
          name: "Total Battery Charge (kWh - Für Schatten BMS)"
          default: ""
          selector: {entity: {domain: sensor, device_class: energy}}
        battery_total_discharge:
          name: "Total Battery Discharge (kWh - Für Schatten BMS)"
          default: ""
          selector: {entity: {domain: sensor, device_class: energy}}
        nominale_spannung: {name: "Nominale Spannung (V)", default: 51.2, selector: {number: {min: 48.0, max: 60.0, step: 0.1, unit_of_measurement: "V"}}}
        max_ampere: {name: "Max Ampere (Offenes Tor)", default: 350, selector: {number: {min: 50, max: 350, step: 1, unit_of_measurement: "A"}}}

    sec_temperature:
      name: "Thermische Limits & C-Raten (Entitäten & Werte)"
      icon: mdi:thermometer-alert
      collapsed: true
      input:
        bms1_temp_min_sensor:
          name: "BMS 1 Zelltemperatur (Minimum)"
          default: ""
          selector: {entity: {domain: sensor, device_class: temperature}}
        bms2_temp_min_sensor:
          name: "BMS 2 Zelltemperatur (Minimum)"
          default: ""
          selector: {entity: {domain: sensor, device_class: temperature}}
        bms3_temp_min_sensor:
          name: "BMS 3 Zelltemperatur (Minimum - Optional)"
          default: ""
          selector: {entity: {domain: sensor, device_class: temperature}}
        bms1_temp_max_sensor:
          name: "BMS 1 Zelltemperatur (Maximum)"
          default: ""
          selector: {entity: {domain: sensor, device_class: temperature}}
        bms2_temp_max_sensor:
          name: "BMS 2 Zelltemperatur (Maximum)"
          default: ""
          selector: {entity: {domain: sensor, device_class: temperature}}
        bms3_temp_max_sensor:
          name: "BMS 3 Zelltemperatur (Maximum - Optional)"
          default: ""
          selector: {entity: {domain: sensor, device_class: temperature}}
        pack_capacity_ah:
          name: "Kapazität EINES Packs (Ah)"
          default: 314
          selector: {number: {min: 50, max: 500, step: 1, unit_of_measurement: "Ah"}}
        crate_2_deg: {name: "C-Rate bei <= 2°C", default: 0.00, selector: {number: {min: 0.00, max: 0.10, step: 0.01, mode: slider}}}
        crate_5_deg: {name: "C-Rate bei 5°C", default: 0.05, selector: {number: {min: 0.00, max: 0.20, step: 0.01, mode: slider}}}
        crate_10_deg: {name: "C-Rate bei 10°C", default: 0.20, selector: {number: {min: 0.00, max: 0.50, step: 0.01, mode: slider}}}
        crate_12_deg: {name: "C-Rate bei 12°C", default: 0.30, selector: {number: {min: 0.00, max: 0.80, step: 0.01, mode: slider}}}
        crate_15_deg: {name: "C-Rate bei 15°C", default: 0.50, selector: {number: {min: 0.00, max: 1.00, step: 0.01, mode: slider}}}
        crate_20_deg: {name: "C-Rate bei 20°C", default: 0.70, selector: {number: {min: 0.00, max: 1.00, step: 0.01, mode: slider}}}
        crate_40_deg: {name: "C-Rate bei 40°C", default: 0.70, selector: {number: {min: 0.00, max: 1.00, step: 0.01, mode: slider}}}
        crate_45_deg: {name: "C-Rate bei >= 45°C", default: 0.00, selector: {number: {min: 0.00, max: 0.50, step: 0.01, mode: slider}}}

    sec_battery_control:
      name: "Wechselrichter-Steuerung (Entitäten)"
      icon: mdi:flash
      collapsed: true
      input:
        wr_max_charge_current:
          name: "Max Charging Current"
          default: ""
          selector: {entity: {domain: number}}
        wr_grid_charge_switch:
          name: "Grid Charging Switch"
          default: ""
          selector: {entity: {domain: switch}}
        wr_grid_charge_current:
          name: "Grid Charging Current"
          default: ""
          selector: {entity: {domain: number}}
        wr_tou_1: {name: "Time of Use SOC 1", default: "", selector: {entity: {domain: number}}}
        wr_tou_2: {name: "Time of Use SOC 2", default: "", selector: {entity: {domain: number}}}
        wr_tou_3: {name: "Time of Use SOC 3", default: "", selector: {entity: {domain: number}}}
        wr_tou_4: {name: "Time of Use SOC 4", default: "", selector: {entity: {domain: number}}}
        wr_tou_5: {name: "Time of Use SOC 5", default: "", selector: {entity: {domain: number}}}
        wr_tou_6: {name: "Time of Use SOC 6", default: "", selector: {entity: {domain: number}}}
        peak_ampere: {name: "Basis-Strom Peak Shaving", default: 48, selector: {number: {min: 20, max: 100, step: 1, unit_of_measurement: "A"}}}
        schwelle_peak_shaving: {name: "Start-Schwelle Peak-Shaving (W)", default: 6500, selector: {number: {min: 1000, max: 30000, step: 100, unit_of_measurement: "W"}}}

    sec_float_voltage:
      name: "Zellpflege & Balancing (Werte)"
      icon: mdi:car-battery
      collapsed: true
      input:
        wr_float_voltage_sensor:
          name: "Wechselrichter Float Spannung (Entität - Optional)"
          description: "Wird angehoben, solange der Cooldown-Timer (Balancing) läuft."
          default: ""
          selector: {entity: {domain: number}}
        float_voltage_normal:
          name: "Float Spannung Normal (V)"
          default: 53.6
          selector: {number: {min: 50.0, max: 60.0, step: 0.1, unit_of_measurement: "V"}}
        float_voltage_balancing:
          name: "Float Spannung Balancing (V)"
          default: 55.2
          selector: {number: {min: 50.0, max: 60.0, step: 0.1, unit_of_measurement: "V"}}
        top_balancing_soc: {name: "SOC-Schwelle für Top-Balancing", default: 97, selector: {number: {min: 70, max: 100, step: 1, unit_of_measurement: "%"}}}
        top_balancing_voltage: {name: "Zellspannungs-Schwelle für Top-Balancing", default: 3.40, selector: {number: {min: 3.30, max: 3.60, step: 0.01, unit_of_measurement: "V"}}}
        default_tou_soc: {name: "Standard Min-SOC (ToU-Balancing)", default: 20, selector: {number: {min: 10, max: 50, step: 1, unit_of_measurement: "%"}}}
        escalation_tou_soc: {name: "Eskalations Min-SOC (Nach 9 Tagen)", default: 30, selector: {number: {min: 10, max: 60, step: 1, unit_of_measurement: "%"}}}
        min_ampere: {name: "Min Ampere (Balancing Bremse)", default: 7, selector: {number: {min: 2, max: 20, step: 1, unit_of_measurement: "A"}}}
        grid_ampere_zwangsladung: {name: "Netzstrom bei Zwangsladung", default: 50, selector: {number: {min: 10, max: 140, step: 1, unit_of_measurement: "A"}}}

    sec_tuning:
      name: "Tuning & Verhalten (Werte)"
      icon: mdi:tune
      collapsed: true
      input:
        faktor_ziel_puffer: {name: "Ladefaktor Normal (Normalfall)", default: 1.3, selector: {number: {min: 1.0, max: 2.0, step: 0.1}}}
        faktor_fallback: {name: "Ladefaktor Max-Auslöser (strenger)", default: 1.2, selector: {number: {min: 1.0, max: 2.0, step: 0.1}}}
        fallback_max_soc: {name: "Fallback Max SOC (%)", default: 95, selector: {number: {min: 50, max: 100, step: 1, unit_of_measurement: "%"}}}
        fallback_min_kwh: {name: "Fall-B Bagatellgrenze (kWh)", description: "Fall B (Max-Verriegelung) löst nur aus, wenn der Bedarf über dieser Grenze liegt.", default: 1.0, selector: {number: {min: 0.1, max: 5.0, step: 0.1, unit_of_measurement: "kWh"}}}
        min_reststunden: {name: "Mindest-Restladezeit für Eskalation (h)", description: "Unter dieser verbleibenden Ladezeit regeln Prio 5 und Fall B nicht mehr nach (verhindert Abend-Eskalation bei Restzeit gegen 0).", default: 1.0, selector: {number: {min: 0.0, max: 4.0, step: 0.25, unit_of_measurement: "h"}}}
        puffer_kwh: {name: "Sicherheits-Puffer (kWh)", default: 1.0, selector: {number: {min: 0.0, max: 5.0, step: 0.1}}}
        zeit_blockade_ende: {name: "Ende Morgen-Blockade", default: "13:30:00", selector: {time: {}}}
        duration_peak_hold: {name: "Dauer Peak-Shaving Hold", default: "00:30:00", selector: {time: {}}}
        duration_cooldown: {name: "Dauer Zwangsladung Cooldown", default: "04:00:00", selector: {time: {}}}
        duration_top_balancing: {name: "Dauer Top-Balancing (Hysterese)", default: "01:00:00", selector: {time: {}}}

    sec_waermepumpe:
      name: "Wärmepumpe (Entitäten & Werte)"
      icon: mdi:water-boiler
      collapsed: true
      input:
        wp_boost_aktiv:
          name: "Peak-Shaving für Wärmepumpe aktivieren (PV-Boost)"
          default: true
          selector: {boolean: {}}
        schwelle_wp_boost:
          name: "Start-Schwelle PV-Boost (W)"
          default: 6400
          selector: {number: {min: 1000, max: 30000, step: 100, unit_of_measurement: "W"}}
        wp_kompressor_sensor:
          name: "WP Kompressor (Optional - binary_sensor)"
          default: ""
          selector: {entity: {domain: binary_sensor}}
        wp_water_heater:
          name: "WW Speicher Entität"
          default: ""
          selector: {entity: {domain: water_heater}}
        wp_temp_sensor:
          name: "WW Temperatur Sensor"
          default: ""
          selector: {entity: {domain: sensor, device_class: temperature}}
        wp_hysterese_number:
          name: "Hysterese Entität"
          default: ""
          selector: {entity: {domain: number}}
        wp_ziel_temp_number:
          name: "WW-Zieltemperatur Entität (Optional, ViCare-Doppelsetzung)"
          description: "Zusätzliche number-Entity für die WW-Zieltemperatur. ViCare übernimmt water_heater.set_temperature nicht immer zuverlässig; wenn gesetzt, schreibt der Blueprint die Zieltemperatur zusätzlich über diese Entity."
          default: ""
          selector: {entity: {domain: number}}
        wp_boost_button:
          name: "Einmalige Ladung Button"
          default: ""
          selector: {entity: {domain: button}}
        duration_wp_anlauf: {name: "Dauer WP Anlaufphase", default: "00:30:00", selector: {time: {}}}
        duration_wp_laufzeit: {name: "Dauer WP Laufzeit (Sperrt Prio 5)", default: "01:00:00", selector: {time: {}}}
        wp_ziel_temp_pv: {name: "Ziel-Temp PV", default: 59, selector: {number: {min: 40, max: 70, step: 1}}}
        wp_hysterese_pv: {name: "Hysterese PV", default: 5, selector: {number: {min: 1, max: 20, step: 1}}}
        wp_ziel_temp_normal: {name: "Ziel-Temp Normal", default: 50, selector: {number: {min: 40, max: 70, step: 1}}}
        wp_hysterese_normal: {name: "Hysterese Normal", default: 10, selector: {number: {min: 1, max: 20, step: 1}}}

    sec_helpers:
      name: "Helfer & Diagnose (Entitäten)"
      icon: mdi:tools
      collapsed: true
      input:
        eingriff_dauer_sensor:
          name: "Eingriff Dauer"
          default: ""
          selector: {entity: {domain: sensor}}
        json_tracking_sensor:
          name: "BMS-JSON Tracking (Voll-Tage)"
          default: ""
          selector: {entity: {domain: sensor}}
        helper_logbook_dummy:
          name: "Logbuch Dummy (Text)"
          default: ""
          selector: {entity: {domain: input_text}}
        helper_max_soc_heute:
          name: "Max SOC Heute"
          default: ""
          selector: {entity: {domain: input_number}}
        speicherverlust_gesamt:
          name: "Speicherverlust Gesamt"
          default: ""
          selector: {entity: {domain: input_number}}
        helper_zwangsladung_aktiv:
          name: "Zwangsladung Schalter"
          default: ""
          selector: {entity: {domain: input_boolean}}
        helper_batterie_heute_voll:
          name: "Batterie Voll Schalter"
          default: ""
          selector: {entity: {domain: input_boolean}}
        helper_blockade_beendet:
          name: "Blockade heute beendet Helfer (Optional)"
          description: "input_boolean als Tagesmarker: Nach dem ersten Blockade-Austritt tritt die Morgen-Blockade am selben Tag nicht erneut ein. Leer lassen = Wiedereintritt erlaubt (altes Verhalten). Reset um Mitternacht."
          default: ""
          selector: {entity: {domain: input_boolean}}
        helper_timer_cooldown:
          name: "Timer Cooldown (Auch für Balancing)"
          default: ""
          selector: {entity: {domain: timer}}
        helper_timer_peak:
          name: "Timer Peak"
          default: ""
          selector: {entity: {domain: timer}}
        helper_timer_wp_anlauf:
          name: "Timer WP Anlauf"
          default: ""
          selector: {entity: {domain: timer}}
        helper_timer_wp_boost:
          name: "Timer WP Laufzeit"
          default: ""
          selector: {entity: {domain: timer}}
        helper_tare_charge:
          name: "Schatten-BMS: Tare Charge Helfer"
          default: ""
          selector: {entity: {domain: input_number}}
        helper_tare_discharge:
          name: "Schatten-BMS: Tare Discharge Helfer"
          default: ""
          selector: {entity: {domain: input_number}}
        schatten_bms_sensor:
          name: "Schatten-BMS: SOC Sensor (mit raw_drift_soc Attribut)"
          description: "Template-Sensor aus dem Package. Der Blueprint liest dessen Attribut 'raw_drift_soc' für das Anti-Windup (Tare-Nachführung bei > 100%)."
          default: ""
          selector: {entity: {domain: sensor}}
        helper_lade_modus:
          name: "Lade-Modus (Select - ersetzt Magic-Numbers)"
          description: "Status-Helfer: speichert, welche Priorität den Ladestrom zuletzt gesetzt hat. Optionen: normal, fall_b_max, top_balancing, zwangsladung, peak_shaving, wp_sperre, blockade, nacht."
          default: ""
          selector: {entity: {domain: input_select}}
        hausverbrauch_utility_sensor:
          name: "Utility Meter (Hausverbrauch Halbstündlich in kWh)"
          description: "Wird durch den Blueprint automatisch alle 30 Min genullt."
          default: ""
          selector: {entity: {domain: sensor}}
        hausverbrauch_json_text:
          name: "JSON Profil Speicher (Text-Helfer)"
          description: "Speichert das 48-Werte Array (jetzt in kWh pro Halbstunde)."
          default: ""
          selector: {entity: {domain: input_text}}

trigger_variables:
  tv_battery_soc: !input battery_soc_sensor
  t_cooldown: !input helper_timer_cooldown
  tv_vmax1: !input vmax1_sensor
  tv_vmax2: !input vmax2_sensor
  tv_vmax3: !input vmax3_sensor
  tv_top_balancing_voltage: !input top_balancing_voltage

trigger:
  - alias: "Trigger: JSON Profil pflegen (Alle 30 Min)"
    platform: time_pattern
    minutes: "/30"
    id: update_json
  - alias: "Trigger: Laufende Überwachung (alle 5 Minuten)"
    platform: time_pattern
    minutes: "/5"
  - alias: "Trigger: Zellspannungs-Schwelle erreicht (Top-Balancing sofort fangen)"
    platform: template
    value_template: >
      {% set v1 = states(tv_vmax1) | float(0) %}
      {% set v2 = states(tv_vmax2) | float(0) %}
      {% set v3 = states(tv_vmax3) | float(0) if tv_vmax3 != '' else 0 %}
      {% set schwelle = tv_top_balancing_voltage | float(3.4) %}
      {{ v1 >= schwelle or v2 >= schwelle or v3 >= schwelle }}
    id: vmax_schwelle
  - alias: "Trigger: Tägliche Maintenance (Reset & BMS Check)"
    platform: time
    at: "23:58:00"
    id: maintenance
  - alias: "Trigger: Sonnenuntergang Check (Verlust-Tracking)"
    platform: sun
    event: sunset
    offset: "00:30:00"
    id: sunset_check
  - alias: "Trigger WP Boost ENDE (Rückfall auf Normalwerte)"
    platform: state
    entity_id: !input helper_timer_wp_boost
    to: "idle"
    from: "active"
    id: wp_boost_ende
  - alias: "Trigger Zwangsladung START: 10 Tage nicht voll"
    platform: template
    value_template: >
      {{ (states(tv_battery_soc) | float(100)) < 100 }}
    for: {days: 10}
    id: zwangsladung_start
  - alias: "Trigger Zwangsladung COOLDOWN: 100% erreicht"
    platform: template
    value_template: >
      {{ (states(tv_battery_soc) | float(0)) > 99.9 }}
    id: zwangsladung_100
  - alias: "Trigger Zwangsladung ENDE: Cooldown Timer abgelaufen"
    platform: state
    entity_id: !input helper_timer_cooldown
    to: "idle"
    from: "active"
    id: zwangsladung_ende
  - alias: "Trigger Float-Boost START: Zellpflege Timer läuft los"
    platform: state
    entity_id: !input helper_timer_cooldown
    to: "active"
    from: "idle"
    id: float_boost_start
  - alias: "Trigger Float-Boost ENDE: Zellpflege Timer abgelaufen"
    platform: state
    entity_id: !input helper_timer_cooldown
    to: "idle"
    from: "active"
    id: float_boost_ende

# ====================================================================
# QUEUED MODE (Schützt Timer-Events vor parallelen Triggern)
# ====================================================================
mode: queued
max: 10
trace:
  stored_traces: 400

action:
  # ====================================================================
  # GLOBALE VARIABLEN FÜR DEN GESAMTEN ACTION-BLOCK
  # ====================================================================
  - variables:
      bp_version: "[V2.9.9]"
      var_battery_total_charge: !input battery_total_charge
      var_battery_total_discharge: !input battery_total_discharge
      var_helper_tare_charge: !input helper_tare_charge
      var_helper_blockade_beendet: !input helper_blockade_beendet
      var_helper_tare_discharge: !input helper_tare_discharge
      var_schatten_bms: !input schatten_bms_sensor
      var_lade_modus: !input helper_lade_modus

  # ====================================================================
  # DATENPFLEGE: 30-MINUTEN JSON PROFIL UPDATEN & RESETTEN (JETZT kWh)
  # ====================================================================
  - if:
      - condition: trigger
        id: update_json
    then:
      - variables:
          var_hausverbrauch_json: !input hausverbrauch_json_text
          var_hausverbrauch_kwh: !input hausverbrauch_utility_sensor
          # Finde die Halbstunde heraus, die exakt JETZT geendet hat.
          # Beispiel: Trigger um 14:00 -> Es geht um 13:30 bis 14:00 Uhr. (now() - 15 Min = 13:45 Uhr).
          # Daraus errechnet sich der korrekte Index (0 bis 47).
          # WICHTIG: alles in EINEM Template. HA konvertiert datetime-Variablen zwischen
          # Blöcken zu Strings; ein separates calc_time würde beim Zugriff auf .hour crashen.
          h_index: >
            {% set t = now() - timedelta(minutes=15) %}
            {{ t.hour * 2 + (1 if t.minute >= 30 else 0) }}
          json_str_pre: "{{ states(var_hausverbrauch_json) }}"
      # UNKNOWN-SCHUTZ: Direkt nach einem HA-Neustart kann der Helfer kurz
      # 'unknown' sein, bevor der Zustand restauriert wird. Ohne Schutz würde
      # der Kaltstart das gute Profil mit einem Einheitswert überschreiben.
      # -> 1 Minute warten (mode: queued fängt parallele Trigger ab), dann neu lesen.
      - if:
          - condition: template
            value_template: "{{ json_str_pre in ['unknown', 'unavailable'] }}"
        then:
          - delay: "00:01:00"
      - variables:
          # Frisch lesen (nach evtl. Wartezeit). HA liefert den gespeicherten
          # JSON-Wert MANCHMAL bereits als native Liste statt als String
          # (dasselbe Phänomen wie beim from_json). Beide Fälle sind gültig.
          json_str: "{{ states(var_hausverbrauch_json) }}"
          json_ist_liste: "{{ json_str is iterable and json_str is not string }}"
          json_gueltig: >
            {{ json_ist_liste or (json_str is string and json_str | length > 20 and json_str[0] == '[') }}
          # Kaltstart-Default darf NUR beim Mitternachts-Lauf gesetzt werden.
          # Zu allen anderen Zeiten wird der Slot bei ungültigem Helfer übersprungen
          # (nächster 30-Min-Lauf versucht es erneut).
          ist_mitternachtslauf: "{{ now().hour == 0 and now().minute < 15 }}"
      - if:
          - condition: template
            value_template: "{{ not json_gueltig and not ist_mitternachtslauf }}"
        then:
          - action: logbook.log
            data:
              name: "PV Optimizer"
              # json_str | string erzwingt String vor truncate (json_str kann Liste sein).
              message: "{{ bp_version }} JSON-Profil: Helfer ungültig ('{{ json_str | string | truncate(30) }}') und kein Mitternachtslauf. Slot {{ h_index }} übersprungen, kein Kaltstart ausgelöst."
              entity_id: !input helper_logbook_dummy
          - stop: "JSON-Slot übersprungen: Helfer ungültig, warte auf Wiederherstellung oder Mitternacht."
      - variables:
          # Lese verbrauchte Energie der letzten 30 Min DIREKT in kWh (keine Watt-Umrechnung mehr)
          last_half_hour_kwh: "{{ states(var_hausverbrauch_kwh) | float(0) }}"
          # KALTSTART-WERT: geclampter Messwert (0.05-0.6 kWh), schützt vor Ausreißer-Vergiftung.
          # Greift nur noch beim Mitternachts-Lauf mit ungültigem Helfer (siehe Gate oben).
          kaltstart_kwh: "{{ [[last_half_hour_kwh, 0.05] | max, 0.6] | min }}"
          default_arr: "{{ [kaltstart_kwh] * 48 }}"
          current_array: >
            {{ json_str if json_ist_liste else (json_str | from_json if json_gueltig else default_arr) }}
          # Der 7-Tage Exponential Moving Average (EMA) auf kWh-Basis
          new_val: "{{ (current_array[h_index] * (6/7)) + (last_half_hour_kwh * (1/7)) }}"
          new_array: >
            {% set ns = namespace(arr=[]) %}
            {% for i in range(48) %}
              {% if i == h_index %}
                {# round(2) statt round(3): input_text hat ein 255-Zeichen-Limit.
                   48 Werte x 5 Zeichen (round 3) = 289 Zeichen -> set_value würde scheitern.
                   Mit round(2) max. 241 Zeichen. #}
                {% set ns.arr = ns.arr + [new_val | round(2)] %}
              {% else %}
                {% set ns.arr = ns.arr + [current_array[i]] %}
              {% endif %}
            {% endfor %}
            {{ ns.arr | to_json }}
      - action: input_text.set_value
        target:
          entity_id: !input hausverbrauch_json_text
        data:
          value: "{{ new_array }}"
      - action: utility_meter.calibrate
        target:
          entity_id: !input hausverbrauch_utility_sensor
        data:
          value: "0"
      - stop: "JSON-Hausverbrauchsprofil (kWh) aktualisiert und Zähler genullt."

  # ====================================================================
  # KASKADIERTE VARIABLEN FÜR DIE HAUPTSTEUERUNG
  # ====================================================================
  - variables:
      var_grid_export: !input grid_export_sensor
      var_grid_export_kwh: !input grid_export_kwh_heute
      var_speicherverlust: !input speicherverlust_gesamt
      var_max_soc_heute: !input helper_max_soc_heute
      var_battery_soc: !input battery_soc_sensor
      var_wp_temp: !input wp_temp_sensor
      var_wp_water_heater: !input wp_water_heater
      var_wp_kompressor: !input wp_kompressor_sensor
      var_solcast_heute: !input solcast_heute_sensor
      var_solcast_rest_sensor: !input solcast_rest_sensor
      var_hausverbrauch_json: !input hausverbrauch_json_text
      var_wr_max_charge: !input wr_max_charge_current
      var_wr_grid_charge_switch: !input wr_grid_charge_switch
      var_battery_power: !input battery_power_sensor
      var_pv_power: !input pv_power_sensor
      var_pv_forecast: !input solcast_current_sensor
      var_solcast_next_hour: !input solcast_next_hour_sensor

      var_vmax1: !input vmax1_sensor
      var_vmax2: !input vmax2_sensor
      var_vmax3: !input vmax3_sensor

      var_bms1_temp_min: !input bms1_temp_min_sensor
      var_bms2_temp_min: !input bms2_temp_min_sensor
      var_bms3_temp_min: !input bms3_temp_min_sensor
      var_bms1_temp_max: !input bms1_temp_max_sensor
      var_bms2_temp_max: !input bms2_temp_max_sensor
      var_bms3_temp_max: !input bms3_temp_max_sensor

      var_zwangsladung_aktiv: !input helper_zwangsladung_aktiv
      var_batterie_heute_voll: !input helper_batterie_heute_voll
      var_json_tracking: !input json_tracking_sensor
      var_wr_tou_1: !input wr_tou_1
      var_eingriff_dauer: !input eingriff_dauer_sensor
      var_timer_wp_anlauf: !input helper_timer_wp_anlauf
      var_timer_wp_boost: !input helper_timer_wp_boost
      var_timer_peak: !input helper_timer_peak
      var_timer_cooldown: !input helper_timer_cooldown
      var_wp_boost_aktiv: !input wp_boost_aktiv
      var_wr_float_voltage: !input wr_float_voltage_sensor
      var_schwelle_peak_shaving: !input schwelle_peak_shaving
      var_schwelle_wp_boost: !input schwelle_wp_boost

      pack_capacity_ah: !input pack_capacity_ah
      crate_2_deg: !input crate_2_deg
      crate_5_deg: !input crate_5_deg
      crate_10_deg: !input crate_10_deg
      crate_12_deg: !input crate_12_deg
      crate_15_deg: !input crate_15_deg
      crate_20_deg: !input crate_20_deg
      crate_40_deg: !input crate_40_deg
      crate_45_deg: !input crate_45_deg

      faktor_ziel_puffer: !input faktor_ziel_puffer
      faktor_fallback: !input faktor_fallback
      fallback_max_soc: !input fallback_max_soc
      fallback_min_kwh: !input fallback_min_kwh
      min_reststunden: !input min_reststunden
      max_ampere: !input max_ampere
      null_ampere: 0
      min_ampere: !input min_ampere
      peak_ampere: !input peak_ampere
      nominale_spannung: !input nominale_spannung
      default_tou_soc: !input default_tou_soc
      escalation_tou_soc: !input escalation_tou_soc
      grid_ampere_zwangsladung: !input grid_ampere_zwangsladung
      top_balancing_soc: !input top_balancing_soc
      top_balancing_voltage: !input top_balancing_voltage
      var_float_normal: !input float_voltage_normal
      var_float_balancing: !input float_voltage_balancing
      var_wp_ziel_temp_pv: !input wp_ziel_temp_pv
      var_wp_ziel_number: !input wp_ziel_temp_number
      var_wp_hysterese_pv: !input wp_hysterese_pv
      var_wp_ziel_temp_normal: !input wp_ziel_temp_normal
      var_wp_hysterese_normal: !input wp_hysterese_normal
      puffer_kwh: !input puffer_kwh
      var_zeit_blockade: !input zeit_blockade_ende

  - variables:
      grid_export: "{{ (states(var_grid_export) | float(0)) * -1 }}"
      aktueller_soc: "{{ states(var_battery_soc) | float(0) }}"
      ww_temp: "{{ states(var_wp_temp) | float(50) }}"
      aktueller_ladestrom: "{{ states(var_wr_max_charge) | float(140) }}"
      batterie_leistung: "{{ states(var_battery_power) | float(0) }}"
      pv_power: "{{ states(var_pv_power) | float(0) }}"
      pv_forecast: "{{ states(var_pv_forecast) | float(0) }}"
      vmax1: "{{ states(var_vmax1) | float(0) }}"
      vmax2: "{{ states(var_vmax2) | float(0) }}"
      vmax3: "{{ states(var_vmax3) | float(0) }}"
      eingriff_dauer: "{{ states(var_eingriff_dauer) | float(0) }}"
      is_day: "{{ is_state('sun.sun', 'above_horizon') }}"
      schwelle_peak_shaving: "{{ var_schwelle_peak_shaving | float(6500) }}"
      schwelle_wp_boost: "{{ var_schwelle_wp_boost | float(6400) }}"

      pack_capacity_ah: "{{ pack_capacity_ah | float(314) }}"
      crate_2_deg: "{{ crate_2_deg | float(0.00) }}"
      crate_5_deg: "{{ crate_5_deg | float(0.05) }}"
      crate_10_deg: "{{ crate_10_deg | float(0.20) }}"
      crate_12_deg: "{{ crate_12_deg | float(0.30) }}"
      crate_15_deg: "{{ crate_15_deg | float(0.50) }}"
      crate_20_deg: "{{ crate_20_deg | float(0.70) }}"
      crate_40_deg: "{{ crate_40_deg | float(0.70) }}"
      crate_45_deg: "{{ crate_45_deg | float(0.00) }}"

      puffer_kwh: "{{ puffer_kwh | float(1.0) }}"
      faktor_ziel_puffer: "{{ faktor_ziel_puffer | float(1.3) }}"
      faktor_fallback: "{{ faktor_fallback | float(1.2) }}"
      max_ampere: "{{ max_ampere | float(140) }}"
      min_ampere: "{{ min_ampere | float(7) }}"
      peak_ampere: "{{ peak_ampere | float(48) }}"
      nominale_spannung: "{{ nominale_spannung | float(51.2) }}"
      top_balancing_soc: "{{ top_balancing_soc | float(97) }}"
      top_balancing_voltage: "{{ top_balancing_voltage | float(3.4) }}"

      vor_blockade_ende: >
        {% set t = today_at(var_zeit_blockade | string) %}
        {{ now() < t }}
      pack1_online: "{{ var_bms1_temp_min != '' and states(var_bms1_temp_min) | float(-999) != -999 }}"
      pack2_online: "{{ var_bms2_temp_min != '' and states(var_bms2_temp_min) | float(-999) != -999 }}"
      pack3_online: "{{ var_bms3_temp_min != '' and states(var_bms3_temp_min) | float(-999) != -999 }}"
      packs_online: "{{ (1 if pack1_online else 0) + (1 if pack2_online else 0) + (1 if pack3_online else 0) }}"

      batterie_kapazitaet: >
        {% set p_count = packs_online if packs_online > 0 else 1 %}
        {{ (pack_capacity_ah * nominale_spannung * p_count) / 1000 }}

      next_hour_50: "{{ states(var_solcast_next_hour) | float(0) }}"
      next_hour_10: "{{ state_attr(var_solcast_next_hour, 'estimate10') | float(0) }}"
      next_hour_anomalie: "{{ next_hour_50 > 0 and ((next_hour_50 - next_hour_10) / next_hour_50) > 0.20 }}"
      solcast_log_addon: "{{ ' [Info: Prognose unsicher (>20% Varianz)]' if next_hour_anomalie else '' }}"

      # Haus-Profil ist in kWh/Halbstunde. Fallback (nur bis der erste update_json-Lauf
      # den Helfer gefüllt hat): neutrale 0.2 kWh/Halbstunde (~400 W).
      json_profil: >
        {% set j_str = states(var_hausverbrauch_json) %}
        {% set default_arr = [0.2] * 48 %}
        {{ j_str | from_json if j_str is string and j_str | length > 20 else default_arr }}

      solcast_rest_blended: >
        {% set ns = namespace(val=0) %}
        {% if var_solcast_heute != '' and state_attr(var_solcast_heute, 'detailedForecast') is not none %}
          {% for stunde in state_attr(var_solcast_heute, 'detailedForecast') %}
            {% set s_start = as_datetime(stunde.period_start) | as_local %}
            {% set current_period = now().replace(minute=0 if now().minute < 30 else 30, second=0, microsecond=0) %}

            {% if s_start >= current_period and s_start.date() == now().date() %}
              {# detailedForecast liefert kW (mittlere Leistung), nicht kWh -> * 0.5 h #}
              {% set blend = ((stunde.pv_estimate + stunde.pv_estimate10) / 2) * 0.5 %}
              {% set h_index = s_start.hour * 2 + (1 if s_start.minute >= 30 else 0) %}
              {% set haus_kwh = json_profil[h_index] | float(0.2) %}
              {% set netto = blend - haus_kwh %}
              {% set ns.val = ns.val + netto %}
            {% endif %}
          {% endfor %}
        {% else %}
          {% set ns.val = states(var_solcast_rest_sensor) | float(0) %}
        {% endif %}
        {{ ns.val }}

      solcast_nach_blockade: >
        {% set ns = namespace(val=0) %}
        {% if var_solcast_heute != '' and state_attr(var_solcast_heute, 'detailedForecast') is not none %}
          {% for stunde in state_attr(var_solcast_heute, 'detailedForecast') %}
            {% set s_start = as_datetime(stunde.period_start) | as_local %}

            {% set blockade_time = today_at(var_zeit_blockade | string) %}
            {% if s_start >= blockade_time and s_start.date() == now().date() %}
              {# detailedForecast liefert kW (mittlere Leistung), nicht kWh -> * 0.5 h #}
              {% set blend = ((stunde.pv_estimate + stunde.pv_estimate10) / 2) * 0.5 %}
              {% set h_index = s_start.hour * 2 + (1 if s_start.minute >= 30 else 0) %}
              {% set haus_kwh = json_profil[h_index] | float(0.2) %}
              {% set netto = blend - haus_kwh %}
              {% set ns.val = ns.val + netto %}
            {% endif %}
          {% endfor %}
        {% else %}
          {% set ns.val = states(var_solcast_rest_sensor) | float(0) %}
        {% endif %}
        {{ ns.val }}

      temp_min_live: >
        {% set vals = [] %}
        {% if pack1_online %}{% set vals = vals + [states(var_bms1_temp_min) | float(-99)] %}{% endif %}
        {% if pack2_online %}{% set vals = vals + [states(var_bms2_temp_min) | float(-99)] %}{% endif %}
        {% if pack3_online %}{% set vals = vals + [states(var_bms3_temp_min) | float(-99)] %}{% endif %}
        {{ vals | min if vals | length > 0 else -99 }}


      temp_max_live: >
        {% set vals = [] %}
        {% if pack1_online %}{% set vals = vals + [states(var_bms1_temp_max) | float(99)] %}{% endif %}
        {% if pack2_online %}{% set vals = vals + [states(var_bms2_temp_max) | float(99)] %}{% endif %}
        {% if pack3_online %}{% set vals = vals + [states(var_bms3_temp_max) | float(99)] %}{% endif %}
        {{ vals | max if vals | length > 0 else 99 }}

  - variables:
      limit_cold: >
        {% set t = temp_min_live %}
        {% if t <= 2 %} {{ crate_2_deg }}
        {% elif t < 5 %} {{ crate_2_deg + ((t - 2) * (crate_5_deg - crate_2_deg) / (5 - 2)) }}
        {% elif t < 10 %} {{ crate_5_deg + ((t - 5) * (crate_10_deg - crate_5_deg) / (10 - 5)) }}
        {% elif t < 12 %} {{ crate_10_deg + ((t - 10) * (crate_12_deg - crate_10_deg) / (12 - 10)) }}
        {% elif t < 15 %} {{ crate_12_deg + ((t - 12) * (crate_15_deg - crate_12_deg) / (15 - 12)) }}
        {% elif t < 20 %} {{ crate_15_deg + ((t - 15) * (crate_20_deg - crate_15_deg) / (20 - 15)) }}
        {% else %} {{ crate_20_deg }}
        {% endif %}

      limit_hot: >
        {% set t = temp_max_live %}
        {% if t >= 45 %} {{ crate_45_deg }}
        {% elif t > 40 %} {{ crate_40_deg + ((t - 40) * (crate_45_deg - crate_40_deg) / (45 - 40)) }}
        {% else %} {{ crate_40_deg }}
        {% endif %}

      temp_limit_crate: "{{ [limit_cold | float, limit_hot | float] | min }}"

      temp_limit_ampere_raw: >
        {% if packs_online == 0 %}
          10
        {% else %}
          {{ (temp_limit_crate * pack_capacity_ah * packs_online) | round(0) }}
        {% endif %}

      temperatur_limit_ampere: "{{ [temp_limit_ampere_raw, max_ampere] | min }}"
      freie_kwh: "{{ batterie_kapazitaet * (1 - (aktueller_soc / 100)) }}"
      # potential_export bleibt als Diagnosegröße (PV - Load, da sich die
      # Batterie herauskürzt) für Logs erhalten. Für die Schwellen-Entscheidungen
      # (WP-Boost, Peak-Shaving) ist aber der REALE Netz-Export maßgeblich:
      # Der Wechselrichter ist auf 60% kWp gedeckelt; entscheidend ist, was
      # tatsächlich ins Netz geht, nicht was die Batterie gerade puffert.
      potential_export: "{{ grid_export - batterie_leistung }}"
      real_export: "{{ grid_export }}"

      netto_tagesueberschuss: "{{ solcast_rest_blended - puffer_kwh }}"
      netto_nach_blockade: "{{ solcast_nach_blockade - puffer_kwh }}"

  # ====================================================================
  # NEU: ZEITANTEILIGE HALBSTUNDEN-SCHLEIFE (Ladezeit + Defizit)
  # ====================================================================
  - variables:
      slot_daten: >
        {% set ns = namespace(stunden=0.0, defizit=0.0) %}
        {% set jetzt = now() %}
        {% set slot_start = jetzt.replace(minute=(0 if jetzt.minute < 30 else 30), second=0, microsecond=0) %}
        {% if var_solcast_heute != '' and state_attr(var_solcast_heute, 'detailedForecast') is not none %}
          {% for slot in state_attr(var_solcast_heute, 'detailedForecast') %}
            {% set s_start = as_datetime(slot.period_start) | as_local %}
            {% if s_start.date() == jetzt.date() and s_start >= slot_start %}
              {% if s_start == slot_start %}
                {% set anteil = (slot_start + timedelta(minutes=30) - jetzt).total_seconds() / 1800 %}
              {% else %}
                {% set anteil = 1.0 %}
              {% endif %}
              {# detailedForecast liefert kW (mittlere Leistung), nicht kWh -> * 0.5 h #}
              {% set blend = ((slot.pv_estimate + slot.pv_estimate10) / 2) * 0.5 %}
              {% set h_index = s_start.hour * 2 + (1 if s_start.minute >= 30 else 0) %}
              {% set haus_kwh = json_profil[h_index] | float(0.2) %}
              {% set netto = (blend - haus_kwh) * anteil %}
              {% if netto > 0 %}
                {% set ns.stunden = ns.stunden + (0.5 * anteil) %}
              {% else %}
                {% set ns.defizit = ns.defizit + (netto | abs) %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ {'stunden': ns.stunden | round(3), 'defizit': ns.defizit | round(3)} | to_json }}

  - variables:
      # HA konvertiert das to_json-Ergebnis von slot_daten u.U. selbst zurück in ein Dict
      # (native type rendering). Deshalb beide Fälle abdecken: Dict direkt nutzen,
      # String erst per from_json parsen.
      slot_daten_dict: "{{ slot_daten if slot_daten is mapping else (slot_daten | from_json) }}"
      verf_stunden: "{{ slot_daten_dict.stunden | float(0) }}"
      defizit_kwh: "{{ slot_daten_dict.defizit | float(0) }}"
      benoetigt_kwh: "{{ freie_kwh + defizit_kwh }}"
      # Roh-Leistung OHNE Faktor (W). Faktor kommt je Prio dazu.
      # verf_stunden <= 0 -> 999999 erzwingt später "auf Max".
      noetige_leistung_roh: >
        {% if verf_stunden > 0 %}
          {{ (benoetigt_kwh / verf_stunden) * 1000 }}
        {% else %}
          999999
        {% endif %}

  - variables:
      lade_quote: >
        {% if netto_tagesueberschuss > 0 %}
          {% set q = (freie_kwh * faktor_ziel_puffer) / netto_tagesueberschuss %}
          {{ [ [q, 0] | max, 1.0 ] | min }}
        {% else %}
          1.0
        {% endif %}

  - variables:
      h_index_now: "{{ now().hour * 2 + (1 if now().minute >= 30 else 0) }}"
      # Haus-Profil ist kWh/Halbstunde -> für Momentan-Watt * 2000
      haus_aktuell_w: "{{ (json_profil[h_index_now] | float(0.2)) * 2000 }}"
      prognose_surplus: "{{ [pv_forecast - haus_aktuell_w, 0] | max }}"

      # === Zeit-basierte Ziel-Ströme ===
      amp_roh_13: "{{ (noetige_leistung_roh * faktor_ziel_puffer) / nominale_spannung }}"
      amp_roh_12: "{{ (noetige_leistung_roh * faktor_fallback) / nominale_spannung }}"
      # Prio 5 Normalfall (×1,3), gedeckelt durch min/max
      ziel_p5_raw: "{{ [[amp_roh_13 | round(0), min_ampere] | max, max_ampere] | min }}"
      # Fall (b): erreicht die strengere ×1,2-Rechnung selbst schon Max?
      # NUR wenn noch genug nutzbare Restladezeit da ist (min_reststunden) UND
      # der Bedarf über der Bagatellgrenze liegt (fallback_min_kwh). Verhindert
      # sinnlose Max-Verriegelung am Tagesende (Restzeit -> 0, Strom explodiert).
      fall_b_aktiv: >
        {{ (amp_roh_12 | round(0)) >= (max_ampere | round(0)) and
           verf_stunden >= (min_reststunden | float(1.0)) and
           benoetigt_kwh > (fallback_min_kwh | float(1.0)) }}

      temp_log_addon: " (Deckel durch Batterietemperatur: {{ temperatur_limit_ampere | round(0) }}A bei Min: {{ temp_min_live | round(1) }}°C / Max: {{ temp_max_live | round(1) }}°C / {{ temp_limit_crate | round(2) }}C)"
      target_p0: "{{ [max_ampere, temperatur_limit_ampere] | min }}"
      target_p1: "{{ [min_ampere, temperatur_limit_ampere] | min }}"
      target_p15: "{{ [max_ampere, temperatur_limit_ampere] | min }}"
      # Peak-Shaving nutzt den FESTEN Parameter peak_ampere (gedeckelt nur
      # durch Temperatur). Die frühere Kopplung an den dynamischen P5-Wert
      # (raw_peak = max(...)) war eine nicht abgestimmte Änderung und ist entfernt.
      target_p3: "{{ [peak_ampere, temperatur_limit_ampere] | min }}"
      # Prio 5 Zielstrom, zusätzlich durch Temperatur gedeckelt
      target_p5: "{{ [ziel_p5_raw, temperatur_limit_ampere] | min }}"

  - variables:
      zwangsladung_aktiv: "{{ is_state(var_zwangsladung_aktiv, 'on') }}"
      heute_schon_voll: "{{ is_state(var_batterie_heute_voll, 'on') }}"
      aktueller_modus: "{{ states(var_lade_modus) if var_lade_modus != '' else 'normal' }}"
      top_balancing_noetig: >
        {{ aktueller_soc >= top_balancing_soc and
        ((not heute_schon_voll and (vmax1 >= top_balancing_voltage or vmax2 >= top_balancing_voltage or (pack3_online and vmax3 >= top_balancing_voltage)))
        or (states(var_timer_cooldown) == 'active' and not zwangsladung_aktiv)) }}

      schnee_falle_aktiv: >
        {% set is_winter = now().month in [11, 12, 1, 2] %}
        {% set power_low = pv_power < (pv_forecast / 2) %}
        {% set diff_high = (pv_forecast - pv_power) > 1000 %}
        {{ is_winter and power_low and diff_high }}

      wp_sperre_aktiv: >
        {{ var_wp_boost_aktiv and states(var_timer_wp_anlauf) == 'active' }}

      wp_laufzeit_aktiv: >
        {{ states(var_timer_wp_boost) == 'active' }}

      wp_kompressor_aktiv: >
        {% if var_wp_kompressor != '' and states[var_wp_kompressor] is defined and states[var_wp_kompressor] is not none %}
          {% set state = states[var_wp_kompressor].state %}
          {% set last_changed = states[var_wp_kompressor].last_changed %}
          {% if state == 'on' %}true
          {% elif state == 'off' and last_changed is not none %}{{ (now() - last_changed).total_seconds() < (11 * 60) }}
          {% else %}false{% endif %}
        {% else %}false{% endif %}

      # ================================================================
      # DYNAMISCHES BLOCKADE-ENDE T:
      # Spätester Ladebeginn T (Halbstunden-Raster, nur VOLLSTÄNDIG in der
      # Zukunft liegende Slots = konservativ, der angebrochene Slot zählt
      # nicht mehr), sodass Netto-Prognose ab T noch >= faktor_ziel_puffer
      # (1,3) x freie_kwh. Liefert {'t': ISO oder '', 'gesamt': Netto ab
      # naechster Slotgrenze}. 'gesamt' dient dem finalen 1,2-Halt.
      # ================================================================
      blockade_dyn_json: >
        {% set ns = namespace(gesamt=0.0, kand=[]) %}
        {% if var_solcast_heute != '' and state_attr(var_solcast_heute, 'detailedForecast') is not none %}
          {% set blockade_time = today_at(var_zeit_blockade | string) %}
          {% for slot in state_attr(var_solcast_heute, 'detailedForecast') %}
            {% set s_start = as_datetime(slot.period_start) | as_local %}
            {% if s_start > now() and s_start.date() == now().date() %}
              {% set blend = ((slot.pv_estimate + slot.pv_estimate10) / 2) * 0.5 %}
              {% set h_index = s_start.hour * 2 + (1 if s_start.minute >= 30 else 0) %}
              {% set haus_kwh = json_profil[h_index] | float(0.2) %}
              {% set netto = blend - haus_kwh %}
              {% set ns.gesamt = ns.gesamt + netto %}
              {% if s_start <= blockade_time %}
                {# s_start | string erzwingt einen String; slot.period_start kann
                   je nach Solcast-Integration ein datetime-Objekt sein, das
                   spaeter to_json crashen liesse (Type not JSON serializable). #}
                {% set ns.kand = ns.kand + [[s_start | string, netto]] %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {% set ziel = faktor_ziel_puffer * freie_kwh %}
        {% set ns2 = namespace(best='', praefix=0.0) %}
        {% for paar in ns.kand %}
          {% if (ns.gesamt - ns2.praefix) >= ziel %}
            {% set ns2.best = paar[0] %}
          {% endif %}
          {% set ns2.praefix = ns2.praefix + paar[1] %}
        {% endfor %}
        {{ {'t': ns2.best, 'gesamt': ns.gesamt | round(2)} | to_json }}
      # Auswertung (HA kann das to_json-Ergebnis bereits als Dict liefern -> mapping-Check)
      blockade_dyn: "{{ blockade_dyn_json if blockade_dyn_json is mapping else (blockade_dyn_json | from_json) }}"
      blockade_dyn_t: "{{ blockade_dyn.t | default('') }}"
      blockade_dyn_gesamt: "{{ blockade_dyn.gesamt | default(0) | float(0) }}"
      # BLOCKADE-LOGIK (dynamisches Ende):
      # Existiert ein T (spaetester Ladebeginn, ab dem Netto >= 1,3 x frei):
      # blockieren. T wandert bei sinkender Prognose von selbst nach vorn.
      # Kein T mehr -> direkte Freigabe an die Kaskade (Prio 5). Der Faktor
      # faktor_fallback (1,2) wird NUR noch von Fall B (Max-Verriegelung) genutzt.
      # TAGESMARKER: Nach dem ersten Austritt (helper_blockade_beendet == on)
      # kein Wiedereintritt mehr bis zum Mitternachts-Reset.
      blockade_heute_beendet: "{{ var_helper_blockade_beendet != '' and states(var_helper_blockade_beendet) == 'on' }}"
      blockade_aktiv: >
        {{ is_day and aktueller_soc < 99 and vor_blockade_ende and not schnee_falle_aktiv
           and blockade_dyn_t != '' and not blockade_heute_beendet }}

# ====================================================================
# ROOT-ACTIONS STATE-MACHINE
# ====================================================================

  # BLOCKADE-AUSTRITT ERKENNEN: Modus steht noch auf 'blockade', aber die
  # Bedingung ist gefallen (T weg / SOC / Zeit) -> Tagesmarker setzen.
  # Feuert genau einmal, da der folgende Prio-Zweig den Modus umsetzt.
  - if:
      - condition: template
        value_template: >
          {{ var_helper_blockade_beendet != '' and
             aktueller_modus == 'blockade' and not blockade_aktiv }}
    then:
      - action: input_boolean.turn_on
        target:
          entity_id: "{{ var_helper_blockade_beendet }}"
      - action: logbook.log
        data:
          name: "PV Optimizer"
          message: "{{ bp_version }} Blockade-Austritt: Tagesmarker gesetzt. Die Morgen-Blockade tritt heute nicht erneut ein (Reset um Mitternacht)."
          entity_id: !input helper_logbook_dummy

  - if:
      - condition: template
        value_template: "{{ var_max_soc_heute is string and var_max_soc_heute | length > 0 and aktueller_soc > (states(var_max_soc_heute) | float(0)) }}"
    then:
      - action: input_number.set_value
        target:
          entity_id: !input helper_max_soc_heute
        data:
          value: "{{ aktueller_soc }}"

  - if:
      - condition: template
        value_template: "{{ packs_online == 0 }}"
    then:
      - action: persistent_notification.create
        data:
          notification_id: "bms_offline_warning"
          title: "⚠️ PV Optimizer Warnung"
          message: "{{ bp_version }} BMS-Sensoren offline! Ladefreigabe auf 10A Notlauf gesetzt."
    else:
      - action: persistent_notification.dismiss
        data:
          notification_id: "bms_offline_warning"

  # ====================================================================
  # SCHATTEN-BMS ANTI-WINDUP (alle 5 Min):
  # Liest das Attribut 'raw_drift_soc' des Schatten-BMS-Sensors (Package).
  # Liegt der ungeclampte SOC > 100% (Nachladung nach dem Tare-Zeitpunkt),
  # werden beide Tare-Helfer auf die aktuellen Zählerstände nachgeführt
  # -> raw_drift_soc springt zurück auf exakt 100%.
  # Die SOC-Formel (cap/eff) lebt NUR im Package-Sensor, nicht hier.
  # ====================================================================
  - variables:
      schatten_raw_soc: >
        {% if var_schatten_bms == '' or var_helper_tare_charge == '' or var_battery_total_charge == '' %}
          -1
        {% else %}
          {{ state_attr(var_schatten_bms, 'raw_drift_soc') | float(-1) }}
        {% endif %}

  - if:
      - condition: template
        value_template: >
          {{ (schatten_raw_soc | float(-1)) > 100 and
             (states(var_battery_total_charge) | float(0)) > (states(var_helper_tare_charge) | float(0)) and
             states(var_timer_cooldown) != 'active' }}
    then:
      - action: logbook.log
        data:
          name: "PV Optimizer"
          message: >
            {{ bp_version }} Schatten-BMS Anti-Windup: Roh-SOC bei {{ schatten_raw_soc | float(0) | round(2) }}% (> 100%).
            Tare nachgeführt auf aktuelle Zählerstände (Charge: {{ states(var_helper_tare_charge) | float(0) | round(2) }} -> {{ states(var_battery_total_charge) | float(0) | round(2) }} kWh |
            Discharge: {{ states(var_helper_tare_discharge) | float(0) | round(2) }} -> {{ states(var_battery_total_discharge) | float(0) | round(2) }} kWh). Schatten-SOC neu verankert auf 100%.
          entity_id: !input helper_logbook_dummy
      - action: input_number.set_value
        target:
          entity_id: "{{ var_helper_tare_charge }}"
        data:
          value: "{{ states(var_battery_total_charge) | float(0) }}"
      - action: input_number.set_value
        target:
          entity_id: "{{ var_helper_tare_discharge }}"
        data:
          value: "{{ states(var_battery_total_discharge) | float(0) }}"

  - choose:
      - alias: "Tägliches Aufräumen & Sanity Checks"
        conditions:
          - condition: trigger
            id: maintenance
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input helper_batterie_heute_voll
          # Blockade-Tagesmarker zurücksetzen (falls konfiguriert)
          - if:
              - condition: template
                value_template: "{{ var_helper_blockade_beendet != '' }}"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ var_helper_blockade_beendet }}"
          - if:
              - condition: template
                value_template: "{{ var_lade_modus != '' }}"
            then:
              - action: input_select.select_option
                target:
                  entity_id: "{{ var_lade_modus }}"
                data:
                  option: "normal"
          # WP-MITTERNACHTS-CHECK: PV-Boost-Werte dürfen nicht über Nacht stehen
          # bleiben (z.B. wenn Timer durch Neustart verloren ging und auch der
          # 5-Min-Watchdog nicht griff). Harte Rücksetzung auf Normalwerte.
          - if:
              - condition: template
                value_template: >
                  {{ var_wp_boost_aktiv and var_wp_ziel_temp_pv != var_wp_ziel_temp_normal and
                     (state_attr(var_wp_water_heater, 'temperature') | float(-1) | round(0)) == (var_wp_ziel_temp_pv | float(0) | round(0)) }}
            then:
              - action: number.set_value
                target:
                  entity_id: !input wp_hysterese_number
                data:
                  value: "{{ var_wp_hysterese_normal }}"
              - action: water_heater.set_temperature
                target:
                  entity_id: !input wp_water_heater
                data:
                  temperature: "{{ var_wp_ziel_temp_normal }}"
              # ViCare-Doppelsetzung: Zieltemperatur zusätzlich über number-Entity
              - if:
                  - condition: template
                    value_template: "{{ var_wp_ziel_number != '' }}"
                then:
                  - action: number.set_value
                    target:
                      entity_id: "{{ var_wp_ziel_number }}"
                    data:
                      value: "{{ var_wp_ziel_temp_normal }}"
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Mitternachts-Check: WP-Ziel stand noch auf PV-Boost-Wert ({{ var_wp_ziel_temp_pv }}°C). Zurückgesetzt auf Ziel {{ var_wp_ziel_temp_normal }}°C / Hysterese {{ var_wp_hysterese_normal }}°C."
                  entity_id: !input helper_logbook_dummy
          # FLOAT-MITTERNACHTS-CHECK: Wenn der Cooldown-Timer (Balancing) verloren
          # ging, feuert float_boost_ende nie und die Float-Spannung bleibt auf
          # dem Balancing-Wert hängen. Timer idle + Float noch angehoben -> Reset.
          - if:
              - condition: template
                value_template: >
                  {{ var_wr_float_voltage != '' and
                     states(var_timer_cooldown) == 'idle' and
                     (var_float_balancing | float(0) | round(1)) != (var_float_normal | float(0) | round(1)) and
                     (states(var_wr_float_voltage) | float(0) | round(1)) == (var_float_balancing | float(0) | round(1)) }}
            then:
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_float_voltage }}"
                data:
                  value: "{{ var_float_normal }}"
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Mitternachts-Check: Float-Spannung stand noch auf Balancing-Wert ({{ var_float_balancing | round(3) }}V), obwohl der Cooldown-Timer idle ist (vermutlich Timer verloren). Zurückgesetzt auf {{ var_float_normal | round(3) }}V."
                  entity_id: !input helper_logbook_dummy
          - if:
              - condition: template
                value_template: "{{ var_max_soc_heute is string and var_max_soc_heute | length > 0 }}"
            then:
              - action: input_number.set_value
                target:
                  entity_id: !input helper_max_soc_heute
                data:
                  value: 0
          - if:
              - condition: state
                entity_id: !input helper_zwangsladung_aktiv
                state: "on"
              - condition: template
                value_template: "{{ states(var_wr_tou_1) | float(0) < 100 }}"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: !input helper_zwangsladung_aktiv
              - action: switch.turn_off
                target:
                  entity_id: "{{ var_wr_grid_charge_switch }}"
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Safety-Reset: Zwangsladung war aktiv, aber ToU-SOC nicht auf 100% (ToU-SOC 1: {{ states(var_wr_tou_1) }}% < 100%). Helfer wurde sicherheitshalber zurückgesetzt."
                  entity_id: !input helper_logbook_dummy

  - choose:
      - alias: "Aktionen bei Sonnenuntergang ausführen"
        conditions:
          - condition: trigger
            id: sunset_check
        sequence:
          - if:
              - condition: template
                value_template: "{{ var_grid_export_kwh is string and var_grid_export_kwh | length > 0 and var_speicherverlust is string and var_speicherverlust | length > 0 and var_max_soc_heute is string and var_max_soc_heute | length > 0 }}"
            then:
              - variables:
                  max_soc_tag: "{{ states(var_max_soc_heute) | float(0) }}"
                  missing_capacity_at_max_kwh: "{{ batterie_kapazitaet * (1 - (max_soc_tag / 100)) }}"
                  exported_kwh: "{{ states(var_grid_export_kwh) | float(0) }}"
                  lost_kwh: "{{ [missing_capacity_at_max_kwh, exported_kwh] | min }}"
                  current_tracker_val: "{{ states(var_speicherverlust) | float(0) }}"
              - if:
                  - condition: template
                    value_template: "{{ lost_kwh > 0.1 }}"
                then:
                  - action: input_number.set_value
                    target:
                      entity_id: !input speicherverlust_gesamt
                    data:
                      value: "{{ current_tracker_val + lost_kwh }}"
                  - action: logbook.log
                    data:
                      name: "PV Optimizer"
                      message: >
                        {{ bp_version }} SPEICHERVERLUST-TRACKER: Höchster Tages-SOC war {{ max_soc_tag }}%. Freier Platz zu diesem Zeitpunkt: {{ missing_capacity_at_max_kwh | round(2) }} kWh.
                        Tages-Einspeisung lag bei {{ exported_kwh | round(2) }} kWh.
                        Es wurden {{ lost_kwh | round(2) }} kWh als "Verschenkte Speicherkapazität" auf den Zähler addiert (Zähler Neu: {{ (current_tracker_val + lost_kwh) | round(2) }} kWh = Alt: {{ current_tracker_val | round(2) }} kWh + Min(Freiplatz: {{ missing_capacity_at_max_kwh | round(2) }} kWh, Einspeisung: {{ exported_kwh | round(2) }} kWh)).
                      entity_id: !input helper_logbook_dummy

          - if:
              - condition: state
                entity_id: !input helper_batterie_heute_voll
                state: "off"
              - condition: template
                value_template: "{{ eingriff_dauer > 0.5 }}"
            then:
              - action: persistent_notification.create
                data:
                  title: "⚠️ PV Optimizer Warnung"
                  message: "{{ bp_version }} Der Akku wurde heute nicht voll ({{ top_balancing_soc }}%), obwohl die Steuerung für {{ eingriff_dauer | round(1) }} Stunden eingegriffen hat. Bitte Logik prüfen!"
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} DIAGNOSE: Akku hat heute die Schwelle nicht erreicht, obwohl die Steuerung aktiv war (Höchster Tages-SOC: {{ states(var_max_soc_heute) }}% < Ziel-Schwelle: {{ top_balancing_soc }}% | Eingriff-Dauer: {{ eingriff_dauer | round(1) }}h > 0.5h)."
                  entity_id: !input helper_logbook_dummy

          - if:
              - condition: template
                value_template: "{{ ((aktueller_ladestrom | round(0)) - (target_p0 | round(0))) | abs >= 2 }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Feierabend: Die Sonne ist untergegangen. Ladestrom für die Nacht auf Maximalwert geöffnet (Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ target_p0 }}A | Limitierung durch Temp: {{ temperatur_limit_ampere | round(0) }}A).{{ temp_log_addon }}"
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ target_p0 }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "nacht"

  - choose:
      - alias: "BMS Balancing Logic"
        conditions:
          - condition: trigger
            id: maintenance
        sequence:
          - variables:
              tage_liste: >
                {% set s = states(var_json_tracking) %}
                {{ s | from_json if s is string and s.startswith('[') else [] }}
              heute: "{{ now().strftime('%Y-%m-%d') }}"
              gestern: "{{ (now() - timedelta(days=1)).strftime('%Y-%m-%d') }}"
              vor_9_tagen: "{{ (now() - timedelta(days=9)).strftime('%Y-%m-%d') }}"
              letztes_100_datum: "{{ tage_liste | max if tage_liste | length > 0 else '2000-01-01' }}"
              aktueller_min_soc: "{{ states(var_wr_tou_1) | float(20) }}"
          - choose:
              - alias: "Zwei Tage in Folge voll"
                conditions:
                  - condition: template
                    value_template: "{{ heute in tage_liste and gestern in tage_liste }}"
                sequence:
                  - if:
                      - condition: template
                        value_template: "{{ aktueller_min_soc != default_tou_soc }}"
                    then:
                      - action: number.set_value
                        target:
                          entity_id:
                            - !input wr_tou_1
                            - !input wr_tou_2
                            - !input wr_tou_3
                            - !input wr_tou_4
                            - !input wr_tou_5
                            - !input wr_tou_6
                        data:
                          value: "{{ default_tou_soc }}"
                      - action: logbook.log
                        data:
                          name: "PV Optimizer"
                          message: "{{ bp_version }} BMS-Balancing: 2 Tage in Folge Voll-Schwelle erreicht. ToU-Programme 1-6 abgesenkt (Aktueller ToU-SOC: {{ aktueller_min_soc }}% -> Ziel: {{ default_tou_soc }}%)."
                          entity_id: !input helper_logbook_dummy
              - alias: "Seit 9 Tagen nicht voll"
                conditions:
                  - condition: template
                    value_template: "{{ letztes_100_datum < vor_9_tagen }}"
                sequence:
                  - if:
                      - condition: template
                        value_template: "{{ aktueller_min_soc != escalation_tou_soc }}"
                    then:
                      - action: number.set_value
                        target:
                          entity_id:
                            - !input wr_tou_1
                            - !input wr_tou_2
                            - !input wr_tou_3
                            - !input wr_tou_4
                            - !input wr_tou_5
                            - !input wr_tou_6
                        data:
                          value: "{{ escalation_tou_soc }}"
                      - action: logbook.log
                        data:
                          name: "PV Optimizer"
                          message: "{{ bp_version }} BMS-Balancing: Seit 9 Tagen Ziel-Schwelle nicht erreicht. ToU-Programme 1-6 erhöht (Letztes 100% SOC Datum: {{ letztes_100_datum }} < Grenze: {{ vor_9_tagen }} | Aktueller ToU-SOC: {{ aktueller_min_soc }}% -> Ziel: {{ escalation_tou_soc }}%)."
                          entity_id: !input helper_logbook_dummy

  - choose:
      - alias: "ZWANGSLADUNG STARTEN"
        conditions:
          - condition: trigger
            id: zwangsladung_start
          - condition: template
            value_template: "{{ now().month in [11, 12, 1, 2] }}"
          - condition: state
            entity_id: !input helper_zwangsladung_aktiv
            state: "off"
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: !input helper_zwangsladung_aktiv
          - action: switch.turn_on
            target:
              entity_id: "{{ var_wr_grid_charge_switch }}"
          - action: number.set_value
            target:
              entity_id: !input wr_grid_charge_current
            data:
              value: "{{ grid_ampere_zwangsladung }}"
          - action: number.set_value
            target:
              entity_id:
                - !input wr_tou_1
                - !input wr_tou_2
                - !input wr_tou_3
                - !input wr_tou_4
                - !input wr_tou_5
                - !input wr_tou_6
            data:
              value: 100
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: "{{ bp_version }} Zwangsladung GESTARTET (Seit 10 Tagen nicht voll). Schalter aktiv (Gesamt-SOC: {{ aktueller_soc | round(1) }}% < 100% über 10 Tage | Aktueller Monat: {{ now().month }} in [11,12,1,2])."
              entity_id: !input helper_logbook_dummy

      - alias: "ZWANGSLADUNG: 100% ERREICHT"
        conditions:
          - condition: trigger
            id: zwangsladung_100
          - condition: state
            entity_id: !input helper_zwangsladung_aktiv
            state: "on"
          - condition: state
            entity_id: !input helper_timer_cooldown
            state: "idle"
        sequence:
          - action: timer.start
            target:
              entity_id: !input helper_timer_cooldown
            data:
              duration: !input duration_cooldown
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: "{{ bp_version }} Zwangsladung hat 100% erreicht. Cooldown Timer (Balancing) gestartet (Gesamt-SOC: {{ aktueller_soc | round(1) }}%)."
              entity_id: !input helper_logbook_dummy

      - alias: "ZWANGSLADUNG BEENDEN"
        conditions:
          - condition: trigger
            id: zwangsladung_ende
          - condition: state
            entity_id: !input helper_zwangsladung_aktiv
            state: "on"
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input helper_zwangsladung_aktiv
          - action: switch.turn_off
            target:
              entity_id: "{{ var_wr_grid_charge_switch }}"
          - action: number.set_value
            target:
              entity_id:
                - !input wr_tou_1
                - !input wr_tou_2
                - !input wr_tou_3
                - !input wr_tou_4
                - !input wr_tou_5
                - !input wr_tou_6
            data:
              value: "{{ default_tou_soc }}"
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: "{{ bp_version }} Zwangsladung BEENDET. Cooldown abgelaufen. System zurück auf Normalbetrieb (ToU-Programme 1-6 -> {{ default_tou_soc }}%)."
              entity_id: !input helper_logbook_dummy

  - choose:
      - alias: "FLOAT-BOOST STARTEN (Timer läuft an)"
        conditions:
          - condition: trigger
            id: float_boost_start
        sequence:
          - if:
              - condition: template
                value_template: "{{ var_wr_float_voltage != '' }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Zellpflege active (Balancing Timer gestartet). Wechselrichter Float-Spannung angehoben (Spannungs-Wechsel: {{ var_float_normal | round(3) }}V -> {{ var_float_balancing | round(3) }}V)."
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_float_voltage }}"
                data:
                  value: "{{ var_float_balancing }}"

      - alias: "FLOAT-BOOST BEENDEN (Timer ist abgelaufen)"
        conditions:
          - condition: trigger
            id: float_boost_ende
        sequence:
          # SCHATTEN-BMS-TARE: jetzt HIER (am Zellpflege-Ende) statt am Balancing-
          # Start. Damit ist die gesamte Nachladung der Balancing-Phase im
          # Zähler enthalten und der Schatten-SOC steht exakt jetzt auf 100%.
          # Greift auch nach dem Zwangsladungs-Cooldown (Batterie ebenfalls voll).
          - if:
              - condition: template
                value_template: "{{ var_helper_tare_charge != '' and var_battery_total_charge != '' }}"
            then:
              - action: input_number.set_value
                target:
                  entity_id: "{{ var_helper_tare_charge }}"
                data:
                  value: "{{ states(var_battery_total_charge) | float(0) }}"
              - action: input_number.set_value
                target:
                  entity_id: "{{ var_helper_tare_discharge }}"
                data:
                  value: "{{ states(var_battery_total_discharge) | float(0) }}"
          - if:
              - condition: template
                value_template: "{{ var_wr_float_voltage != '' }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Zellpflege beendet. Float-Spannung zurückgesetzt ({{ var_float_balancing | round(3) }}V -> {{ var_float_normal | round(3) }}V), Schatten-BMS (Tare) auf 100% kalibriert."
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_float_voltage }}"
                data:
                  value: "{{ var_float_normal }}"

  - choose:
      - alias: "Zieht den Peak-Shaving Timer auf"
        conditions:
          - condition: template
            value_template: "{{ real_export > schwelle_peak_shaving and not wp_sperre_aktiv }}"
        sequence:
          - action: timer.start
            target:
              entity_id: !input helper_timer_peak
            data:
              duration: !input duration_peak_hold
      - alias: "Löscht den Peak-Shaving Timer"
        conditions:
          - condition: template
            value_template: "{{ wp_sperre_aktiv }}"
        sequence:
          - action: timer.cancel
            target:
              entity_id: !input helper_timer_peak

  - choose:
      - alias: "WP PRIO 1: TÄGLICHES WARMWASSER (BOOST)"
        conditions:
          - condition: template
            value_template: "{{ var_wp_boost_aktiv }}"
          - condition: template
            value_template: "{{ real_export > schwelle_wp_boost }}"
          - condition: template
            value_template: "{{ ww_temp < (var_wp_ziel_temp_pv - var_wp_hysterese_pv) }}"
          - condition: template
            value_template: "{{ states(var_timer_wp_anlauf) != 'active' }}"
          - condition: template
            value_template: "{{ states(var_timer_wp_boost) != 'active' }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: !input wp_hysterese_number
            data:
              value: "{{ var_wp_hysterese_pv }}"
          - action: water_heater.set_temperature
            target:
              entity_id: !input wp_water_heater
            data:
              temperature: "{{ var_wp_ziel_temp_pv }}"
          # ViCare-Doppelsetzung: Zieltemperatur zusätzlich über number-Entity
          - if:
              - condition: template
                value_template: "{{ var_wp_ziel_number != '' }}"
            then:
              - action: number.set_value
                target:
                  entity_id: "{{ var_wp_ziel_number }}"
                data:
                  value: "{{ var_wp_ziel_temp_pv }}"
          - action: button.press
            target:
              entity_id: !input wp_boost_button
          - action: timer.start
            target:
              entity_id: !input helper_timer_wp_anlauf
            data:
              duration: !input duration_wp_anlauf
          - action: timer.start
            target:
              entity_id: !input helper_timer_wp_boost
            data:
              duration: !input duration_wp_laufzeit
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: >
                {{ bp_version }} WP PV-Boost ausgelöst (Wasser {{ ww_temp | round(1) }}°C < PV-Startwert {{ (var_wp_ziel_temp_pv - var_wp_hysterese_pv) | round(1) }}°C, Netz-Export {{ real_export | round(0) }}W > {{ schwelle_wp_boost | round(0) }}W).
                Ziel auf {{ var_wp_ziel_temp_pv }}°C, Hysterese auf {{ var_wp_hysterese_pv }}°C gesetzt. Timer gestartet (Anlauf + Laufzeit).{{ solcast_log_addon }}
              entity_id: !input helper_logbook_dummy

      # DIAGNOSE: Boost-Kernbedingungen (Überschuss + WW-Temp) sind erfüllt,
      # aber ein WP-Timer ist noch active -> Boost wird blockiert. Macht die
      # Ursache einer verzögerten/ausbleibenden Boost-Auslösung im Log sichtbar.
      # (Greift nur, wenn wirklich ein Timer blockiert; sonst läuft der Zweig oben.)
      - alias: "WP DIAGNOSE: Boost bereit, aber Timer blockiert"
        conditions:
          - condition: template
            value_template: "{{ var_wp_boost_aktiv }}"
          - condition: template
            value_template: "{{ real_export > schwelle_wp_boost }}"
          - condition: template
            value_template: "{{ ww_temp < (var_wp_ziel_temp_pv - var_wp_hysterese_pv) }}"
          - condition: template
            value_template: "{{ states(var_timer_wp_anlauf) == 'active' or states(var_timer_wp_boost) == 'active' }}"
        sequence:
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: >
                {{ bp_version }} WP-Boost bereit (Netz-Export {{ real_export | round(0) }}W > {{ schwelle_wp_boost | round(0) }}W, Wasser {{ ww_temp | round(1) }}°C < {{ (var_wp_ziel_temp_pv - var_wp_hysterese_pv) | round(1) }}°C), aber blockiert durch aktiven Timer (Anlauf: {{ states(var_timer_wp_anlauf) }}, Laufzeit: {{ states(var_timer_wp_boost) }}). Kein neuer Boost bis Timer idle.
              entity_id: !input helper_logbook_dummy

        sequence:
          - action: number.set_value
            target:
              entity_id: !input wp_hysterese_number
            data:
              value: "{{ var_wp_hysterese_normal }}"
          - action: water_heater.set_temperature
            target:
              entity_id: !input wp_water_heater
            data:
              temperature: "{{ var_wp_ziel_temp_normal }}"
          # ViCare-Doppelsetzung: Zieltemperatur zusätzlich über number-Entity
          - if:
              - condition: template
                value_template: "{{ var_wp_ziel_number != '' }}"
            then:
              - action: number.set_value
                target:
                  entity_id: "{{ var_wp_ziel_number }}"
                data:
                  value: "{{ var_wp_ziel_temp_normal }}"
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: >
                {{ bp_version }} WP PV-Boost Timer abgelaufen. System kehrt zu Normalwerten zurück:
                Ziel auf {{ var_wp_ziel_temp_normal }}°C, Hysterese auf {{ var_wp_hysterese_normal }}°C gesetzt (Timer-Status: idle).
              entity_id: !input helper_logbook_dummy

      - alias: "WP PRIO 1.2: WATCHDOG (Timer nach Neustart verloren)"
        # Sicherheitsnetz: Wenn der wp_boost-Timer z.B. durch einen HA-Neustart
        # verloren ging, feuert der 'active->idle'-Trigger nie und die WP bleibt
        # auf den PV-Boost-Werten hängen. Dieser Zweig erkennt das bei jedem
        # Lauf: beide WP-Timer idle, aber Ziel-Temp steht noch auf dem PV-Wert.
        conditions:
          - condition: template
            value_template: "{{ var_wp_boost_aktiv }}"
          - condition: template
            value_template: "{{ states(var_timer_wp_boost) == 'idle' and states(var_timer_wp_anlauf) == 'idle' }}"
          - condition: template
            value_template: >
              {{ var_wp_ziel_temp_pv != var_wp_ziel_temp_normal and
                 (state_attr(var_wp_water_heater, 'temperature') | float(-1) | round(0)) == (var_wp_ziel_temp_pv | float(0) | round(0)) }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input wp_hysterese_number
            data:
              value: "{{ var_wp_hysterese_normal }}"
          - action: water_heater.set_temperature
            target:
              entity_id: !input wp_water_heater
            data:
              temperature: "{{ var_wp_ziel_temp_normal }}"
          # ViCare-Doppelsetzung: Zieltemperatur zusätzlich über number-Entity
          - if:
              - condition: template
                value_template: "{{ var_wp_ziel_number != '' }}"
            then:
              - action: number.set_value
                target:
                  entity_id: "{{ var_wp_ziel_number }}"
                data:
                  value: "{{ var_wp_ziel_temp_normal }}"
          - action: logbook.log
            data:
              name: "PV Optimizer"
              message: >
                {{ bp_version }} WP WATCHDOG: Ziel-Temperatur stand noch auf PV-Boost-Wert ({{ var_wp_ziel_temp_pv }}°C), obwohl beide WP-Timer idle sind (vermutlich Timer durch HA-Neustart verloren). Zurückgesetzt: Ziel {{ var_wp_ziel_temp_normal }}°C, Hysterese {{ var_wp_hysterese_normal }}°C.
              entity_id: !input helper_logbook_dummy

  # ====================================================================
  # DIE MASTER KASKADE FÜR DEN BATTERIESTROM
  # ====================================================================
  - choose:
      - alias: "PRIO 1: TOP-BALANCING"
        conditions:
          - condition: template
            value_template: "{{ top_balancing_noetig }}"
        sequence:
          - variables:
              balancing_start_jetzt: >
                {{ states(var_timer_cooldown) == 'idle' and not zwangsladung_aktiv and
                (vmax1 >= top_balancing_voltage or vmax2 >= top_balancing_voltage or (pack3_online and vmax3 >= top_balancing_voltage)) }}
          - if:
              - condition: template
                value_template: "{{ balancing_start_jetzt }}"
            then:
              # 1. Timer starten
              - action: timer.start
                target:
                  entity_id: !input helper_timer_cooldown
                data:
                  duration: !input duration_top_balancing
              # 2. Im exakt selben Moment den Helfer feuern
              - action: input_boolean.turn_on
                target:
                  entity_id: !input helper_batterie_heute_voll
              # HINWEIS: Das Schatten-BMS-Tare wird NICHT mehr hier (Start) gesetzt,
              # sondern am Ende der Zellpflege (float_boost_ende) - dann ist die
              # Nachladung der Balancing-Phase vollständig im Zähler enthalten.
              # 3. Ladestrom direkt setzen + EIN kombinierter Logbuch-Eintrag
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ target_p1 }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "top_balancing"
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Prio 1 (Top-Balancing START): Zellspannung >= {{ top_balancing_voltage | round(3) }}V bei SOC {{ aktueller_soc | round(0) }}%. Timer gestartet, Batterie als voll markiert. Ladestrom auf {{ target_p1 }}A gedrosselt (Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ target_p1 }}A). Schatten-BMS-Kalibrierung folgt am Zellpflege-Ende."
                  entity_id: !input helper_logbook_dummy

          # Spätere Register-Korrektur (nur wenn NICHT gerade gestartet, sonst doppelt)
          - if:
              - condition: template
                value_template: "{{ not balancing_start_jetzt and ((aktueller_ladestrom | round(0)) - (target_p1 | round(0))) | abs >= 2 }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Prio 1 (Top-Balancing): Batterie über {{ top_balancing_soc }}% und max. Zellspannung über {{ top_balancing_voltage | round(3) }}V. Ladestrom auf {{ target_p1 }}A gesetzt (Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ target_p1 }}A)."
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ target_p1 }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "top_balancing"

      - alias: "PRIO 1.5: WINTER-ZWANGSLADUNG LÄUFT"
        conditions:
          - condition: template
            value_template: "{{ zwangsladung_aktiv }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ ((aktueller_ladestrom | round(0)) - (target_p15 | round(0))) | abs >= 2 }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Prio 1.5 (Zwangsladung läuft): Batterieeingang auf {{ target_p15 }}A gestellt, damit Netzstrom einfließen kann (Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ target_p15 }}A)."
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ target_p15 }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "zwangsladung"

      - alias: "PRIO 2: FALL (B) - ZEIT REICHT NICHT (MAX)"
        conditions:
          - condition: template
            value_template: "{{ is_day and aktueller_soc < 97 and fall_b_aktiv }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ aktueller_modus != 'fall_b_max' }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: >
                    {{ bp_version }} Prio 2 (Fall B): Selbst mit Faktor {{ faktor_fallback }} reicht die verbleibende Ladezeit nicht ({{ verf_stunden | round(1) }}h für {{ benoetigt_kwh | round(1) }} kWh [frei: {{ freie_kwh | round(1) }} + Defizit: {{ defizit_kwh | round(1) }}] -> {{ amp_roh_12 | round(0) }}A >= Max {{ max_ampere | round(0) }}A). Ladestrom auf Max ({{ max_ampere | round(0) }}A) verriegelt, Modus 'fall_b_max' gesetzt (Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ max_ampere | round(0) }}A).{{ solcast_log_addon }}
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ max_ampere }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "fall_b_max"

      - alias: "PRIO 3: PEAK SHAVING"
        conditions:
          - condition: template
            value_template: "{{ states(var_timer_wp_anlauf) != 'active' }}"
          - condition: template
            value_template: "{{ states(var_timer_peak) == 'active' }}"
          # Peak-Shaving nur, wenn die Batterie noch aufnehmen kann. Bei voller
          # Batterie (>= 99% oder heute-voll-Marker) ist Shaven physikalisch
          # wirkungslos und würde nur die Balancing-Bremse aushebeln.
          - condition: template
            value_template: "{{ aktueller_soc < 99 and not heute_schon_voll }}"
        sequence:
          # Peak-Shaving löst den WP-Laufzeit-Timer auf: Nach Peak-Ende soll
          # Prio 5 wieder freigegeben sein. Der Ziel/Hysterese-Reset kommt über
          # den wp_boost_ende-Trigger (Cancel erzeugt active->idle), abgesichert
          # durch Watchdog (5 Min) und Mitternachts-Check.
          - if:
              - condition: template
                value_template: "{{ states(var_timer_wp_boost) == 'active' }}"
            then:
              - action: timer.cancel
                target:
                  entity_id: "{{ var_timer_wp_boost }}"
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Peak-Shaving aktiv: WP-Laufzeit Timer wurde vorzeitig beendet (Timer '{{ var_timer_wp_boost }}' -> idle). Prio 5 ist nach dem Peak wieder freigegeben."
                  entity_id: !input helper_logbook_dummy
          # Ziel ist wieder der KONSTANTE Parameter peak_ampere -> einfacher
          # Vergleich reicht, kein Zappeln möglich (Treppenfilter entfernt).
          - if:
              - condition: template
                value_template: "{{ ((aktueller_ladestrom | round(0)) - (target_p3 | round(0))) | abs >= 2 }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Prio 3 (Peak-Shaving): Hold-Timer aktiv (letzter Netz-Export über {{ schwelle_peak_shaving | round(0) }}W). Ladestrom auf {{ target_p3 }}A gesetzt (Aktueller Netz-Export: {{ real_export | round(0) }}W [Batterie puffert gerade {{ (batterie_leistung * -1) | round(0) }}W] | Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ target_p3 }}A).{{ solcast_log_addon }}"
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ target_p3 }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "peak_shaving"

      - alias: "PRIO 4: WP-ANLAUFSPERRE (0A)"
        conditions:
          - condition: template
            value_template: "{{ wp_sperre_aktiv }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ (aktueller_ladestrom | round(0)) != (null_ampere | round(0)) }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Prio 4 (WP-Sperre): Wärmepumpe läuft an. Batterie auf 0A verriegelt (Timer '{{ var_timer_wp_anlauf }}' = active | Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ null_ampere }}A)."
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ null_ampere }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "wp_sperre"

      - alias: "PRIO 4.5: MORGEN-BLOCKADE (0A)"
        conditions:
          - condition: template
            value_template: "{{ blockade_aktiv }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ (aktueller_ladestrom | round(0)) != (null_ampere | round(0)) }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: >
                    {{ bp_version }} Prio 4.5 (Morgen-Blockade dynamisch): Ladestrom auf {{ null_ampere }}A blockiert.
                    Spätester Ladebeginn: {{ (as_datetime(blockade_dyn_t) | as_local).strftime('%H:%M') }} Uhr (konfiguriert: {{ var_zeit_blockade }}). Netto ab dann >= Ziel {{ (freie_kwh * faktor_ziel_puffer) | round(1) }} kWh (frei {{ freie_kwh | round(1) }} x {{ faktor_ziel_puffer }}).
                    (Netto gesamt ab nächster Halbstunde: {{ blockade_dyn_gesamt | round(1) }} kWh | Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ null_ampere }}A).
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ null_ampere }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "blockade"

      - alias: "PRIO 4.8: WP-KOMPRESSOR SPERRE (0A)"
        conditions:
          - condition: template
            value_template: "{{ wp_kompressor_aktiv }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ (aktueller_ladestrom | round(0)) != (null_ampere | round(0)) }}"
            then:
              - action: logbook.log
                data:
                  name: "PV Optimizer"
                  message: "{{ bp_version }} Prio 4.8 (Kompressor-Sperre): Wärmepumpe arbeitet. Batterie auf 0A verriegelt (Kompressor-Status = {{ states(var_wp_kompressor) if var_wp_kompressor != '' else 'active' }} | Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ null_ampere }}A)."
                  entity_id: !input helper_logbook_dummy
              - action: number.set_value
                target:
                  entity_id: "{{ var_wr_max_charge }}"
                data:
                  value: "{{ null_ampere }}"
              - if:
                  - condition: template
                    value_template: "{{ var_lade_modus != '' }}"
                then:
                  - action: input_select.select_option
                    target:
                      entity_id: "{{ var_lade_modus }}"
                    data:
                      option: "wp_sperre"

      - alias: "PRIO 5: DYNAMISCHES FERTIGLADEN (ZEIT-BASIERT)"
        conditions:
          - condition: template
            value_template: "{{ is_day and aktueller_soc < 97 }}"
          - condition: template
            value_template: "{{ not wp_laufzeit_aktiv }}"
          # Abend-Sperre: unter der Mindest-Restladezeit nicht mehr nachregeln.
          # Der letzte Tageswert bleibt stehen, bis der Sonnenuntergang-Trigger
          # das Register ohnehin für die Nacht auf Max öffnet.
          - condition: template
            value_template: "{{ verf_stunden >= (min_reststunden | float(1.0)) }}"
        sequence:
          # Innere Prüfung: Fall-(b)-Modus gesetzt? Dann NICHTS tun (im Trace sichtbar).
          - choose:
              - alias: "Fall-B-Modus aktiv -> kein Rückregeln"
                conditions:
                  - condition: template
                    value_template: "{{ aktueller_modus == 'fall_b_max' }}"
                sequence:
                  - action: logbook.log
                    data:
                      name: "PV Optimizer"
                      message: "{{ bp_version }} Prio 5 übersprungen: Modus 'fall_b_max' aktiv. Kein Rückregeln bis Reset (Mitternacht/Sonnenuntergang)."
                      entity_id: !input helper_logbook_dummy
            default:
              - variables:
                  diff: "{{ target_p5 - aktueller_ladestrom }}"
                  min_since: >
                    {% set lu = states[var_wr_max_charge].last_changed %}
                    {{ ((now() - lu).total_seconds() / 60) | int if lu is not none else 60 }}
                  # Modus-basierter Bypass: Wenn ein ANDERER Block zuletzt gesetzt hat
                  # (Modus != 'normal'), darf Prio 5 einmalig sofort durchregeln.
                  fremder_modus: "{{ aktueller_modus not in ['normal'] }}"
                  update_freigegeben: >
                    {{ fremder_modus or
                       (diff >= 10) or
                       (diff >= 5 and min_since >= 60) or
                       (diff <= -20) or
                       (diff <= -15 and min_since >= 60) }}
              - if:
                  - condition: template
                    value_template: "{{ update_freigegeben }}"
                then:
                  - action: logbook.log
                    data:
                      name: "PV Optimizer"
                      message: >
                        {{ bp_version }} Prio 5 (Dynamisch, Zeit-basiert): Filter passiert (Diff: {{ diff | round(1) }}A | Letzte Änderung: {{ min_since }} Min | Vorheriger Modus: {{ aktueller_modus }}).
                        Bedarf: {{ benoetigt_kwh | round(1) }} kWh (frei {{ freie_kwh | round(1) }} + Defizit {{ defizit_kwh | round(1) }}) / {{ verf_stunden | round(1) }}h Ladezeit * {{ faktor_ziel_puffer }} = {{ amp_roh_13 | round(1) }}A.
                        Register-Wechsel: {{ aktueller_ladestrom | round(0) }}A -> {{ target_p5 }}A.{{ temp_log_addon }}
                      entity_id: !input helper_logbook_dummy
                  - action: number.set_value
                    target:
                      entity_id: "{{ var_wr_max_charge }}"
                    data:
                      value: "{{ target_p5 }}"
                  - if:
                      - condition: template
                        value_template: "{{ var_lade_modus != '' and aktueller_modus != 'normal' }}"
                    then:
                      - action: input_select.select_option
                        target:
                          entity_id: "{{ var_lade_modus }}"
                        data:
                          option: "normal"